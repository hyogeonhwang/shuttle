function showTodayChangesPopup(date, filterChgId){
  const dk=getDK(date);
  // 당일 변경 + 다른 날에 등록된 period_absent 중 기간 내인 것
  const direct=getDayChanges(date).filter(c=>!c.undone);
  const periodFromOther=[];
  for(const [d,arr] of Object.entries(S.db.dailyChanges||{})){
    if(d===date)continue;
    for(const c of arr){
      if(!c.undone&&(c.type==='period_absent'||c.type==='period_individual')&&c.startDate<=date&&c.endDate>=date){
        // 수업요일 필터
        const st=getStudent(c.studentId);
        const classDays=getStudentClassDays(st);
        if(classDays&&!classDays.includes(dk))continue;
        periodFromOther.push({...c,_fromDate:d});
      }
    }
  }
  let chgs=[...direct,...periodFromOther];
  // 최신 등록 순서로 정렬 (나중 등록이 위에)
  chgs.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
  if(filterChgId){
    // 특정 변경건 클릭 시: dedup 없이 해당 건만 표시
    chgs=chgs.filter(c=>c.id===filterChgId);
  } else {
    // 전체 목록 표시 시: 결석은 학생당 1건으로 병합
    const absentSeen=new Set();
    chgs=chgs.filter(c=>{
      if(c.type==='absent'){
        if(absentSeen.has(c.studentId))return false;
        absentSeen.add(c.studentId);
        return true;
      }
      return true;
    });
    // 병합된 absent는 routeId를 'all'로 표시
    chgs=chgs.map(c=>{
      if(c.type==='absent')return Object.assign({},c,{routeId:'all'});
      return c;
    });
  }
  if(!chgs.length)return;
  const typeKO={absent:'결석',individual:'개별등하원',individual_both:'개별 등하원',individual_morning:'개별 등원',individual_afternoon:'개별 하원',period_individual:'개별등하원(기간)',bus_change:'호차변경',stop_change:'정류장변경',period_absent:'결석기간'};
  const typeIcon={absent:'🚫',individual:'🚶',individual_both:'🚶',individual_morning:'🌅',individual_afternoon:'🌇',bus_change:'🔄',stop_change:'📍',period_absent:'📅'};
  const typeColor={absent:'#dc2626',individual:'#7c3aed',individual_both:'#7c3aed',individual_morning:'#7c3aed',individual_afternoon:'#7c3aed',bus_change:'#d97706',stop_change:'#0891b2',period_absent:'#d97706'};

  const rows=chgs.map(c=>{
    const st=getStudent(c.studentId);
    const route=getRoute(c.routeId); // period_absent는 routeId='all'이므로 null일 수 있음
    if(!st)return '';
    if(!route&&c.type!=='period_absent'&&c.routeId!=='all')return '';
    const col=typeColor[c.type]||'#6b7280';
    const icon=typeIcon[c.type]||'❓';
    const sc=route?st.schedules?.[c.routeId]||{}:{};
    const busCol=route?BUS_COLORS[route.busId]||'#555':'#6b7280';

    // 변경 전 (원래 배정) - period_absent는 학생의 실제 노선 표시
    let beforeHtml='';
    if(route){
      const sc2=st.daySchedules?.default?.[route.dir==='morning'?'morning':'afternoon']||{};
      const busCol2=BUS_COLORS[route.busId]||'#555';
      beforeHtml=`
        <div style="font-size:11px;color:#6b7280">
          <span style="background:${busCol2};color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:6px;margin-right:4px">${route.busId}호</span>
          ${esc(getRouteLabel(route.id))}
        </div>
        <div style="font-size:10px;color:#9ca3af;margin-top:2px">📍 ${esc(sc2.stop||'-')}</div>`;
    } else {
      // routeId='all' - 학생의 등원/하원 노선 모두 표시
      const def=st.daySchedules?.default||{};
      const mRid=def.morning?.routeId;
      const aRid=def.afternoon?.routeId;
      const mR=mRid&&!mRid.startsWith('__')?getRoute(mRid):null;
      const aR=aRid&&!aRid.startsWith('__')?getRoute(aRid):null;
      beforeHtml=`<div style="font-size:11px;color:#6b7280">`;
      if(mR)beforeHtml+=`<span style="background:${BUS_COLORS[mR.busId]||'#555'};color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:6px;margin-right:3px">${mR.busId}호</span>`;
      if(aR)beforeHtml+=`<span style="background:${BUS_COLORS[aR.busId]||'#555'};color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:6px;margin-right:3px">${aR.busId}호</span>`;
      beforeHtml+=`${!mR&&!aR?'등록 노선 없음':''}</div>`;
    }

    // 변경 후
    const dirLabel_={both:'등원+하원',morning:'등원만',afternoon:'하원만'};
    let afterHtml='';
    if(c.type==='absent'){
      afterHtml=`<div style="font-size:11px;font-weight:900;color:#dc2626">🚫 결석</div>`;
    } else if(c.type==='individual'||c.type==='period_individual'){
      const dl=c.dir?` (${dirLabel_[c.dir]||c.dir})`:'';
      afterHtml=`<div style="font-size:11px;font-weight:900;color:#7c3aed">🚶 개별등하원${dl}</div>`;
      if(c.type==='period_individual')afterHtml+=`<div style="font-size:10px;color:#9ca3af;margin-top:2px">${c.startDate||''}~${c.endDate||''}</div>`;
    } else if(c.type==='bus_change'){
      const toRoute=getRoute(c.toRouteId);
      const toBusCol=toRoute?BUS_COLORS[toRoute.busId]||'#555':'#555';
      afterHtml=`
        <div style="font-size:11px;font-weight:900;color:#d97706">
          <span style="background:${toBusCol};color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:6px;margin-right:4px">${toRoute?.busId||'?'}호</span>
          ${esc(toRoute?.label||c.toRouteId||'?')}
        </div>
        ${c.toStop?`<div style="font-size:10px;color:#9ca3af;margin-top:2px">📍 ${esc(c.toStop)}</div>`:''}`;
    } else if(c.type==='stop_change'){
      afterHtml=`
        <div style="font-size:11px;font-weight:900;color:#0891b2">📍 정류장 변경</div>
        <div style="font-size:10px;color:#9ca3af;margin-top:2px">${esc(c.toStop||'-')}</div>`;
    } else if(c.type==='period_absent'){
      afterHtml=`
        <div style="font-size:11px;font-weight:900;color:#d97706">📅 결석기간</div>
        <div style="font-size:10px;color:#9ca3af;margin-top:2px">${c.startDate||''} ~ ${c.endDate||''}</div>`;
    }

    return `<div style="border:1.5px solid ${col}33;border-radius:10px;padding:11px 13px;margin-bottom:8px;background:#fff">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
        <span style="font-size:15px">${icon}</span>
        <div style="flex:1">
          <span style="font-size:13px;font-weight:900;color:#1e293b">${esc(st.name)}</span>
          <span style="font-size:10px;color:#9ca3af;margin-left:6px">${esc(st.cls||'')}</span>
        </div>
        <span style="font-size:10px;font-weight:800;background:${col}22;color:${col};padding:2px 8px;border-radius:8px">${typeKO[c.type]||c.type}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 24px 1fr;align-items:center;gap:6px">
        <div style="background:#f8fafc;border-radius:8px;padding:8px 10px">
          <div style="font-size:9px;color:#9ca3af;font-weight:700;margin-bottom:4px;letter-spacing:.3px">변경 전</div>
          ${beforeHtml}
        </div>
        <div style="text-align:center;font-size:14px;color:#9ca3af">→</div>
        <div style="background:${col}0d;border:1.5px solid ${col}33;border-radius:8px;padding:8px 10px">
          <div style="font-size:9px;color:${col};font-weight:700;margin-bottom:4px;letter-spacing:.3px">변경 후</div>
          ${afterHtml}
        </div>
      </div>
      ${c.notes?`<div style="font-size:10px;color:#6b7280;margin-top:7px;padding-top:7px;border-top:1px solid #f0f2f7">💬 ${esc(c.notes)}</div>`:''}
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f2f7;display:flex;gap:6px;justify-content:flex-end">
        <button data-edit="${c.id}" data-date="${c._fromDate||date}" style="border:1.5px solid var(--pr);background:#fff;color:var(--pr);border-radius:6px;padding:3px 11px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">✏️ 수정</button>
        <button data-undo="${c.id}" data-date="${c._fromDate||date}" style="border:1px solid #f97316;background:#fff;color:#f97316;border-radius:6px;padding:3px 11px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">↩ 취소</button>
        <button data-delete="${c.id}" data-date="${c._fromDate||date}" style="border:1px solid #dc2626;background:#fff;color:#dc2626;border-radius:6px;padding:3px 11px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">🗑 삭제</button>
      </div>
    </div>`;
  }).join('');

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML=`
    <div style="background:#fff;border-radius:14px;width:100%;max-width:460px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="padding:16px 20px 12px;border-bottom:1px solid #f0f2f7;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:15px;font-weight:900;color:#1e293b">📋 오늘 변경사항</div>
          <div style="font-size:11px;color:#9ca3af;margin-top:2px">${fmtDate(date)} · ${chgs.length}건</div>
        </div>
        <button id="tcp-close" style="border:none;background:#f3f4f6;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">×</button>
      </div>
      <div style="padding:14px 16px;overflow-y:auto;flex:1">${rows}</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#tcp-close').onclick=()=>document.body.removeChild(overlay);
  overlay.onclick=(e)=>{if(e.target===overlay)document.body.removeChild(overlay);};
  // 취소(되돌리기) 버튼
  overlay.querySelectorAll('[data-undo]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      if(!confirm('이 변경사항을 취소하시겠습니까?'))return;
      const cid=btn.dataset.undo;
      const targetDate=btn.dataset.date||date;
      const arr=getDayChanges(targetDate).map(c=>c.id===cid?{...c,undone:true}:c);
      setDayChanges(targetDate,arr);
      if(S.lastChange&&S.lastChange.id===cid)S.lastChange=null;
      showToast('↩ 변경 취소 완료');
      document.body.removeChild(overlay);
      render();
    };
  });
  // 수정 버튼 - 기존 항목 취소 후 변경모달 오픈
  overlay.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const cid=btn.dataset.edit;
      const targetDate=btn.dataset.date||date;
      document.body.removeChild(overlay);
      editChangeEntry(targetDate,cid);
    };
  });
  // 삭제 버튼
  overlay.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      if(!confirm('이 변경내역을 완전히 삭제하시겠습니까?'))return;
      const cid=btn.dataset.delete;
      const targetDate=btn.dataset.date||date;
      const arr=getDayChanges(targetDate).filter(c=>c.id!==cid);
      setDayChanges(targetDate,arr);
      if(S.lastChange&&S.lastChange.id===cid)S.lastChange=null;
      showToast('🗑️ 변경내역 삭제됨');
      document.body.removeChild(overlay);
      render();
    };
  });
}


function buildSingleRouteCard(rid,date,dk,wd){
  const route=getRoute(rid); if(!route)return '';
  // 해당 노선이 속한 bus 찾기
  const bus=getBus(route.busId);
  if(!bus)return '';
  // buildBusCard를 호출하되, 해당 노선만 표시되게 collapse 상태 조정
  // 간단하게: 해당 버스카드를 렌더하되, 다른 노선은 자동 접힘
  const prevCollapsed={...S.routeCollapsed};
  // 해당 버스의 다른 노선들 모두 접기
  getBusRoutes(bus.id).forEach(r=>{
    if(r.id!==rid) S.routeCollapsed[r.id]=true;
    else S.routeCollapsed[r.id]=false;
  });
  const html=buildBusCard(bus,date,dk,wd);
  S.routeCollapsed=prevCollapsed;
  return html;
}

function buildBusCard(bus,date,dk,wd){
  const col=BUS_COLORS[bus.id]||'var(--pr)';
  const sfil=S.schoolFilter;
  const busRoutes=getBusRoutes(bus.id).filter(r=>routeActiveOnDay(r,dk));
  // routeOrder가 없을 때만 시간 오름차순 정렬
  if(!(S.db?.routeOrder?.[bus.id]?.length)){
    busRoutes.sort((a,b)=>(getRouteTime(a.id)||'').localeCompare(getRouteTime(b.id)||''));
  }
  let hasStudents=false;
  for(const r of busRoutes){
    const sts=getRouteStudents(r.id,date).filter(s=>sfil==='all'||s.school===sfil);
    if(sts.length>0){hasStudents=true;break;}
  }
  if(!hasStudents&&sfil!=='all')return '';
  // 헤더 변경 건수: 해당 호차 탑승 학생 중 변경된 학생 수 (학생 기준 중복 제거)
  const chgStudentIds=new Set();
  busRoutes.forEach(r=>{
    const sts=getRouteStudents(r.id,date);
    sts.forEach(s=>{
      if(s.state!=='normal'&&!s.isFixedOverride) chgStudentIds.add(s.id);
    });
  });
  const chgCnt=chgStudentIds.size;
  const todayTeachers=[];
  busRoutes.forEach(r=>{
    getTeachersForRoute(r.id).forEach(t=>{if(!todayTeachers.find(x=>x.id===t.id))todayTeachers.push(t);});
  });
  const busCollapsed=!!S.busCollapsed[bus.id];
  // 노선별 접기 상태: 호차 내 모든 노선이 접혀있는지
  const allRoutesCollapsed=busRoutes.length>0&&busRoutes.every(r=>S.routeCollapsed[r.id]);
  return `
<div class="bc" style="border-top:4px solid ${col}">
  <div style="padding:9px 13px;background:${col};display:flex;align-items:center;justify-content:space-between;user-select:none">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer" onclick="toggleBusCard('${bus.id}')">
      <span style="color:#fff;font-size:18px;font-weight:900">${bus.name}</span>
      <span style="background:rgba(255,255,255,.25);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700">${bus.cap}인승</span>
      ${bus.plate?`<span style="background:rgba(0,0,0,.2);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700">${bus.plate}</span>`:''}
      ${chgCnt>0?`<span style="background:#fbbf24;color:#78350f;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700">변경 ${chgCnt}명</span>`:''}
    </div>
    <button onclick="event.stopPropagation();toggleAllRoutesInBus('${bus.id}')"
      style="border:none;background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
      ${allRoutesCollapsed?'▼ 노선 펼치기':'▲ 노선 접기'}
    </button>
  </div>
  ${busCollapsed?'':`
  <div style="padding:5px 13px 4px;background:#fafafa;border-bottom:1px solid var(--border);font-size:11px;display:flex;align-items:center;flex-wrap:wrap;gap:8px">
    🚗 <strong>${esc(bus.driver)}</strong>
    ${bus.driverPhone?`<a href="tel:${bus.driverPhone}" style="color:var(--pr)">${bus.driverPhone}</a>`:''}
    ${todayTeachers.length?`<span style="color:#6b7280">👤 ${todayTeachers.map(t=>`${esc(t.name)}${t.phone?` <a href="tel:${t.phone}" style="color:var(--pr)">${esc(t.phone)}</a>`:''}`).join(' / ')}</span>`:''}
  </div>
  ${wd?buildBusRouteRows(busRoutes,date,sfil):'<div style="padding:12px 13px;font-size:11px;color:#9ca3af;text-align:center">운행없음</div>'}
  `}
</div>`;
}

function buildStopGroups(students,date,accentCol){
  if(!students.length)return `<div class="empty" style="padding:10px;font-size:11px">해당없음</div>`;
  const col=accentCol||'var(--pr)';
  const grpMap={};
  for(const s of students){
    const k=(s.sched?.stop||'(정류장 미정)')+'||'+(s.sched?.pickupTime||'');
    if(!grpMap[k])grpMap[k]={stop:s.sched?.stop||'(정류장 미정)',time:s.sched?.pickupTime||'',studs:[]};
    grpMap[k].studs.push(s);
  }
  const grps=Object.values(grpMap).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  return grps.map(g=>`
<div class="stop-grp">
  <div class="stop-bar">
    ${g.time?`<span class="t-badge" style="background:${col}">${g.time}</span>`:''}
    <span class="stop-name">${esc(g.stop.length>32?g.stop.slice(0,32)+'…':g.stop)}</span>
    <span class="stop-cnt">${g.studs.filter(s=>s.state!=='tout'&&!s.isFixedOverride).length}명</span>
  </div>
  ${g.studs.map(s=>buildSti(s,date)).join('')}
</div>`).join('');
}

function buildSti(s,date){
  const state=s.state||'normal';
  const clsMap={normal:'',absent:'absent',individual:'individual',tout:'tout',tin:'tin',stopchg:'stopchg',period_absent:'period_absent'};
  const pinMap={
    absent:`<span class="pin pin-abs">결석</span>`,
    individual:`<span class="pin pin-ind">개별</span>`,
    tout:`<span class="pin pin-bus">↗이동</span>`,
    tin:`<span class="pin pin-bus">↙탑승</span>`,
    stopchg:`<span class="pin pin-stop">정류장변경</span>`,
    period_absent:`<span class="pin pin-period">결석기간</span>`,
  };
  const schDot=s.school!=='altiora'?`<div class="dot" style="background:${getSchoolColor(s.school)}"></div>`:'';
  const curTime=s.sched?.pickupTime||'';
  // isFixedOverride(요일예외 고정설정)는 변경 핀 미표시, 취소선은 표시
  const displayState=s.isFixedOverride?'normal':state;
  const isAbsentState=state==='absent'||state==='period_absent';
  const isIndivState=state==='individual';
  const isCrossed=isAbsentState||isIndivState;
  const crossStyle=isAbsentState?'text-decoration:line-through double #dc2626;color:#9ca3af':isIndivState?'text-decoration:line-through;color:#9ca3af':'';
  // 결석/개별이면 시간 대신 메모 표시
  const chgMemo=(isAbsentState||isIndivState)?(()=>{
    const chgs=getDayChanges(date).filter(c=>c.studentId===s.id&&!c.undone);
    return chgs.map(c=>c.notes||'').find(n=>n)||'';
  })():'';
  const MEMO_MAX=15;
  const memoShort=chgMemo.length>MEMO_MAX?chgMemo.slice(0,MEMO_MAX)+'…':chgMemo;
  const rightCol=(isAbsentState||isIndivState)
    ?(chgMemo?`<span title="${esc(chgMemo)}" style="font-size:10px;color:#9ca3af;flex-shrink:0;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(memoShort)}</span>`:'')
    :(curTime?`<span style="font-size:10px;color:#9ca3af;flex-shrink:0">${curTime}</span>`:'');
  return `<div class="sti ${clsMap[displayState]||''}" data-name="${esc(s.name)}" onclick="openStudentDetail('${s.id}','${date}')" style="display:flex;align-items:center;gap:5px;padding:5px 8px;user-select:none;-webkit-user-select:none">
  ${schDot}
  <span class="stn" style="flex:1;${crossStyle}">${esc(s.name)}</span>
  ${s.cls?`<span class="sc">${esc(s.cls)}</span>`:''}
  ${s.isFixedOverride?`<span class="pin" style="background:#e0e7ff;color:#3730a3;font-size:9px">개별</span>`:(pinMap[state]||'')}
  ${rightCol}
</div>`;
}

// ─── ROUTES ───
function buildRoutes(date,dk){
  const{busId,open}=S.routeFilter;
  const busRoutes=getBusRoutes(busId);
  if(!(S.db?.routeOrder?.[busId]?.length)){
    busRoutes.sort((a,b)=>(getRouteTime(a.id)||'').localeCompare(getRouteTime(b.id)||''));
  }
  const allOpen=busRoutes.length>0&&busRoutes.every(r=>open[r.id]);
  const am=S.adminMode;
  return `<div class="card">
  <div class="card-hdr">
    <span class="card-t">🗺 노선 관리</span>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
      <select style="border:1.5px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;font-family:inherit;outline:none" onchange="S.routeFilter.busId=this.value;render()">
        ${INIT_BUSES.map(b=>`<option value="${b.id}" ${busId===b.id?'selected':''}>${b.name}</option>`).join('')}
      </select>
      <button class="btn btn-sec btn-xs" onclick="toggleAllRoutesOpen('${busId}')">
        ${allOpen?'▲ 모두 접기':'▼ 모두 펼치기'}
      </button>
      <button class="btn btn-pr btn-xs" onclick="exportRouteExcel()">📥 엑셀 다운로드</button>
    </div>
  </div>
  <div class="card-body">
    ${!am?`<div style="background:#fef3c7;border:1.5px solid #fcd34d;border-radius:9px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:15px">🔐</span>
      <div style="font-size:12px;color:#92400e">노선 추가·수정·삭제는 <strong>관리자 모드</strong>에서만 가능합니다.
        <button onclick="toggleAdmin()" style="margin-left:8px;border:1px solid #d97706;background:#fff;color:#d97706;border-radius:6px;padding:2px 9px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">로그인</button>
      </div>
    </div>`:''}
    <div class="route-list">
    ${busRoutes.map(r=>{
      const isOpen=open[r.id];
      const sts=getRouteStudents(r.id,date);
      const activeToday=routeActiveOnDay(r,dk);
      const rCol=r.school==='petamus'?'#7c3f00':r.school==='pangram'?'#0e7490':'var(--pr)';
      const daysStr=(r.days||[]).length===5?'월~금':(r.days||[]).map(d=>DAY_KO[d]).join('·');
      const chgCnt=sts.filter(s=>s.state!=='normal'&&!s.isFixedOverride).length;
      const boardCnt=sts.filter(s=>s.state==='normal'||s.state==='tin'||s.state==='stopchg').length;
      return `<div class="route-card" style="border-color:${activeToday?rCol:'var(--border)'}">
        <div class="route-card-hdr" onclick="toggleRouteOpen('${r.id}')">
          <span class="route-badge" style="background:${rCol}">${getRouteTime(r.id)}</span>
          <div style="flex:1;min-width:0">
            <div class="route-label">${getRouteLabel(r.id)}</div>
            <div class="route-meta">${daysStr}${(()=>{const ts=getTeachersForRoute(r.id);return ts.length?` · 👤 ${ts.map(t=>t.name).join(', ')}`:'';})()}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;font-weight:700;color:${activeToday?rCol:'#9ca3af'}">${activeToday?boardCnt+'명':''}<span style="font-size:10px;color:#9ca3af">${activeToday?'':' 오늘 미운행'}</span></div>
            ${chgCnt>0?`<div style="font-size:10px;font-weight:700;color:var(--danger)">변경 ${chgCnt}명</div>`:''}
            <div class="route-toggle">${isOpen?'▲':'▼'}</div>
          </div>
        </div>
        ${isOpen?`<div class="route-card-body">
          ${!activeToday?`<div class="note note-warn">오늘(${DAY_KO[dk]}요일)은 이 노선 운행일이 아닙니다</div>`:''}
          ${am?`<div style="margin-bottom:10px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-pr btn-sm" onclick="openChangeModal(null,'${r.id}')">✚ 변경등록</button>
          </div>`:''}
          ${buildStopGroups(sts,date,rCol)}
        </div>`:''}
      </div>`;
    }).join('')}
    </div>
  </div></div>`;
}

  // 반 목록

    const schools=sfil==='all'?['altiora','petamus','pangram']:[sfil];
    const result=[];
    schools.forEach(sk=>(S.db.classes?.[sk]||[]).filter(Boolean).forEach(c=>{if(!result.includes(c))result.push(c);}));
    return result;
  })();

  // 탑승 미설정 판별
  function hasNoSched(s){
    if(!s.active)return false;
    const def=s.daySchedules?.default;
    if(def?.morning?.routeId||def?.afternoon?.routeId)return false;
    if(s.daySchedules){
      const hasException=DAYS.some(dk=>{
        const ds=s.daySchedules[dk];
        return ds?.morning?.routeId&&ds.morning.routeId!=='__absent__'&&ds.morning.routeId!=='__individual__'
          || ds?.afternoon?.routeId&&ds.afternoon.routeId!=='__absent__'&&ds.afternoon.routeId!=='__individual__';
      });
      if(hasException)return false;
      return true;
    }
    const hasSched=Object.keys(s.schedules||{}).length>0;
    return !hasSched;
  }

  // 개별등하원 판별: default 등원·하원 둘 다 __individual__ (셔틀 완전 미이용)
  function isIndividualStudent(s){
    if(!s.active)return false;
    const def=s.daySchedules?.default;
    if(!def)return false;
    return def.morning?.routeId==='__individual__' && def.afternoon?.routeId==='__individual__';
  }

  const allActive=S.db.students.filter(s=>s.active&&(sfil==='all'||s.school===sfil)&&(!clsFil||s.cls===clsFil));
  const allInactive=S.db.students.filter(s=>!s.active&&(sfil==='all'||s.school===sfil)&&(!clsFil||s.cls===clsFil));

  const individualCnt=allActive.filter(s=>isIndividualStudent(s)).length;

function buildStudentRow(s){
  const dir_m='morning', dir_a='afternoon';

  function getEffectiveSched(dir){
    if(!s.daySchedules) {
      // 구형 schedules 폴백
      const fallback=Object.entries(s.schedules||{}).find(([rid])=>{
        const r=getRoute(rid);return r&&r.dir===(dir==='morning'?'morning':'afternoon');
      });
      if(fallback)return {routeId:fallback[0]};
      return null;
    }
    const defSc=s.daySchedules.default?.[dir];
    // default에 실제 노선 있으면 그걸 표시
    if(defSc?.routeId&&defSc.routeId!=='__absent__'&&defSc.routeId!=='__individual__')return defSc;
    if(defSc?.routeId==='__absent__'||defSc?.routeId==='__individual__')return defSc;

    // default가 null/없으면 → 요일별 예외에서 실제 노선 있는 첫 번째를 대표로 표시
    // (요일 순: mon,tue,wed,thu,fri)
    for(const dk of DAYS){
      const ds=s.daySchedules[dk]?.[dir];
      if(ds?.routeId&&ds.routeId!=='__absent__'&&ds.routeId!=='__individual__')
        return {...ds, _fromException:true};
    }
    return null;
  }

  function makeLabel(dir){
    const sc=getEffectiveSched(dir);
    if(!sc)return `<span style="background:#f3e8ff;color:#7c3aed;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:800">🚶 개별</span>`;
    if(sc.routeId==='__absent__')
      return `<span style="background:#f1f5f9;color:#94a3b8;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:800">❌ 미등원</span>`;
    if(sc.routeId==='__individual__')
      return `<span style="background:#f3e8ff;color:#7c3aed;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:800">🚶 개별</span>`;
    const r=getRoute(sc.routeId);
    if(!r)return `<span style="background:#f3e8ff;color:#7c3aed;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:800">🚶 개별</span>`;
    return `<span style="background:${BUS_COLORS[r.busId]||'#888'};color:#fff;border-radius:5px;padding:1px 6px;font-size:10px;font-weight:800">${r.busId}호차</span>`
      +` <span style="font-size:10px">${getRouteLabel(r.id)}</span>`
      +(sc._fromException?` <span style="font-size:9px;color:#6b7280;font-weight:700">(요일별)</span>`:'');
  }

  const amLabel=makeLabel('morning');
  const pmLabel=makeLabel('afternoon');

  return `<tr data-name="${esc(s.name)}" data-cls="${esc(s.cls||'')}" data-phone="${esc(s.phone||'')}" onclick="openStudentDetail('${s.id}','${S.date}')" style="cursor:pointer;${!s.active?'opacity:.55;background:#fef2f2;':''}" title="${!s.active?'퇴원 학생':''}">
    <td><strong style="color:${!s.active?'#dc2626':'inherit'}">${esc(s.name)}</strong></td>
    <td>${esc(s.cls||'-')}</td>
    <td><span style="color:${getSchoolColor(s.school)};font-weight:800;font-size:11px">${SCHOOL_KO[s.school]||s.school}</span></td>
    <td>${amLabel}</td>
    <td>${pmLabel}</td>
    <td>${s.phone?`<a href="tel:${s.phone}" onclick="event.stopPropagation()" style="font-size:11px">${esc(s.phone)}</a>`:'-'}</td>
    <td>${!s.active?`<span class="badge badge-danger">퇴원${s.withdrawDate?' '+s.withdrawDate.slice(5):''}</span>`:`<span class="badge badge-success">재원</span>`}</td>
    ${S.adminMode?`<td onclick="event.stopPropagation()"><button class="btn btn-sec btn-xs" onclick="openEditStudent('${s.id}')">수정</button></td>`:''}</tr>`;
}

// ─── CHANGES ───
function buildChanges(date){
  const dk=getDK(date);
  const sfil=S.schoolFilter||'all';
  // 해당 날짜 직접 등록된 변경
  const direct=getDayChanges(date);
  const active=direct.filter(c=>!c.undone);
  const undone=direct.filter(c=>c.undone);

  // 다른 날 등록됐지만 기간이 해당 날짜를 포함하는 period_absent/period_individual
  const periodFromOther=[];
  for(const [d,arr] of Object.entries(S.db.dailyChanges||{})){
    if(d===date)continue;
    for(const c of arr){
      if(!c.undone&&(c.type==='period_absent'||c.type==='period_individual')&&c.startDate<=date&&c.endDate>=date){
        const st=getStudent(c.studentId);
        const classDays=getStudentClassDays(st);
        if(classDays&&!classDays.includes(dk))continue;
        periodFromOther.push({...c,_fromDate:d});
      }
    }
  }

  const allActive=[...active,...periodFromOther];

  // 같은 학생·같은 type 중복 제거 (등원/하원 각각 저장된 결석 등을 1건으로 합침)
  function dedup(list){
    const seen=new Set();
    return list.filter(c=>{
      const key=c.studentId+'_'+c.type+(c.type==='period_absent'||c.type==='period_individual'?'_'+c.startDate:'');
      if(seen.has(key))return false;
      seen.add(key);
      return true;
    });
  }

  // 학교 필터 적용
  const filtered=dedup(sfil==='all'?allActive:allActive.filter(c=>{const st=getStudent(c.studentId);return st?.school===sfil;}));
  const undoneFiltered=dedup(sfil==='all'?undone:undone.filter(c=>{const st=getStudent(c.studentId);return st?.school===sfil;}));
  const totalCount=filtered.length;

  const filterBar=`<div class="sf-bar" style="margin-bottom:12px">
    ${[['all','전체'],['altiora','알티오라'],['petamus','페타무스'],['pangram','팬그램']].map(([k,l])=>
      `<button class="sf-btn${sfil===k?' on':''}" data-k="${k}" onclick="setSchool('${k}')">${l}</button>`
    ).join('')}
  </div>`;

  return `<div class="card">
  <div class="card-hdr">
    <span class="card-t">📝 ${fmtDate(date)} 변경내역 (${totalCount}건)</span>
    <button class="btn btn-pr btn-sm" onclick="openChangeModal(null,null)">✚ 변경등록</button>
  </div>
  <div class="card-body">
    ${filterBar}
    ${filtered.length===0?`<div class="empty">변경된 내역이 없습니다</div>`:filtered.map(c=>buildChgRow(c,!c._fromDate)).join('')}
    ${periodFromOther.length>0&&sfil==='all'?`<div style="font-size:10px;color:#9ca3af;margin-top:8px;padding-top:8px;border-top:1px solid #f0f2f7">📅 기간 예약 변경 ${periodFromOther.filter(c=>{const st=getStudent(c.studentId);return sfil==='all'||st?.school===sfil;}).length}건 포함</div>`:''}
    ${undoneFiltered.length>0?`<div style="font-size:11px;color:#9ca3af;margin-top:14px;margin-bottom:7px">── 취소된 변경 (${undoneFiltered.length}건) ──</div>${undoneFiltered.map(c=>buildChgRow(c,false)).join('')}`:''}
  </div></div>`;
}

function buildChgRow(c,canUndo){
  const s=getStudent(c.studentId); if(!s)return '';
  const r=getRoute(c.routeId);
  const icons={absent:'🚫',individual:'🚶',period_individual:'🚶',individual_both:'🚶',individual_morning:'🌅',individual_afternoon:'🌇',bus_change:'🔄',stop_change:'📍',period_absent:'📅'};
  const typeKO={absent:'결석',individual:'개별등하원',individual_both:'개별 등하원',individual_morning:'개별 등원',individual_afternoon:'개별 하원',period_individual:'개별등하원(기간)',bus_change:'호차변경',stop_change:'정류장변경',period_absent:'결석기간'};
  const dirKO_={both:'등원+하원',morning:'등원만',afternoon:'하원만'};
  let desc=`${r?r.label:(c.routeId==='all'?'전체':'?')} · ${typeKO[c.type]||c.type}`;
  if(c.dir)desc+=` (${dirKO_[c.dir]||c.dir})`;
  if(c.type==='bus_change')desc+=` → ${(c.toRouteId||'').slice(1,2)}호차 ${c.toStop||''}`;
  if(c.type==='stop_change')desc+=` → ${c.toStop||''}`;
  if(c.type==='period_absent'||c.type==='period_individual')desc+=` ${c.startDate||''}~${c.endDate||''}`;
  if(c.notes)desc+=` · ${c.notes}`;
  const dk=getDK(S.date);
  const canPin=(c.type==='bus_change'||c.type==='stop_change')&&canUndo&&S.adminMode;
  const timeStr=c.timestamp?new Date(c.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}):'';
  return `<div class="chg-row ${c.type||''} ${c.undone?'undone':''}">
    <div class="chg-icon">${icons[c.type]||'❓'}</div>
    <div class="chg-info">
      <div class="chg-nm">${esc(s.name)} <span style="font-size:10px;color:#9ca3af">${esc(s.cls)}</span>${timeStr?`<span style="font-size:10px;color:#c4c9d4;margin-left:5px">${timeStr}</span>`:''}${c.inputter?`<span style="font-size:10px;font-weight:700;background:#f0f4ff;color:#1A3169;padding:1px 7px;border-radius:8px;margin-left:6px">${esc(c.inputter)}</span>`:''}</div>
      <div class="chg-ds">${esc(desc)}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">

    const map={};// stop명 → [{rid,busId,routeLabel,dir,students,repTime}]
    // 노선별 정류장+학생+시간 수집
    const routeStopMap={}; // rid → {stop → {students:[], times:[]}}
    for(const st of S.db.students){
      if(!st.active)continue;
      if(!st.daySchedules)continue;
      const def=st.daySchedules.default||{};
      for(const dir of['morning','afternoon']){
        const sc=def[dir];
        if(!sc||!sc.stop||!sc.routeId||sc.routeId.startsWith('__'))continue;
        const rid=sc.routeId;
        if(!routeStopMap[rid])routeStopMap[rid]={};
        if(!routeStopMap[rid][sc.stop])routeStopMap[rid][sc.stop]={students:[],times:[]};
        routeStopMap[rid][sc.stop].students.push(st.name);
        if(sc.pickupTime)routeStopMap[rid][sc.stop].times.push(sc.pickupTime);
      }
    }
    // map 구성
    for(const [rid,stopData] of Object.entries(routeStopMap)){
      const route=getRoute(rid);if(!route)continue;
      for(const [sn,data] of Object.entries(stopData)){
        if(!map[sn])map[sn]=[];
        const times=[...new Set(data.times)].sort();
        map[sn].push({rid,busId:route.busId,routeLabel:getRouteLabel(rid),dir:route.dir,students:data.students,repTime:times[0]||'',school:route.school});
      }
    }
    // routeStops에만 있고 학생 없는 정류장도 추가
    for(const [rid,stops] of Object.entries(rs)){
      const route=getRoute(rid);if(!route)continue;

        const sn=typeof item==='object'?item.stop:item;

        if(!map[sn])map[sn]=[];
        map[sn].push({rid,busId:route.busId,routeLabel:getRouteLabel(rid),dir:route.dir,students:[],repTime:'',school:route.school});

function filterStopsDOM(val){
  const q=(val||'').toLowerCase().trim();
  const items=document.querySelectorAll('#stop_list_wrap .stop-item');
  let shown=0;
  items.forEach(el=>{
    const match=!q||el.dataset.stop.includes(q);
    el.style.display=match?'':'none';
    if(match)shown++;
  });
  const cnt=document.getElementById('stop_srch_cnt');
  if(cnt)cnt.innerHTML=q?`검색 결과 <strong>${shown}</strong>개`:`표시 <strong>${shown}</strong>개`;
  const clr=document.getElementById('stop_srch_clr');
  if(clr)clr.style.display=q?'block':'none';
}
function getStopStudentCount(rid,stop){
  return getStopStudents(rid,stop).length;
}
function getStopStudents(rid,stop){
  const names=[];
  const checkDate=S.date||todayStr();
  S.db.students.filter(s=>isActiveOnDate(s, checkDate)).forEach(s=>{
    if(!s.daySchedules)return;
    let added=false;
    for(const dv of Object.values(s.daySchedules)){
      if(added)break;
      if(dv?.morning?.routeId===rid&&dv.morning.stop===stop){names.push(s.name);added=true;}
      else if(dv?.afternoon?.routeId===rid&&dv.afternoon.stop===stop){names.push(s.name);added=true;}
    }
  });
  return names;
}
// 정류장 시간 조회
function getStopTime(rid,stopName){
  const arr=S.db.routeStops?.[rid]||[];
  const item=arr.find(x=>(typeof x==='object'?x.stop:x)===stopName);
  return item?(typeof item==='object'?item.time:''):'';
}

function fmtTime(inp){
  let v=inp.value.trim();
  // 숫자만 추출
  const d=v.replace(/[^0-9]/g,'');
  if(!d){inp.value='';return;}
  // 이미 HH:MM 형식이면 그대로
  if(/^\d{2}:\d{2}$/.test(v)){return;}
  // 숫자 4자리 → HH:MM
  if(d.length>=4){
    inp.value=d.slice(0,2)+':'+d.slice(2,4);
  } else if(d.length===3){
    // 845 → 08:45
    inp.value='0'+d[0]+':'+d.slice(1);
  } else {
    inp.value=d;
  }
}

function addPendingStop(){
  if(!S._pendingStops)S._pendingStops=[];
  S._pendingStops.push({stop:'',time:''});
  render();
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#app input[oninput*="_pendingStops"]');
    if(inputs.length)inputs[inputs.length-2]?.focus(); // 정류장명 포커스
  },30);
}
function markStopEdit(rid,idx,field,val){
  // DOM 수정만 추적 (저장 전)
  if(!S._stopEdits)S._stopEdits={};
  if(!S._stopEdits[idx]){
    const item=S.db.routeStops?.[rid]?.[idx];
    S._stopEdits[idx]={
      stop:typeof item==='object'?item.stop:item,
      time:typeof item==='object'?item.time:''
    };
  }
  S._stopEdits[idx][field]=val;
}
function saveStopsAll(rid){
  if(!S.db.routeStops[rid])S.db.routeStops[rid]=[];
  let changed=0;
  const edits=S._stopEdits||{};
  // 정류장명 변경 매핑 수집 (oldName→newName)
  const renamed={};
  for(const [idxStr,edit] of Object.entries(edits)){
    const idx=parseInt(idxStr);
    if(S.db.routeStops[rid][idx]!==undefined){
      const item=S.db.routeStops[rid][idx];
      const oldName=typeof item==='object'?item.stop:item;
      const newName=edit.stop.trim();
      const newTime=fmtTimeStr(edit.time||'');
      if(oldName&&newName&&oldName!==newName) renamed[oldName]=newName;
      S.db.routeStops[rid][idx]={stop:newName,time:newTime};
      changed++;
    }
  }
  // 정류장명 변경 → 학생 daySchedules 일괄 업데이트
  if(Object.keys(renamed).length>0){
    for(const st of S.db.students){
      if(!st.daySchedules)continue;
      for(const dk of ['default',...DAYS]){
        const ds=st.daySchedules[dk];
        if(!ds)continue;
        for(const dir of ['morning','afternoon']){
          const sc=ds[dir];
          if(sc?.routeId===rid&&sc.stop&&renamed[sc.stop]){
            sc.stop=renamed[sc.stop];
          }
        }
      }
    }
  }
  // 신규 항목 추가
  const pend=S._pendingStops||[];
  let added=0;
  for(const item of pend){
    if(!item.stop.trim())continue;
    if(S.db.routeStops[rid].some(x=>(typeof x==='object'?x.stop:x)===item.stop.trim()))continue;
    S.db.routeStops[rid].push({stop:item.stop.trim(),time:fmtTimeStr(item.time||'')});
    added++;
  }
  S._pendingStops=[];
  S._stopEdits={};
  save();
  showToast(`✅ 저장 완료 (수정 ${changed}개, 추가 ${added}개)`);
  render();
}
// 정류장 이름 수정 저장
function updateStopName(rid,idx,val){
  if(!S.db.routeStops[rid])return;
  const item=S.db.routeStops[rid][idx];
  if(typeof item==='object')S.db.routeStops[rid][idx].stop=val.trim();
  else S.db.routeStops[rid][idx]={stop:val.trim(),time:''};
  // save()는 saveStopsAll에서만 호출
}
function updateStopTime(rid,idx,val){
  if(!S.db.routeStops[rid])return;
  const item=S.db.routeStops[rid][idx];
  if(typeof item==='object')S.db.routeStops[rid][idx].time=val;
  else S.db.routeStops[rid][idx]={stop:item,time:val};
  // save()는 saveStopsAll에서만 호출
}
function sortStopsByTime(rid){
  const arr=S.db.routeStops[rid];
  if(!arr)return;
  arr.sort((a,b)=>{
    const ta=typeof a==='object'?a.time:'';
    const tb=typeof b==='object'?b.time:'';
    if(!ta&&!tb)return 0;
    if(!ta)return 1;
    if(!tb)return -1;
    return ta.localeCompare(tb);
  });
}
function deleteStop(rid,idx){
  const item=S.db.routeStops[rid]?.[idx];
  if(!item)return;
  const stopName=typeof item==='object'?item.stop:item;
  const cnt=getStopStudentCount(rid,stopName);
  const msg=cnt>0
    ?`"${stopName}"\n\n현재 ${cnt}명이 이 정류장을 사용 중입니다.\n삭제하면 해당 학생들의 정류장이 임시로 표시됩니다.\n\n정말 삭제하시겠습니까?`
    :`"${stopName}"\n\n이 정류장을 삭제하시겠습니까?`;
  if(!confirm(msg))return;
  S.db.routeStops[rid].splice(idx,1);
  save();
  showToast(`🗑️ "${stopName}" 삭제됨`);
  render();
}
function moveStop(rid,idx,dir){
  const arr=S.db.routeStops[rid];
  if(!arr)return;
  const ni=idx+dir;
  if(ni<0||ni>=arr.length)return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
  save();render();
}

      ondrop="clsDrop(event,'${key}',${i})"

function addPendingClass(school){
  if(!S._pendingClasses)S._pendingClasses={altiora:[],petamus:[],pangram:[]};
  S._pendingClasses[school].push('');
  render();
  setTimeout(()=>{
    const inputs=document.querySelectorAll('#app input[oninput*="_pendingClasses"]');
    if(inputs.length)inputs[inputs.length-1].focus();
  },30);
}
function saveAllClasses(){
  if(!S.db.classes)S.db.classes={altiora:[],petamus:[],pangram:[]};
  let added=0;
  // _pendingClasses에서 저장
  for(const key of ['altiora','petamus','pangram']){
    const pend=(S._pendingClasses?.[key]||[]);
    // DOM에서 실시간 값을 다시 읽기
    const inputs=document.querySelectorAll(`input[data-cls-key="${key}"]`);
    inputs.forEach((inp,i)=>{ if(pend[i]!==undefined) pend[i]=inp.value; });
    const vals=pend.filter(v=>v&&v.trim());
    for(const v of vals){
      if(!S.db.classes[key].includes(v.trim())){S.db.classes[key].push(v.trim());added++;}
    }
  }
  S._pendingClasses={altiora:[],petamus:[],pangram:[]};
  save();
  showToast(added>0?`✅ 반 ${added}개 저장 완료`:'✅ 저장 완료');
  render();
}
function addClass(school){
  markDirty();
  if(!S.db.classes)S.db.classes={altiora:[],petamus:[],pangram:[]};
  S.db.classes[school].push('');
  save();render();
}
// ─── 반 순서 드래그 ───
let _clsDrag={school:null,fromIdx:null};
function clsDragStart(e,school,idx){
  _clsDrag={school,fromIdx:idx};
  e.target.closest('[draggable]').style.opacity='0.4';
  e.dataTransfer.effectAllowed='move';
}
function clsDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='#e0f2fe';
}
function clsDrop(e,school,toIdx){
  e.preventDefault();
  e.currentTarget.style.background='';
  if(_clsDrag.school!==school||_clsDrag.fromIdx===toIdx)return;
  const arr=S.db.classes[school];
  const [moved]=arr.splice(_clsDrag.fromIdx,1);
  arr.splice(toIdx,0,moved);
  // 학생 cls는 이름 자체가 저장되므로 순서 변경해도 영향 없음
  save();
  showToast('✅ 반 순서 변경됨');
  render();
}
function clsDragEnd(e){
  _clsDrag={school:null,fromIdx:null};
  document.querySelectorAll('[draggable]').forEach(el=>el.style.opacity='');
  document.querySelectorAll('[draggable]').forEach(el=>el.style.background='');
}

// ─── 노선 순서 드래그 ───
let _routeDrag={busId:null,fromId:null};
function routeDragStart(e,busId,rid){
  _routeDrag={busId,fromId:rid};
  e.target.closest('[draggable]').style.opacity='0.4';
  e.dataTransfer.effectAllowed='move';
}
function routeDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='#e0f2fe';
}
function routeDrop(e,busId,toId){
  e.preventDefault();
  e.currentTarget.style.background='';
  if(_routeDrag.busId!==busId||_routeDrag.fromId===toId)return;
  const routes=getBusRoutes(busId);
  const ids=routes.map(r=>r.id);
  const fromIdx=ids.indexOf(_routeDrag.fromId);
  const toIdx=ids.indexOf(toId);
  if(fromIdx<0||toIdx<0)return;
  ids.splice(fromIdx,1);
  ids.splice(toIdx,0,_routeDrag.fromId);
  if(!S.db.routeOrder)S.db.routeOrder={};
  S.db.routeOrder[busId]=ids;
  save();
  showToast('✅ 노선 순서 변경됨');
  render();
}
function routeDragEnd(e){
  _routeDrag={busId:null,fromId:null};
  document.querySelectorAll('[draggable]').forEach(el=>el.style.opacity='');
  document.querySelectorAll('[draggable]').forEach(el=>el.style.background='');
}

function renameClass(school,idx,newName){
  const trimmed=newName.trim();
  if(!trimmed)return;
  if(!S.db.classes)return;
  const old=S.db.classes[school]?.[idx];
  if(!old||old===trimmed)return;
  S.db.classes[school][idx]=trimmed;
  // 해당 반 소속 학생들도 업데이트
  S.db.students.forEach(s=>{if(s.school===school&&s.cls===old)s.cls=trimmed;});
  save();
  showToast(`✅ 반 이름: "${old}" → "${trimmed}" 변경 완료`);
}
function removeClassConfirm(school,idx,label){
  const affectedStudents=S.db.students.filter(s=>s.active&&s.school===school&&s.cls===label);
  const msg=affectedStudents.length>0
    ?`"${label}" 반을 삭제하시겠습니까?\n\n⚠️ 이 반 소속 학생 ${affectedStudents.length}명의 반이 미배정으로 변경됩니다.\n(학생 데이터는 삭제되지 않습니다)`
    :`"${label}" 반을 삭제하시겠습니까?`;
  if(!confirm(msg))return;
  removeClass(school,idx,label);
}
function removeClass(school,idx,label){
  markDirty();
  S.db.classes[school].splice(idx,1);
  // 해당 반 소속 학생 → 반 미배정으로
  let cleared=0;
  S.db.students.forEach(s=>{if(s.school===school&&s.cls===label){s.cls='';cleared++;}});
  save();
  showToast(cleared>0?`🗑️ "${label}" 반 삭제 완료 (학생 ${cleared}명 반 미배정)`:`🗑️ "${label}" 반 삭제 완료`);
  render();
}
function updateClass(school,idx,val){
  markDirty();
  S.db.classes[school][idx]=val;
  // save()는 saveAllClasses에서만 호출
}

      +'<span style="font-size:13px;font-weight:900;color:'+tc+'">'+ko+'</span>'
      +'</label>';
  }).join('');
  return '<div style="margin-top:10px;padding:10px;background:#fff;border:1.5px solid #c7d2fe;border-radius:8px">'
    +'<div style="font-size:11px;color:#6b7280;margin-bottom:8px">등원하는 요일을 선택하세요. 나머지는 <strong>미등원</strong>으로 처리됩니다.</div>'
    +'<div style="display:flex;gap:7px;margin-bottom:10px">'+rows+'</div>'
    +'<div style="display:flex;gap:7px">'
    +'<button onclick="confirmCustomDayPreset(\''+sid+'\')" class="btn btn-pr" style="flex:1">✅ 적용</button>'
    +'<button onclick="S._customDayOpen=false;render()" class="btn btn-sec" style="padding:8px 14px">취소</button>'
    +'</div>'
    +'</div>';
}
function openCustomDayPreset(){
  S._customDayOpen=!S._customDayOpen;
  if(S._customDayOpen) S._customDays=[...DAYS];
  render();
}
function confirmCustomDayPreset(sid){
  const days=S._customDays||[];
  if(days.length===0){alert('최소 1개 이상 선택해주세요');return;}
  S._customDayOpen=false;
  applyDayPresetDays(sid,days,null);
  S._customDays=null;
}

function submitAdminLogin(){
  const inp=document.getElementById('admin_pw_inp');
  const pw=inp?inp.value:'';
  if(pw===S.db.settings.adminPw){
    S.adminMode=true;
    sessionStorage.setItem('adminMode','1');
    closeModal();
    render();
    showToast('🔓 관리자 모드');
  } else {
    const attempts=(S.modal.data.attempts||0)+1;
    if(attempts>=5){
      closeModal();
      showToast('⛔ 비밀번호 5회 오류');
      return;

function buildChangeModal(d){
  const {date,preRouteId,preStudentId,ct}=d;
  const ctype=ct||'absent';
  const selSid=d.selSid||preStudentId||'';
  const selRid=d.selRid||preRouteId||'';
  const selSt=selSid?getStudent(selSid):null;
  const selRoute=selRid?getRoute(selRid):null;
  const origSched=selSt&&selRid?selSt.schedules?.[selRid]:null;
  const dk=getDK(date);

  // 학생의 노선 목록 - daySchedules 기반 (구 schedules 폴백)
  function getStudentRoutes(st, dk){
    const routes=new Set();
    if(st.daySchedules){
      const ds=st.daySchedules;
      const keys=['default',...Object.keys(ds).filter(k=>k!=='default')];
      for(const key of keys){
        const dv=ds[key];
        if(!dv)continue;
        for(const dir of['morning','afternoon']){
          const rid=dv[dir]?.routeId;
          if(rid&&rid!=='__individual__'&&rid!=='__absent__'){
            const r=getRoute(rid);
            if(r&&routeActiveOnDay(r,dk))routes.add(rid);
          }
        }
      }
    }
    // 구형 schedules 폴백
    if(routes.size===0&&st.schedules){
      for(const rid of Object.keys(st.schedules)){
        const r=getRoute(rid);
        if(r&&routeActiveOnDay(r,dk))routes.add(rid);
      }
    }
    return [...routes].map(rid=>getRoute(rid)).filter(Boolean);
  }

  const stRoutes=selSt?getStudentRoutes(selSt,dk):[];
  const stMorningRoutes=stRoutes.filter(r=>r.dir==='morning');
  const stAfternoonRoutes=stRoutes.filter(r=>r.dir==='afternoon');
  const allTodayRoutes=INIT_BUSES.flatMap(b=>getBusRoutes(b.id).filter(r=>routeActiveOnDay(r,dk)));
  const routeOpts=stRoutes.length?stRoutes:allTodayRoutes;

  // 호차변경: 입력한 정류장이 있는 노선 자동 필터
  const busChgStop=d.toStop||'';
  let targetRoutes=allTodayRoutes.filter(r=>r.id!==selRid&&(selRoute?r.dir===selRoute.dir:true));
  if(busChgStop.trim()){
    const kw=busChgStop.trim().toLowerCase();
    const matchRoutes=targetRoutes.filter(r=>{
      const stops=getStopsForRoute(r.id);
      return stops.some(s=>s.toLowerCase().includes(kw)||kw.includes(s.toLowerCase().slice(0,4)));
    });
    if(matchRoutes.length)targetRoutes=matchRoutes;
  }

  // 호차변경 정류장 검증
  let transferHtml='';
  if(ctype==='bus_change'&&d.toRouteId&&busChgStop){
    const stops=getStopsForRoute(d.toRouteId);
    const kw=busChgStop.trim().toLowerCase();
    const match=stops.find(s=>s.toLowerCase().includes(kw)||kw.includes(s.toLowerCase().slice(0,4)));
    if(match){
      transferHtml=`<div class="t-chk ok"><div class="t-chk-t">✅ 이동 가능</div><div class="t-chk-d">정류장: ${esc(match)}</div></div>`;
    }
  }

  const CTYPES=[
    ['absent','🚫','결석'],
    ['individual_both','🚶','개별 등하원'],
    ['individual_morning','🌅','개별 등원'],
    ['individual_afternoon','🌇','개별 하원'],
    ['period_absent','📅','결석기간'],
    ['bus_change','🔄','호차 변경'],
    ['stop_change','📍','정류장 변경'],
  ];

  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="modal-hdr"><span class="modal-t">✏️ 변경 등록</span><button class="btn-x" onclick="closeModal()">×</button></div>

  <!-- ① 날짜 -->
  <div style="background:#f0f4ff;border-radius:8px;padding:8px 12px;margin-bottom:13px;font-size:13px;font-weight:800;color:var(--pr);border-left:4px solid var(--pr)">
    📅 ${fmtDate(date)} (${DAY_KO[dk]||''}요일)
  </div>

  <!-- ② 학생 선택 -->
  <div class="fg"><label>학생</label>
    <select id="m_st" onchange="S.modal.data.selSid=this.value;S.modal.data.selRid='';render()">
      <option value="">-- 학생 선택 --</option>
      ${S.db.students.filter(s=>s.active).map(s=>`<option value="${s.id}" ${selSid===s.id?'selected':''}>${esc(s.name)}${s.cls?' ('+s.cls+')':''}</option>`).join('')}

        <input type="radio" name="ct" value="${k}" ${ctype===k?'checked':''} onchange="S.modal.data.ct=this.value;S.modal.data.selRid='';S.modal.data.toStop='';S.modal.data.toRouteId='';S._stopChgDirect=false;render()" style="display:none">
        <span style="font-size:15px">${ic}</span>
        <span style="font-size:9px;font-weight:800;color:${ctype===k?'var(--pr)':'#374151'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center">${lb}</span>
      </label>`).join('')}
    </div>
  </div>

  <!-- ⑤ 유형별 추가 입력 -->
  ${ctype==='period_absent'?`

  ${ctype==='bus_change'?`

      ${targetRoutes.map(r=>`<option value="${r.id}" ${d.toRouteId===r.id?'selected':''}>[${r.busId}호] ${getRouteLabel(r.id)} ${getRouteTime(r.id)}</option>`).join('')}

  ${d.toRouteId?`

          stuTimeMap[dv.afternoon.stop]=stuTimeMap[dv.afternoon.stop]||dv.afternoon.pickupTime;

    const stopList=stopItems.length

    window._busChgStopMap={};

    if(isDirect||!stopList.length){
      return `<div style="display:flex;gap:6px;align-items:center">

    if(!r)return `<span style="font-size:11px;color:#9ca3af">-</span>`;

  // 요일별 예외 정리

    return ov.morning?.routeId||ov.afternoon?.routeId;

  return `<div class="overlay" onclick="if(event.target===this)closeModal()">

// 정류장 선택 UI: 드롭다운(등록된 정류장) + 직접입력 토글
function stopSelectBlock(rid,curStop,onChangeCb,uniqId,onTimeCb){
  const rawStops=S.db.routeStops?.[rid]||[];
  const regStops=rawStops.map(x=>typeof x==='object'?x.stop:x).filter(Boolean);
  const isCustom=curStop&&!regStops.includes(curStop);
  // 명시적으로 토글한 경우 우선, 아니면 isCustom 기본값
  const hasExplicit=S['_directStop_'+uniqId]!==undefined;
  const isDirect=hasExplicit ? S['_directStop_'+uniqId] : isCustom;

  // 정류장→시간 맵: 학생 탑승시간 기반으로만 구성
  const stopTimeMap={};
  S.db.students.forEach(st=>{
    if(!st.daySchedules)return;
    for(const dv of Object.values(st.daySchedules)){
      for(const d2 of['morning','afternoon']){
        const sc=dv?.[d2];
        if(sc?.routeId===rid&&sc.stop&&sc.pickupTime&&!stopTimeMap[sc.stop])
          stopTimeMap[sc.stop]=sc.pickupTime;
      }
    }
  });

  // 전역 저장 (onchange에서 사용)
  window['_stm_'+uniqId]=stopTimeMap;

  // 자동채움 콜백
  const autoTimeJs=onTimeCb?`(function(){var _t=applyAutoTime('${uniqId}',v);if(_t){${onTimeCb}}})()`:`''`;

  return `<div class="fg" style="margin:5px 0 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
      <label style="margin:0">정류장</label>
      <button type="button" onclick="S['_directStop_${uniqId}']=${isDirect?'false':'true'};render()"
        style="border:none;background:none;font-size:10px;color:var(--pr);cursor:pointer;text-decoration:underline;padding:0">
        ${isDirect?'▲ 목록에서 선택':'✏️ 직접 입력'}
      </button>
    </div>
    ${isDirect
      ?`<div style="display:flex;gap:6px;align-items:center">
          <input value="${esc(curStop)}" placeholder="정류장 이름 직접 입력..."
            style="flex:1"
            data-stopinputid="${uniqId}"
            onkeydown="event.stopPropagation()"
            oninput="S._ime||(function(v){${onChangeCb}})(this.value)"
            oncompositionstart="S._ime=true"
            oncompositionend="S._ime=false;(function(v){${onChangeCb}})(this.value)">
          ${isCustom?`<span style="background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:4px;font-size:10px;white-space:nowrap;flex-shrink:0">임시</span>`:''}
        </div>`
      :`<select data-stopselectid="${uniqId}" onchange="const v=this.value;${onChangeCb};${autoTimeJs}">
          <option value="">── 선택하세요</option>
          ${rawStops.map(item=>{
            const sn=typeof item==='object'?item.stop:item;
            return `<option value="${esc(sn)}" ${sn===curStop?'selected':''}>${esc(sn)}</option>`;
          }).join('')}
          ${regStops.length===0?`<option disabled>등록된 정류장 없음 (설정→정류장에서 등록)</option>`:''}
        </select>`
    }
  </div>`;
}

function buildEditStudentRoutes(s,routesByBus){
  const sid=s.id;
  const ds=s.daySchedules||{default:{morning:null,afternoon:null}};
  const def=ds.default||{morning:null,afternoon:null};
  const allRoutes=INIT_BUSES.flatMap(b=>getBusRoutes(b.id));
  const mRoutes=allRoutes.filter(r=>r.dir==='morning');
  const aRoutes=allRoutes.filter(r=>r.dir==='afternoon');

  function rOpts(routes,selRid){
    const indvSel=selRid==='__individual__'?'selected':'';
    return `<option value="">── 없음</option>`
      +`<option value="__individual__" ${indvSel}>🚶 개별 등원/하원</option>`
      +routes.map(r=>{
        const dStr=r.days?.length===5?'월~금':(r.days||[]).map(d=>DAY_KO[d]).join('·');
        return `<option value="${r.id}" ${selRid===r.id?'selected':''}>[${r.busId}호차] ${getRouteLabel(r.id)} (${dStr} ${getRouteTime(r.id)})</option>`;
      }).join('');
  }

  function dirBlock(dir,label,emoji,accentCol,bg,routes,sc,prefix){
    const rid=sc?.routeId||'';
    const curStop=sc?.stop||'';
    const curTime=sc?.pickupTime||'';
    return `<div style="background:${bg};border-radius:8px;padding:10px 12px">
      <div style="font-size:11px;font-weight:900;color:${accentCol};margin-bottom:8px">${emoji} ${label}</div>
      <div class="fg" style="margin:0"><label>호차·노선</label>
        <select onchange="updateDefSched('${sid}','${dir}','routeId',this.value)">${rOpts(routes,rid)}</select>
      </div>
      ${rid&&rid!=='__individual__'?stopSelectBlock(rid,curStop,
        `updateDefSched('${sid}','${dir}','stop',v)`,
        'def_'+prefix,
        `updateDefSched('${sid}','${dir}','pickupTime',_t);`
      ):(rid?`<div style="font-size:11px;color:#7c3aed;font-weight:700;padding:4px 0">🚶 차량을 이용하지 않습니다</div>`:(`<div style="font-size:10px;color:#aaa;padding:4px 0">노선을 선택하면 정류장 입력칸이 나타납니다</div>`))}
      ${rid&&rid!=='__individual__'?`
      <div class="fg" style="margin:5px 0 0"><label>탑승 시간 <span style="font-size:9px;color:#9ca3af;font-weight:400">24시간제 · 정류장 선택 시 자동채움</span></label>
        <input type="text" value="${esc(curTime)}" placeholder="예: 09:30" maxlength="5"
          data-timeinput="def_${prefix}"
          oninput="updateDefSched('${sid}','${dir}','pickupTime',this.value)"
          onblur="fmtTime(this);updateDefSched('${sid}','${dir}','pickupTime',this.value)"
          onkeydown="event.stopPropagation()"
          style="border:1.5px solid ${accentCol};border-radius:7px;padding:6px 10px;font-size:13px;font-weight:700;font-family:inherit;outline:none;color:${accentCol};width:100%;box-sizing:border-box;text-align:center;letter-spacing:1px">
      </div>`:''}
    </div>`;
  }

  // 요일별 예외 행
  function overrideRow(dk){
    const dayLabel=DAY_KO[dk];
    const ov=ds[dk]||{};
    const hasM=!!ov.morning?.routeId;
    const hasA=!!ov.afternoon?.routeId;
    const hasDiff=hasM||hasA;
    const isOpen=!!S._ovOpen[dk];
    const defMLabel=def.morning?.routeId==='__individual__'?'🚶 개별등원':def.morning?.routeId==='__absent__'?'❌ 미등원':def.morning?.routeId?`[${getRoute(def.morning.routeId)?.busId||'?'}호] ${getRouteLabel(def.morning.routeId)}`:'-';
    const defALabel=def.afternoon?.routeId==='__individual__'?'🚶 개별하원':def.afternoon?.routeId==='__absent__'?'❌ 미등원':def.afternoon?.routeId?`[${getRoute(def.afternoon.routeId)?.busId||'?'}호] ${getRouteLabel(def.afternoon.routeId)}`:'-';
    const mIndiv=ov.morning?.routeId==='__individual__';
    const aIndiv=ov.afternoon?.routeId==='__individual__';
    const mAbsent=ov.morning?.routeId==='__absent__';
    const aAbsent=ov.afternoon?.routeId==='__absent__';

    function dirSummary(has,isAbsent,indiv,ov_dir,defLabel,emoji){
      if(!has)return `${emoji} 기본(${defLabel})`;
      if(isAbsent)return `${emoji} <strong style="color:#94a3b8">❌ 미등원</strong>`;
      if(indiv)return `${emoji} <strong style="color:#7c3aed">🚶 개별</strong>`;
      return `${emoji} <strong style="color:var(--pr)">[${getRoute(ov_dir?.routeId)?.busId||'?'}호] ${getRouteLabel(ov_dir?.routeId||'')} ${ov_dir?.stop||''}</strong>`;
    }

    function dirBlock_ov(dir,emoji,accentCol,bg,routes,ov_dir,hasDir,isIndiv,dk){
      const isAbsent=ov_dir?.routeId==='__absent__';
      const showStop=hasDir&&!isIndiv&&!isAbsent;
      return `<div style="background:${bg};border-radius:7px;padding:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:10px;font-weight:900;color:${accentCol}">${emoji} ${dir==='morning'?'등원':'하원'}</span>
          ${hasDir?`<button onclick="clearOvDir('${sid}','${dk}','${dir}')"
            style="border:none;background:#fee2e2;color:#dc2626;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;font-family:inherit">기본값으로</button>`:''}
        </div>
        <div class="fg" style="margin:0 0 5px"><label>설정</label>
          <select onchange="updateOvSched('${sid}','${dk}','${dir}','routeId',this.value)">
            <option value="">── 기본값 사용</option>
            <option value="__absent__" ${isAbsent?'selected':''}>❌ 미등원 (이 날 안 옴)</option>
            <option value="__individual__" ${isIndiv?'selected':''}>🚶 개별 (차 안 타고 옴)</option>
            ${routes.map(r=>`<option value="${r.id}" ${ov_dir?.routeId===r.id&&!isIndiv&&!isAbsent?'selected':''}>[${r.busId}호] ${getRouteLabel(r.id)}</option>`).join('')}
          </select>
        </div>
        ${isAbsent?`<div style="font-size:11px;color:#94a3b8;font-weight:700;padding:4px 0">❌ 이 날은 등원하지 않습니다</div>`:''}
        ${isIndiv?`<div style="font-size:11px;color:#7c3aed;font-weight:700;padding:4px 0">🚶 차량을 이용하지 않습니다</div>`:''}
        ${showStop?`
        ${stopSelectBlock(ov_dir.routeId,ov_dir?.stop||'',
          `updateOvSched('${sid}','${dk}','${dir}','stop',v)`,
          'ov_'+dk+'_'+dir,
          `updateOvSched('${sid}','${dk}','${dir}','pickupTime',_t);`
        )}
        <div class="fg" style="margin:5px 0 0"><label>탑승 시간 <span style="font-size:9px;color:#9ca3af;font-weight:400">24시간제</span></label>
          <input type="text" value="${esc(ov_dir?.pickupTime||'')}" placeholder="예: 09:30 (24시간제)" maxlength="5"
            data-timeinput="ov_${dk}_${dir}"
            onchange="fmtTime(this);updateOvSched('${sid}','${dk}','${dir}','pickupTime',this.value)"
            style="border:1.5px solid ${accentCol};border-radius:7px;padding:5px 9px;font-size:13px;font-weight:700;font-family:inherit;outline:none;color:${accentCol};width:100%;box-sizing:border-box;text-align:center;letter-spacing:1px">
        </div>`:''}
      </div>`;
    }

    return `<div style="border:1.5px solid ${hasDiff?'#c7d2fe':'#e5e7eb'};border-radius:9px;overflow:hidden;margin-bottom:6px">
      <!-- 요일 헤더 -->
      <div style="display:flex;align-items:center;padding:7px 12px;background:${hasDiff?'#eef2ff':'#fafafa'};gap:10px;cursor:pointer"
        onclick="toggleOvRow('${dk}')">
        <span style="font-size:13px;font-weight:900;color:${hasDiff?'var(--pr)':'#9ca3af'};min-width:28px">${dayLabel}</span>
        ${hasDiff?`<span style="font-size:10px;color:var(--pr);font-weight:700">예외 설정됨</span>`
          :`<span style="font-size:10px;color:#d1d5db">기본값 사용중</span>`}
        <span style="margin-left:auto;font-size:11px;color:#9ca3af" id="ov_arrow_${dk}">${isOpen?'▲':'▼'}</span>
      </div>
      <!-- 요약 -->
      <div id="ov_summary_${dk}" style="padding:5px 12px 7px;background:${hasDiff?'#f5f3ff':'#f9fafb'};font-size:10px;color:#6b7280;display:flex;gap:12px;flex-wrap:wrap">
        <span>${dirSummary(hasM,mAbsent,mIndiv,ov.morning,defMLabel,'🌅')}</span>
        <span>${dirSummary(hasA,aAbsent,aIndiv,ov.afternoon,defALabel,'🌇')}</span>
      </div>
      <!-- 상세 설정 -->
      <div id="ov_detail_${dk}" style="display:${isOpen?'block':'none'};padding:10px 12px;background:#fff;border-top:1px solid #e5e7eb">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          ${dirBlock_ov('morning','🌅','var(--pr)','#f0f5ff',mRoutes,ov.morning,hasM,mIndiv,dk)}
          ${dirBlock_ov('afternoon','🌇','#b45309','#fffbeb',aRoutes,ov.afternoon,hasA,aIndiv,dk)}
        </div>
      </div>
    </div>`;
  }

  return `<div>
  <!-- ① 기본 배정 (월~금 공통) -->
  <div style="background:#f0f4ff;border-radius:10px;padding:13px;margin-bottom:14px;border:2px solid #c7d2fe">
    <div style="font-size:12px;font-weight:900;color:var(--pr);margin-bottom:10px">📅 기본 배정 (월~금 공통)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">
      ${dirBlock('morning','등원','🌅','var(--pr)','#eff6ff',mRoutes,def.morning,'m')}
      ${dirBlock('afternoon','하원','🌇','#b45309','#fffbeb',aRoutes,def.afternoon,'a')}
    </div>
    <div style="font-size:10px;color:#6b7280;margin-top:8px">💡 대부분의 날은 위 설정으로 운행됩니다. 특정 요일만 다르면 아래에서 예외를 설정하세요.</div>
  </div>

  <!-- ② 빠른 요일 프리셋 -->
  <div style="background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 13px;margin-bottom:14px">
    <div style="font-size:11px;font-weight:900;color:#374151;margin-bottom:8px">⚡ 빠른 요일 설정 <span style="font-size:10px;font-weight:400;color:#9ca3af">— 클릭 한 번으로 자동 적용</span></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button onclick="applyDayPreset('${sid}','all')"
        style="border:1.5px solid var(--pr);background:#eff6ff;color:var(--pr);border-radius:7px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit">
        📅 월~금
      </button>
      <button onclick="applyDayPreset('${sid}','mwf')"
        style="border:1.5px solid #7c3aed;background:#f5f3ff;color:#7c3aed;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit">
        📅 월·수·금
      </button>
      <button onclick="applyDayPreset('${sid}','tt')"
        style="border:1.5px solid #0e7490;background:#ecfeff;color:#0e7490;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit">
        📅 화·목
      </button>
    </div>
    ${buildCustomDayPickerInline(sid)}
  </div>

  <!-- ③ 요일별 예외 -->
  <div style="font-size:12px;font-weight:900;color:#374151;margin-bottom:8px">📌 요일별 예외 설정 <span style="font-size:10px;font-weight:400;color:#9ca3af">(기본값과 다른 요일만)</span></div>
  ${DAYS.map(dk=>overrideRow(dk)).join('')}

  <div class="btn-row" style="margin-top:14px">
    <button class="btn btn-success" onclick="saveStudentRoutes('${sid}')">💾 저장 완료</button>
    <button class="btn btn-sec" onclick="closeModal()">닫기</button>
  </div>
</div>`;
}

function buildEditStudentPlan(s){
  const sid=s.id;
  const today=todayStr();
  // 이 학생의 미래 예약된 변경 목록 수집
  const future=[];
  for(const [date,arr] of Object.entries(S.db.dailyChanges||{})){
    for(const c of arr){
      if(c.studentId!==sid||c.undone)continue;
      if((c.type==='period_absent'||c.type==='period_individual')&&c.endDate>=today)future.push({...c,_date:date});
      else if(c.type!=='period_absent'&&c.type!=='period_individual'&&date>=today)future.push({...c,_date:date});
    }
  }
  future.sort((a,b)=>(a._date||a.startDate||'').localeCompare(b._date||b.startDate||''));
  const allRoutes=INIT_BUSES.flatMap(b=>getBusRoutes(b.id));
  // 학생 본인 노선 (등원/하원) - 대상 노선 선택 시 사용
  const _def=s.daySchedules?.default||{};
  const _myMRid=_def.morning?.routeId&&!['__individual__','__absent__'].includes(_def.morning.routeId)?_def.morning.routeId:null;
  const _myARid=_def.afternoon?.routeId&&!['__individual__','__absent__'].includes(_def.afternoon.routeId)?_def.afternoon.routeId:null;
  const myRouteIds=[...new Set([_myMRid,_myARid].filter(Boolean))];
  const myRoutes=myRouteIds.map(rid=>getRoute(rid)).filter(Boolean);
  const typeKO={absent:'결석',individual:'개별등하원',individual_both:'개별 등하원',individual_morning:'개별 등원',individual_afternoon:'개별 하원',period_individual:'개별등하원(기간)',bus_change:'호차변경',stop_change:'정류장변경',period_absent:'결석(기간)'};
  const typeIco={absent:'🚫',individual:'🚶',individual_both:'🚶',individual_morning:'🌅',individual_afternoon:'🌇',bus_change:'🔄',stop_change:'📍',period_absent:'📅'};

  return `<div>
  <div class="note note-info">정기 휴원, 장기 결석, 특정 날짜 호차 변경 등 <strong>미리 예약된 변경</strong>을 관리합니다. 오늘이후 날짜만 등록하세요.</div>

  <!-- 예약 추가 -->
  <div style="background:#f8fafc;border:1.5px solid #c7d2fe;border-radius:9px;padding:13px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:900;color:var(--pr);margin-bottom:10px">＋ 새 예약 변경</div>
    <div class="fg-row2" style="margin-bottom:6px">
      <div class="fg" style="margin:0"><label>변경 유형</label>
        <select id="pc_type" onchange="var _d=document.getElementById('pc_date');if(_d)S._pcDate=_d.value;var _sd=document.getElementById('pc_sd');if(_sd)S._pcSd=_sd.value;var _ed=document.getElementById('pc_ed');if(_ed)S._pcEd=_ed.value;S._pcType=this.value;render()">
          <option value="absent" ${(S._pcType||'absent')==='absent'?'selected':''}>🚫 결석 (특정일)</option>
          <option value="period_absent" ${S._pcType==='period_absent'?'selected':''}>📅 결석 (기간)</option>
          <option value="individual" ${S._pcType==='individual'?'selected':''}>🚶 개별 (특정일)</option>
          <option value="period_individual" ${S._pcType==='period_individual'?'selected':''}>🚶 개별 (기간)</option>
          <option value="bus_change" ${S._pcType==='bus_change'?'selected':''}>🔄 호차 변경</option>
          <option value="stop_change" ${S._pcType==='stop_change'?'selected':''}>📍 정류장 변경</option>
        </select>
      </div>
      <div class="fg" style="margin:0">
        ${(S._pcType==='period_absent'||S._pcType==='period_individual')?`
          <label>기간</label>
          <div style="display:flex;gap:5px;align-items:center">
            <input type="date" id="pc_sd" min="${today}" value="${S._pcSd||today}" style="flex:1">
            <span style="font-size:11px;color:#6b7280">~</span>
            <input type="date" id="pc_ed" min="${today}" value="${S._pcEd||today}" style="flex:1">
          </div>
        `:`<label>날짜</label><input type="date" id="pc_date" min="${today}" value="${S._pcDate||today}">`}
      </div>
    </div>
    ${(S._pcType==='individual'||S._pcType==='period_individual')?`
    <div class="fg" style="margin-bottom:6px"><label>적용 방향</label>
      <div style="display:flex;gap:8px">
        ${[['both','🚶 등원+하원'],['morning','🌅 등원만'],['afternoon','🌇 하원만']].map(([v,l])=>`
        <label style="display:flex;align-items:center;gap:5px;padding:7px 12px;border:2px solid ${(S._pcDir||'both')===v?'var(--pr)':'#e5e7eb'};border-radius:8px;cursor:pointer;background:${(S._pcDir||'both')===v?'#eff6ff':'#fff'}">
          <input type="radio" name="pc_dir" value="${v}" ${(S._pcDir||'both')===v?'checked':''} onchange="var _d=document.getElementById('pc_date');if(_d)S._pcDate=_d.value;S._pcDir=this.value;render()" style="display:none">
          <span style="font-size:12px;font-weight:700;color:${(S._pcDir||'both')===v?'var(--pr)':'#6b7280'}">${l}</span>
        </label>`).join('')}
      </div>
    </div>`:''}
    ${(S._pcType||'absent')==='absent'||(S._pcType||'absent')==='period_absent'||(S._pcType||'absent')==='individual'||S._pcType==='period_individual'?'':`
    <div class="fg" style="margin-bottom:6px"><label>대상 노선 <span style="font-size:9px;color:#9ca3af;font-weight:400">(본인 배정 노선)</span></label>
      <select id="pc_rid" onchange="S._pcRid=this.value;S._pcToRid='';S._pcToStop='';S._pcToTime='';render()">
        <option value="">-- 노선 선택 --</option>
        ${(myRoutes.length?myRoutes:allRoutes).map(r=>`<option value="${r.id}" ${(S._pcRid||'')=== r.id?'selected':''}>[${r.busId}호] ${getRouteLabel(r.id)} (${r.dir==='morning'?'등원':'하원'})</option>`).join('')}
      </select>
    </div>
    ${S._pcType==='bus_change'?`
    <div class="fg" style="margin-bottom:6px"><label>이동할 노선</label>
      <select id="pc_torid" onchange="S._pcToRid=this.value;S._pcToStop='';S._pcToTime='';render()">
        <option value="">-- 노선 선택 --</option>
        ${allRoutes.filter(r=>r.id!==(S._pcRid||'')).map(r=>`<option value="${r.id}" ${(S._pcToRid||'')=== r.id?'selected':''}>[${r.busId}호] ${getRouteLabel(r.id)}</option>`).join('')}
      </select>
    </div>
    ${S._pcToRid?(()=>{
      const rawStops=(S.db.routeStops?.[S._pcToRid])||[];
      const stopItems=rawStops.map(x=>typeof x==='object'?x:{stop:x,time:''});
      // 학생 탑승시간 폴백
      const stuMap={};
      S.db.students.forEach(st=>{if(st.daySchedules){for(const dv of Object.values(st.daySchedules)){
        if(dv?.morning?.routeId===S._pcToRid&&dv.morning.stop&&dv.morning.pickupTime)stuMap[dv.morning.stop]=stuMap[dv.morning.stop]||dv.morning.pickupTime;
        if(dv?.afternoon?.routeId===S._pcToRid&&dv.afternoon.stop&&dv.afternoon.pickupTime)stuMap[dv.afternoon.stop]=stuMap[dv.afternoon.stop]||dv.afternoon.pickupTime;
      }}});
      const stopList=stopItems.length
        ?stopItems.map(x=>({stop:x.stop,time:x.time||stuMap[x.stop]||''}))
        :Object.entries(stuMap).map(([stop,time])=>({stop,time}));
      window._pcBusStopMap={};stopList.forEach(x=>{window._pcBusStopMap[x.stop]=x.time||'';});
      return `<div class="fg" style="margin-bottom:6px"><label>이동할 정류장</label>
        <select id="pc_tostop" onchange="S._pcToStop=this.value;var t=(window._pcBusStopMap||{})[this.value]||'';S._pcToTime=t;var ti=document.getElementById('pc_totime');if(ti)ti.value=t;">
          <option value="">── 정류장 선택 ──</option>
          ${stopList.map(x=>`<option value="${esc(x.stop)}" ${(S._pcToStop||'')=== x.stop?'selected':''}>${esc(x.stop)}${x.time?` (${x.time})`:''}</option>`).join('')}
        </select>
      </div>
      <div class="fg" style="margin-bottom:6px"><label>이동 후 시간 <span style="font-size:9px;font-weight:400">(자동채움, 수정가능)</span></label>
        <input id="pc_totime" type="text" placeholder="16:20" maxlength="5" onblur="fmtTime(this)" value="${S._pcToTime||''}" oninput="S._pcToTime=this.value" style="font-family:inherit;text-align:center;font-weight:700;letter-spacing:1px">
      </div>`;
    })():''}
    `:''}
    ${S._pcType==='stop_change'&&S._pcRid?(()=>{
      const rawStops=(S.db.routeStops?.[S._pcRid])||[];
      const stopItems=rawStops.map(x=>typeof x==='object'?x:{stop:x,time:''});
      const stuMap2={};
      S.db.students.forEach(st=>{if(st.daySchedules){for(const dv of Object.values(st.daySchedules)){
        if(dv?.morning?.routeId===S._pcRid&&dv.morning.stop&&dv.morning.pickupTime)stuMap2[dv.morning.stop]=stuMap2[dv.morning.stop]||dv.morning.pickupTime;
        if(dv?.afternoon?.routeId===S._pcRid&&dv.afternoon.stop&&dv.afternoon.pickupTime)stuMap2[dv.afternoon.stop]=stuMap2[dv.afternoon.stop]||dv.afternoon.pickupTime;
      }}});
      const stopList=stopItems.length
        ?stopItems.map(x=>({stop:x.stop,time:x.time||stuMap2[x.stop]||''}))
        :Object.entries(stuMap2).map(([stop,time])=>({stop,time}));
      window._pcStopMap={};stopList.forEach(x=>{window._pcStopMap[x.stop]=x.time||''});
      return `<div class="fg" style="margin-bottom:6px"><label>변경할 정류장</label>
        <select id="pc_tostop" onchange="S._pcToStop=this.value;var t=(window._pcStopMap||{})[this.value]||'';S._pcToTime=t;var ti=document.getElementById('pc_totime');if(ti)ti.value=t;">
          <option value="">── 정류장 선택 ──</option>
          ${stopList.map(x=>`<option value="${esc(x.stop)}" ${(S._pcToStop||'')=== x.stop?'selected':''}>${esc(x.stop)}${x.time?` (${x.time})`:''}</option>`).join('')}
        </select>
      </div>
      <div class="fg" style="margin-bottom:6px"><label>변경 후 시간 <span style="font-size:9px;font-weight:400">(자동채움, 수정가능)</span></label>
        <input id="pc_totime" type="text" placeholder="16:20" maxlength="5" onblur="fmtTime(this)" value="${S._pcToTime||''}" oninput="S._pcToTime=this.value" style="font-family:inherit;text-align:center;font-weight:700;letter-spacing:1px">
      </div>`;
    })():''}`}
    <div class="fg" style="margin-bottom:8px"><label>메모</label>
      <input id="pc_notes" placeholder="사유, 특이사항 등 (선택)" value="${S._pcNotes||''}"></div>
    <button class="btn btn-pr" style="width:100%;padding:11px 0;font-size:13px" onclick="savePlannedChange('${sid}')">💾 예약 저장</button>
  </div>

  ${S._pcSaved?`<div style="background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:9px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
    <span style="font-size:16px">✅</span>
    <div style="flex:1">
      <div style="font-size:12px;font-weight:900;color:#065f46">예약이 저장되었습니다</div>
      <div style="font-size:10px;color:#047857;margin-top:1px">${esc(S._pcSaved)}</div>
    </div>
    <button onclick="S._pcSaved=null;render()" style="border:none;background:none;cursor:pointer;color:#9ca3af;font-size:14px;padding:2px">×</button>
  </div>`:''}
  <!-- 등록된 예약 목록 -->
  <div style="font-size:12px;font-weight:900;color:#374151;margin-bottom:8px">📋 등록된 예약 (${future.length}건)</div>
  ${future.length===0?`<div style="border:2px dashed #e5e7eb;border-radius:9px;padding:20px;text-align:center;font-size:11px;color:#d1d5db">등록된 예약 변경이 없습니다</div>`:
  future.map(c=>{
    const r=getRoute(c.routeId);
    const dateStr=(c.type==='period_absent'||c.type==='period_individual')?`${c.startDate} ~ ${c.endDate}`:c._date;
    const dirKO_={both:'등원+하원',morning:'등원만',afternoon:'하원만'};
    const dirLabel=c.dir?` · ${dirKO_[c.dir]||c.dir}`:'';
    return `<div style="display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;margin-bottom:6px;background:#fff">
      <span style="font-size:16px;margin-top:1px">${typeIco[c.type]||'📌'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:800;color:#374151">${typeKO[c.type]||c.type}${dirLabel}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:2px">${dateStr}</div>
        ${r?`<div style="font-size:10px;color:#9ca3af">${r.busId}호차 ${getRouteLabel(r.id)}</div>`:''}
        ${c.toRouteId?`<div style="font-size:10px;color:var(--pr)">→ ${getRoute(c.toRouteId)?.label||c.toRouteId}</div>`:''}
        ${c.toStop?`<div style="font-size:10px;color:var(--pr)">→ ${c.toStop}</div>`:''}
        ${c.notes?`<div style="font-size:10px;color:#9ca3af;margin-top:2px">${esc(c.notes)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <button onclick="editPlannedChange('${sid}','${c.id}','${c._date||c.startDate}')"
          style="border:none;background:#eff6ff;color:var(--pr);border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">✏️ 수정</button>
        <button onclick="undoChange('${c._date||c.startDate}','${c.id}')"

function editPlannedChange(sid,cid,date){
  // 해당 예약 항목을 찾아서 폼에 불러오기
  const arr=getDayChanges(date)||[];
  const c=arr.find(x=>x.id===cid);
  if(!c)return;
  // 기존 항목 삭제
  const filtered=arr.filter(x=>x.id!==cid);
  setDayChanges(date,filtered);
  // 폼 상태에 기존 값 채우기
  S._pcType=c.type;
  S._pcDate=date;
  S._pcSd=c.startDate||date;
  S._pcEd=c.endDate||date;
  S._pcDir=c.dir||'both';
  S._pcRid=c.routeId==='all'?'':c.routeId;
  S._pcToRid=c.toRouteId||'';
  S._pcToStop=c.toStop||'';
  S._pcToTime=c.toTime||'';
  S._pcNotes=c.notes||'';
  S._pcSaved=null;
  showToast('✏️ 예약을 수정 모드로 불러왔습니다');
  render();
}
function savePlannedChange(sid){
  if(!S.adminMode){showToast('⚠️ 관리자 모드에서만 가능합니다');return;}
  const s=getStudent(sid);if(!s)return;
  const type=el('pc_type')?.value||'absent';
  const today=todayStr();
  const chg={id:uid(),studentId:sid,type,notes:el('pc_notes')?.value||'',timestamp:Date.now(),undone:false};
  let targetDate=el('pc_date')?.value||today;
  if(type==='period_absent'){
    const sd=el('pc_sd')?.value||today,ed=el('pc_ed')?.value||today;
    if(sd>ed){alert('시작일이 종료일보다 늦습니다');return;}
    chg.routeId='all';chg.startDate=sd;chg.endDate=ed;
    targetDate=sd;
  } else if(type==='period_individual'){
    const sd=el('pc_sd')?.value||today,ed=el('pc_ed')?.value||today;
    if(sd>ed){alert('시작일이 종료일보다 늦습니다');return;}
    const dir=document.querySelector('input[name="pc_dir"]:checked')?.value||'both';
    chg.routeId='all';chg.startDate=sd;chg.endDate=ed;chg.dir=dir;
    targetDate=sd;
  } else if(type==='individual'){
    const dir=document.querySelector('input[name="pc_dir"]:checked')?.value||'both';
    chg.routeId='all';chg.dir=dir;
  } else {
    const rid=S._pcRid||el('pc_rid')?.value||'';
    if((type==='bus_change'||type==='stop_change')&&!rid){alert('대상 노선을 선택하세요');return;}
    chg.routeId=rid||'all';
    if(type==='bus_change'){
      const toRid=S._pcToRid||el('pc_torid')?.value||'';
      if(!toRid){alert('이동할 노선을 선택하세요');return;}
      const toStop=S._pcToStop||el('pc_tostop')?.value||'';
      if(!toStop){alert('이동할 정류장을 선택하세요');return;}
      chg.toRouteId=toRid;
      chg.toStop=toStop;
      chg.toTime=S._pcToTime||el('pc_totime')?.value||'';
    }
    if(type==='stop_change'){
      const toStop=S._pcToStop||el('pc_tostop')?.value||'';
      if(!toStop){alert('변경할 정류장을 선택하세요');return;}
      chg.toStop=toStop;
      chg.toTime=S._pcToTime||el('pc_totime')?.value||'';
    }
  }
  if(!targetDate||(targetDate<today&&type!=='period_absent'&&type!=='period_individual')){alert('오늘 이후 날짜를 선택하세요');return;}
  const arr=getDayChanges(targetDate);
  arr.push(chg);setDayChanges(targetDate,arr);
  const dirLabel={both:'등원+하원',morning:'등원만',afternoon:'하원만'};
  const typeLabel={absent:'결석',individual:'개별등하원',individual_both:'개별 등하원',individual_morning:'개별 등원',individual_afternoon:'개별 하원',period_individual:'개별등하원(기간)',bus_change:'호차변경',stop_change:'정류장변경',period_absent:'결석(기간)'};
  const savedMsg=(type==='period_absent'||type==='period_individual')
    ?`${s.name} · ${typeLabel[type]}${chg.dir?` (${dirLabel[chg.dir]})`:''} · ${chg.startDate}~${chg.endDate}`
    :`${s.name} · ${typeLabel[type]}${chg.dir?` (${dirLabel[chg.dir]})`:''} · ${targetDate}`;
  S._pcType='absent';S._pcDate=todayStr();S._pcSd=todayStr();S._pcEd=todayStr();
  S._pcRid='';S._pcToRid='';S._pcToStop='';S._pcToTime='';S._pcNotes='';
  S._pcSaved=savedMsg;
  showToast(`✅ 예약 저장 완료`);
  render();
}
const typeKO={absent:'결석',individual:'개별등하원',individual_both:'개별 등하원',individual_morning:'개별 등원',individual_afternoon:'개별 하원',period_individual:'개별등하원(기간)',bus_change:'호차변경',stop_change:'정류장변경',period_absent:'결석(기간)'};

function saveEditRoute(rid){
  const label=el('ar_label')?.value?.trim();
  const time=el('ar_time')?.value?.trim();
  if(!label){alert('노선명을 입력하세요');return;}
  const days=[...document.querySelectorAll("input[name='ar_day']:checked")].map(x=>x.value);
  if(!days.length){alert('운행요일을 하나 이상 선택하세요');return;}
  const school=el('ar_school')?.value||'altiora';
  const dir=el('ar_dir')?.value||'morning';
  const r=getRoute(rid);
  const custom=(S.db.customRoutes||[]).find(x=>x.id===rid);
  if(!S.db.routeLabels)S.db.routeLabels={};
  if(!S.db.routeTimes)S.db.routeTimes={};
  if(!S.db.routeDays)S.db.routeDays={};
  if(!S.db.routeSchool)S.db.routeSchool={};
  if(!S.db.routeDir)S.db.routeDir={};
  if(!S.db.routeMemo)S.db.routeMemo={};
  if(custom){
    custom.label=label; custom.time=time;
    custom.days=days; custom.school=school; custom.dir=dir;
  }
  if(r&&label===r.label)delete S.db.routeLabels[rid]; else S.db.routeLabels[rid]=label;
  if(r&&time===r.time)delete S.db.routeTimes[rid]; else S.db.routeTimes[rid]=time;
  if(r&&JSON.stringify(days.sort())===JSON.stringify([...(r.days||[])].sort()))delete S.db.routeDays[rid]; else S.db.routeDays[rid]=days;
  if(r&&school===r.school)delete S.db.routeSchool[rid]; else S.db.routeSchool[rid]=school;
  if(r&&dir===r.dir)delete S.db.routeDir[rid]; else S.db.routeDir[rid]=dir;
  // 메모 저장 (빈 문자열이면 삭제)
  const memo=(el('ar_memo')?.value||'').trim();
  if(memo)S.db.routeMemo[rid]=memo; else delete S.db.routeMemo[rid];
  save();
  closeModal();
  showToast('✅ 노선 수정 완료');
}

function hasUnsavedChanges(){
  if(S._pendingStops&&S._pendingStops.length>0)return '정류장 미저장 항목이 있습니다';
  if(S._stopEdits&&Object.keys(S._stopEdits).length>0)return '정류장 수정 내용이 저장되지 않았습니다';
  if(S._pendingClasses){
    const has=Object.values(S._pendingClasses).some(a=>a.length>0);
    if(has)return '반 미저장 항목이 있습니다';
  }
  return null;
}

function saveRouteEdit(rid){
  const label=el('re_label')?.value?.trim();
  const time=el('re_time')?.value;
  if(!label){alert('노선명을 입력하세요');return;}
  const r=ROUTE_DEFS.find(x=>x.id===rid)||S.db.customRoutes?.find(x=>x.id===rid);
  if(!S.db.routeLabels)S.db.routeLabels={};
  if(!S.db.routeTimes)S.db.routeTimes={};
  if(r&&label===r.label)delete S.db.routeLabels[rid]; else S.db.routeLabels[rid]=label;
  if(r&&time===r.time)delete S.db.routeTimes[rid]; else S.db.routeTimes[rid]=time;
  save();

}
