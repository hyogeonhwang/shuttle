<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>셔틀버스 관리시스템 v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
// ════════════════════════════════════════════
// Firebase 설정
// ════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCdEi-5_bNA-sz_5-H3rUaIXJQJP3jLWF8",
  authDomain: "altiora-shuttle.firebaseapp.com",
  databaseURL: "https://altiora-shuttle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "altiora-shuttle",
  storageBucket: "altiora-shuttle.firebasestorage.app",
  messagingSenderId: "628380015073",
  appId: "1:628380015073:web:c0f9650e00a588204ddaa0"
};

// ════════════════════════════════════════════
// 공유 비밀번호 (Firebase에서 로드)
const DEFAULT_SHUTTLE_PASSWORD = 'altiora2026';
const PW_STORAGE_KEY = 'shuttle_auth_v1';
let _shuttlePassword = DEFAULT_SHUTTLE_PASSWORD;

const USE_FIREBASE = true;
let _fbDb = null;
let _fbRef = null;
let _fbAuth = null;
let _fbSaveTimer = null;
let _fbIgnoreUntil = 0;

function initFirebase(){
  if(!USE_FIREBASE) return false;
  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb = firebase.database();
    _fbAuth = firebase.auth();
    _fbRef = _fbDb.ref('shuttle_v4');
    return true;
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e);
    return false;
  }
}

// 비밀번호 확인 후 익명 로그인
function shuttleLogin(pw){
  if(pw !== _shuttlePassword){
    document.getElementById('pw_error').textContent = '❌ 비밀번호가 틀렸습니다.';
    return;
  }
  localStorage.setItem(PW_STORAGE_KEY, pw);
  doAnonymousLogin();
}

function doAnonymousLogin(){
  initFirebase();
  _fbAuth.signInAnonymously()
    .then(()=>{
      document.getElementById('pw_screen')?.remove();
      initDB();
    })
    .catch(e=>{
      console.error('익명 로그인 실패:', e);
      document.getElementById('pw_error').textContent = '❌ 서버 연결 실패. 새로고침 후 다시 시도해주세요.';
    });
}

// 비밀번호 화면 표시
function showPasswordScreen(){
  const div = document.createElement('div');
  div.id = 'pw_screen';
  div.style.cssText = 'position:fixed;inset:0;background:#1A3169;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px';
  div.innerHTML = `
    <div style="font-size:32px">🚌</div>
    <div style="color:#fff;font-size:20px;font-weight:900">셔틀버스 관리시스템</div>
    <div style="color:#C9A84C;font-size:13px;margin-bottom:8px">알티오라·페타무스·팬그램</div>
    <div style="background:#fff;border-radius:14px;padding:28px 32px;width:300px;display:flex;flex-direction:column;gap:12px">
      <div style="font-size:14px;font-weight:700;color:#1A3169;text-align:center">🔒 접속 비밀번호 입력</div>
      <input id="pw_input" type="password" placeholder="비밀번호를 입력하세요"
        style="border:2px solid #e2e6ef;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit"
        onkeydown="if(event.key==='Enter')shuttleLogin(this.value)"
        onfocus="this.style.borderColor='#1A3169'" onblur="this.style.borderColor='#e2e6ef'">
      <div id="pw_error" style="color:#dc2626;font-size:12px;min-height:16px;text-align:center"></div>
      <button onclick="shuttleLogin(document.getElementById('pw_input').value)"
        style="background:#1A3169;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
        입장하기
      </button>
    </div>
    <div style="color:rgba(255,255,255,0.4);font-size:11px">비밀번호는 담당자에게 문의하세요</div>
  `;
  document.body.appendChild(div);
  setTimeout(()=>document.getElementById('pw_input')?.focus(), 100);
}

// 앱 시작: 저장된 비밀번호 확인
function startApp(){
  // Firebase에서 앱 비밀번호 먼저 로드
  initFirebase();
  _fbDb.ref('appConfig/shuttlePassword').once('value').then(snap=>{
    if(snap.val()) _shuttlePassword = snap.val();
    const saved = localStorage.getItem(PW_STORAGE_KEY);
    if(saved === _shuttlePassword){
      _fbAuth.signInAnonymously()
        .then(()=>initDB())
        .catch(()=>{ localStorage.removeItem(PW_STORAGE_KEY); showPasswordScreen(); });
    } else {
      showPasswordScreen();
    }
  }).catch(()=>{
    // Firebase 접근 불가(규칙 차단 전) → 기본 비밀번호 사용
    const saved = localStorage.getItem(PW_STORAGE_KEY);
    if(saved === _shuttlePassword){
      _fbAuth.signInAnonymously()
        .then(()=>initDB())
        .catch(()=>{ localStorage.removeItem(PW_STORAGE_KEY); showPasswordScreen(); });
    } else {
      showPasswordScreen();
    }
  });
}
</script>
<style>
:root{
  --pr:#1A3169;--pr2:#243d85;--gold:#C9A84C;--cream:#F5F0E8;
  --bg:#edf0f7;--white:#fff;--border:#e2e6ef;
  --danger:#dc2626;--success:#16a34a;--warn:#d97706;--info:#0369a1;
  --shadow:0 2px 10px rgba(0,0,0,.08);--r:10px;
  --c2:#9c27b0;--c3:#673ab7;--c5:#1565c0;--c7:#2e7d32;--c8:#bf360c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:#1f2937;font-size:13px;-webkit-font-smoothing:antialiased}
a{color:var(--pr)}
button{cursor:pointer;font-family:inherit}

/* ── SIDEBAR ── */
.sidebar{width:200px;background:var(--pr);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.15)}
.sb-logo-t{font-size:15px;font-weight:900}
.sb-logo-s{font-size:10px;opacity:.6;margin-top:2px}
.sb-nav{flex:1;padding:8px 0}
.nav-it{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;font-size:12px;font-weight:700;transition:background .12s;border-right:3px solid transparent;white-space:nowrap}
.nav-it:hover{background:rgba(255,255,255,.1)}
.nav-it.on{background:rgba(255,255,255,.18);border-right-color:var(--gold)}
.nav-ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.15)}
.sb-admin-btn{display:flex;align-items:center;gap:7px;padding:8px 10px;background:rgba(255,255,255,.12);border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;transition:background .12s;border:none;color:#fff;width:100%}
.sb-admin-btn:hover{background:rgba(255,255,255,.22)}

/* ── MAIN ── */
.main{margin-left:200px;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:wrap}
.admin-topline{height:3px;background:linear-gradient(90deg,#dc2626,#f87171,#fca5a5,#f87171,#dc2626);background-size:300% 100%;animation:adminPulse 2s linear infinite}
@keyframes adminPulse{0%{background-position:0}100%{background-position:300%}}
.tb-date-wrap{display:flex;align-items:center;gap:8px}
.tb-date{border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;outline:none;color:#374151}
.day-chip{font-size:11px;font-weight:900;padding:4px 12px;border-radius:16px;background:var(--pr);color:#fff}
.day-chip.sat{background:#5b21b6}.day-chip.sun{background:#dc2626}
.chg-chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;background:#fef3c7;color:#92400e}
.tb-right{margin-left:auto;display:flex;gap:7px;align-items:center}

.content{padding:16px 18px}

/* ── MOBILE ── */
.m-hdr{display:none;position:fixed;top:0;left:0;right:0;background:var(--pr);color:#fff;padding:9px 10px;align-items:center;justify-content:space-between;z-index:200;gap:4px}
.m-hdr-t{font-size:14px;font-weight:900}
.m-hdr-s{font-size:10px;opacity:.65;margin-top:1px}
.m-btabs{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--border);z-index:200}
.m-btabs-inner{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.m-btabs-inner::-webkit-scrollbar{display:none}
.m-btab{flex:0 0 64px;display:flex;flex-direction:column;align-items:center;padding:7px 2px 5px;cursor:pointer;font-size:9px;color:#9ca3af;font-weight:800;gap:1px;white-space:nowrap}
.m-btab.on{color:var(--pr)}
.m-btab-ic{font-size:19px;line-height:1.2}

.tview-datebar{display:none}
@media(max-width:768px){
  .sidebar,.topbar{display:none!important}
  .m-hdr{display:flex}
  .m-btabs{display:block}
  .main{margin-left:0}
  .content{padding:10px 10px 76px;padding-top:60px}
  .tview-datebar{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .tview-nav{border:1.5px solid var(--border);background:#f9fafb;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:20px;font-weight:700;color:#374151;font-family:inherit;flex-shrink:0;line-height:1}
}

/* ── COMPONENTS ── */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:13px;overflow:hidden}
.card-hdr{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-t{font-size:14px;font-weight:900;color:var(--pr)}
.card-body{padding:15px}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:9px;margin-bottom:13px}
.stat-box{background:#fff;border-radius:8px;padding:11px 13px;box-shadow:var(--shadow);text-align:center}
.stat-v{font-size:22px;font-weight:900;color:var(--pr)}
.stat-l{font-size:10px;color:#9ca3af;margin-top:1px;font-weight:700}

/* School filter */
.sf-bar{background:#fff;border-radius:8px;padding:8px 11px;margin-bottom:11px;box-shadow:var(--shadow);display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.sf-bar::-webkit-scrollbar{display:none}
.sf-btn{padding:5px 13px;border-radius:14px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:#f3f4f6;color:#6b7280;white-space:nowrap;transition:all .12s}
.sf-btn.on{color:#fff}
.sf-btn[data-k="all"].on{background:var(--pr)}
.sf-btn[data-k="altiora"].on{background:var(--pr)}
.sf-btn[data-k="petamus"].on{background:#7c3f00}
.sf-btn[data-k="pangram"].on{background:#0e7490}

/* Bus grid */
.bus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px}
@media(max-width:768px){.bus-grid{grid-template-columns:1fr}}

/* Bus card */
.bc{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.bc-hdr{padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
.bc-num{color:#fff;font-size:20px;font-weight:900}
.bc-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.bc-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.bc-info{padding:7px 13px;background:#fafafa;border-bottom:1px solid var(--border);font-size:11px}
.bc-times{display:flex;gap:12px;padding:6px 13px;background:#eff6ff;border-bottom:1px solid #dbeafe;font-size:11px;font-weight:700;color:#1d4ed8}
.bc-route-sec{padding:9px 13px}
.bc-route-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.bc-route-lbl{font-size:11px;font-weight:900;color:#374151}
.bc-route-cnt{font-size:10px;color:#9ca3af}
.bc-route-div{height:1px;background:var(--border);margin:8px -13px}

/* Stop group */
.stop-grp{margin-bottom:8px}
.stop-bar{display:flex;align-items:center;gap:6px;background:#e8edf5;border-radius:7px;padding:5px 9px;margin-bottom:3px}
.t-badge{background:var(--pr);color:#fff;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:900;flex-shrink:0;letter-spacing:-.3px}
.stop-name{flex:1;font-size:12px;font-weight:700;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stop-cnt{font-size:11px;color:#6b7280;flex-shrink:0;font-weight:700}

/* Student item */
.sti{display:flex;align-items:center;padding:5px 8px;border-radius:7px;margin-bottom:2px;cursor:pointer;gap:6px;border:1.5px solid transparent;transition:all .1s}
.sti:hover{background:#f0f4ff;border-color:#c7d2fe}
.sti.absent{background:#fef2f2;border-color:#fecaca}
.sti.absent .stn{text-decoration:line-through double #dc2626;color:#9ca3af}
.sti.individual{background:#f9fafb}
.sti.individual .stn{text-decoration:line-through;color:#9ca3af}
.sti.tout{background:#f9fafb}
.sti.tout .stn{text-decoration:line-through;color:#d1d5db}
.sti.tin{background:#eff6ff;border-color:#93c5fd}
.sti.stopchg{background:#fffbeb;border-color:#fcd34d}
.sti.period_absent{background:#fef2f2;border-color:#fecaca}
.sti.period_absent .stn{text-decoration:line-through double #dc2626;color:#9ca3af}
.stn{font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:#111827}
.sc{font-size:10px;color:#9ca3af;flex-shrink:0;background:#f3f4f6;padding:1px 5px;border-radius:4px}
.pin{font-size:9px;padding:2px 6px;border-radius:7px;font-weight:800;flex-shrink:0}
.pin-abs{background:#fee2e2;color:#991b1b}
.pin-ind{background:#f3f4f6;color:#6b7280}
.pin-bus{background:#dbeafe;color:#1d4ed8}
.pin-stop{background:#fef3c7;color:#92400e}
.pin-period{background:#f5f3ff;color:#5b21b6}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f9fafb;padding:8px 10px;text-align:left;font-weight:800;color:#4b5563;border-bottom:2px solid var(--border);white-space:nowrap;font-size:11px}
td{padding:6px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:hover td{background:#fafbff}

/* Form */
.fg{margin-bottom:12px}
.fg label{font-size:10px;font-weight:900;color:#6b7280;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:inherit;outline:none;transition:border .12s;color:#1f2937;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pr)}
.fg textarea{resize:vertical;min-height:55px}
.fg-row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
@media(max-width:500px){.fg-row2,.fg-row3{grid-template-columns:1fr}}

/* Buttons */
.btn{padding:7px 14px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.btn-pr{background:var(--pr);color:#fff}.btn-pr:hover{background:var(--pr2)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-info{background:var(--info);color:#fff}
.btn-sec{background:#f3f4f6;color:#374151;border:1px solid var(--border)}.btn-sec:hover{background:#e5e7eb}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 7px;font-size:10px}
.btn-block{width:100%;justify-content:center}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:14px;padding-bottom:calc(14px + 56px);overflow-y:auto}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:500px;max-height:calc(90vh - 40px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto}
.modal-lg{max-width:680px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-t{font-size:16px;font-weight:900;color:var(--pr)}
.btn-x{background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;line-height:1}
.mtabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:0;overflow-x:auto}
.mtab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:700;color:#9ca3af;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.mtab.on{color:var(--pr);border-bottom-color:var(--pr)}

/* Notes */
.note{border-radius:7px;padding:9px 12px;font-size:11px;margin-bottom:11px;border:1px solid}
.note-warn{background:#fffbeb;border-color:#fde68a;color:#92400e}
.note-info{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.note-danger{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.note-success{background:#f0fdf4;border-color:#86efac;color:#166534}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800}
.badge-pr{background:#ede9fe;color:#4c1d95}
.badge-warn{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-success{background:#dcfce7;color:#166534}
.badge-gray{background:#f3f4f6;color:#6b7280}

/* Route mgmt */
.route-list{display:flex;flex-direction:column;gap:10px}
.route-card{border:2px solid var(--border);border-radius:10px;overflow:hidden}
.route-card-hdr{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fff}
.route-card-hdr:hover{background:#f8f9fb}
.route-card-body{padding:12px 14px;border-top:2px solid #f0f2f7;background:#fafbff}
.route-badge{font-size:12px;padding:4px 11px;border-radius:11px;font-weight:900;background:var(--pr);color:#fff;flex-shrink:0;letter-spacing:-.3px}
.route-label{font-size:14px;font-weight:900;color:#1f2937;line-height:1.3}
.route-meta{font-size:10px;color:#6b7280;margin-top:2px}
.route-times{font-size:11px;color:#1d4ed8;font-weight:700}
.route-toggle{font-size:14px;color:#9ca3af;margin-left:auto}

/* Change row */
.chg-row{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:7px;margin-bottom:6px;border:1px solid}
.chg-row.absent{border-color:#fca5a5;background:#fef2f2}
.chg-row.individual{border-color:#e5e7eb;background:#f9fafb}
.chg-row.bus_change{border-color:#93c5fd;background:#eff6ff}
.chg-row.stop_change{border-color:#fcd34d;background:#fffbeb}
.chg-row.period_absent{border-color:#c4b5fd;background:#f5f3ff}
.chg-row.undone{opacity:.5}
.chg-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.chg-info{flex:1;min-width:0}
.chg-nm{font-weight:800;font-size:12px}
.chg-ds{font-size:10px;color:#6b7280;margin-top:2px}

/* Teacher cards */
.tc{background:#f8f9ff;border:1.5px solid #e0e7ff;border-radius:8px;padding:11px;margin-bottom:9px}
.tc-name{font-weight:800;font-size:13px;color:var(--pr)}
.tc-ph{font-size:11px;color:#6b7280;margin-top:1px}
.tc-assigns{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.tc-ab{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:700;background:#e0e7ff;color:var(--pr)}

/* Transfer check */
.t-chk{border-radius:8px;padding:10px 12px;margin:9px 0;border:2px solid}
.t-chk.ok{border-color:#86efac;background:#f0fdf4}
.t-chk.no{border-color:#fca5a5;background:#fef2f2}
.t-chk-t{font-weight:900;font-size:12px}
.t-chk.ok .t-chk-t{color:#166534}
.t-chk.no .t-chk-t{color:#991b1b}
.t-chk-d{font-size:10px;color:#6b7280;margin-top:3px}

/* Upload */
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--pr);background:#eff6ff}
.undo-bar{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:#92400e;font-weight:700}

.sep{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:24px;color:#d1d5db;font-size:12px}
.srch{position:relative}
.srch input{width:100%;padding:8px 30px 8px 34px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box}
.srch::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px}
.srch-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:2px 5px;border-radius:4px;display:block}
.srch-clear:hover{color:#374151;background:#f3f4f6}
.srch input:placeholder-shown ~ .srch-clear{display:none}

@media print{
  .sidebar,.topbar,.m-hdr,.m-btabs,.btn,.btn-row,.db-actions,
  .sf-bar,#share_text,button{display:none!important}
  .main{margin-left:0}
  .content{padding:0}
  .bc{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:10px}
  body{font-size:11px}
  .no-print{display:none!important}
}

// HELPERS
// ══════════════════════════════════════════════════════
function todayStr(){const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function getDK(ds){const d=new Date(ds+'T00:00:00');return ['sun','mon','tue','wed','thu','fri','sat'][d.getDay()]}

// 학생 수업요일 파싱 (cls 텍스트에서 추출)
// 예: "PK7A(월수금)" → ['mon','wed','fri'], "7B(화목)" → ['tue','thu']
function getStudentClassDays(s){
  if(!s||!s.cls)return null;
  const m=s.cls.match(/[（(]([월화수목금토일·,]+)[)）]/);
  if(!m)return null;
  const txt=m[1];
  const days=[];
  if(txt.includes('월'))days.push('mon');
  if(txt.includes('화'))days.push('tue');
  if(txt.includes('수'))days.push('wed');
  if(txt.includes('목'))days.push('thu');
  if(txt.includes('금'))days.push('fri');
  return days.length?days:null;
}
function fmtDate(ds){const d=new Date(ds+'T00:00:00');return `${d.getMonth()+1}월 ${d.getDate()}일`}
function isWD(ds){const d=getDK(ds);return d!=='sat'&&d!=='sun'}
function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
// 노선 목록: ROUTE_DEFS에서 숨긴 것 제외 + 사용자 추가 노선 포함
function getBusRoutes(busId){
  const hidden=S.db?.hiddenRoutes||[];
  const custom=(S.db?.customRoutes||[]).filter(r=>r.busId===busId);
  const routes=[
    ...ROUTE_DEFS.filter(r=>r.busId===busId&&!hidden.includes(r.id)),
    ...custom
  ].map(r=>getRoute(r.id)||r);
  // routeOrder가 설정된 경우 순서 반영
  const order=S.db?.routeOrder?.[busId];
  if(order&&order.length){
    const ordered=[];
    order.forEach(rid=>{const r=routes.find(x=>x.id===rid);if(r)ordered.push(r);});
    routes.forEach(r=>{if(!ordered.find(x=>x.id===r.id))ordered.push(r);});
    return ordered;
  }
  return routes;
}
// 단일 노선 조회 (ROUTE_DEFS + customRoutes) + DB 오버라이드 반영
function getRoute(rid){
  const r=ROUTE_DEFS.find(r=>r.id===rid)||(S.db?.customRoutes||[]).find(r=>r.id===rid);
  if(!r)return null;
  return {
    ...r,
    days: S.db?.routeDays?.[rid]||r.days,
    school: S.db?.routeSchool?.[rid]||r.school,
    dir: S.db?.routeDir?.[rid]||r.dir,
  };
}
// 노선 표시명: routeLabels 덮어쓰기 우선
function getRouteLabel(rid){
  return (S.db?.routeLabels&&S.db.routeLabels[rid]) || getRoute(rid)?.label || rid;
}
function routeActiveOnDay(route,dk){return route.days.includes(dk)}
function getSchoolColor(school){return{altiora:'var(--pr)',petamus:'#7c3f00',pangram:'#0e7490'}[school]||'#555'}
function getStudent(sid){return S.db.students.find(s=>s.id===sid)}
function getBus(id){return S.db.buses.find(b=>b.id===id)}

// 특정 날짜 기준 재원 여부: 퇴원일이 있으면 date < withdrawDate 면 재원
function isActiveOnDate(s, date){
  if(!s)return false;
  if(s.active)return true; // 현재 재원
  // 퇴원 학생: 과거 날짜 조회 시에만 표시 (오늘/미래는 제외)
  const today=todayStr();
  if(date>=today)return false;
  if(s.withdrawDate && date < s.withdrawDate)return true;
  return false;
}

function initDB(){
  // 관리자 모드 새로고침 유지
  if(sessionStorage.getItem('adminMode')==='1') S.adminMode=true;

  if(USE_FIREBASE && _fbRef){
    document.getElementById('app').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px;color:var(--pr)">
        <div style="font-size:32px">🚌</div>
        <div style="font-size:14px;font-weight:700">데이터 불러오는 중...</div>
        <div style="font-size:11px;color:#9ca3af">Firebase 연결 중</div>
      </div>`;
    // 전체 DB 최초 1회 로드
    _fbRef.once('value').then(snap=>{
      const fbData = snap.val();
      if(fbData && fbData.students){
        S.db = fbData;
        migrateDB();
        // 자동 스냅샷 저장 (매 접속시)
        autoSnapshot();
      } else {
        const saved = localStorage.getItem(DB_KEY);
        if(saved){try{S.db=JSON.parse(saved);}catch(e){S.db=JSON.parse(JSON.stringify(PRESET_DB));}}
        else S.db=JSON.parse(JSON.stringify(PRESET_DB));
        migrateDB();
        _fbRef.set(S.db).catch(e=>console.warn('Firebase 초기 업로드 실패:', e));
      }
      render();

      // dailyChanges만 실시간 리스닝 (다른 사람 변경 감지)
      // 초기 로드 시 리스너 첫 실행은 무시
      const _shownBannerIds=new Set(); // 이미 배너로 보여준 변경 ID 기억
      let chgListenerReady=false;
      const chgRef=_fbDb.ref('shuttle_v4/dailyChanges');
      chgRef.on('value', snap=>{
        if(!chgListenerReady){
          // 초기 로드: 현재 있는 모든 변경 ID를 "이미 본 것"으로 등록
          const initChgs=snap.val()||{};
          Object.values(initChgs).forEach(arr=>{if(Array.isArray(arr))arr.forEach(c=>{if(c&&c.id)_shownBannerIds.add(c.id+':undone:'+(c.undone?'1':'0'));});});
          chgListenerReady=true;
          return;
        }
        if(Date.now() < _fbIgnoreUntil) return;
        const newChgs=snap.val();
        if(!newChgs) return;
        const prevJson=JSON.stringify(S.db.dailyChanges||{});
        const newJson=JSON.stringify(newChgs);
        if(prevJson===newJson) return; // 변경 없으면 무시

        // 이전/새 데이터 비교해서 실제 바뀐 항목 찾기
        const prevChgs=S.db.dailyChanges||{};
        let changedChg=null;
        let isUndo=false;
        for(const [date,arr] of Object.entries(newChgs)){
          if(!Array.isArray(arr))continue;
          const prevArr=prevChgs[date]||[];
          for(const c of arr){
            const prev=prevArr.find(p=>p.id===c.id);
            if(!prev){changedChg=c;isUndo=false;break;}
            if(!prev.undone&&c.undone){changedChg=c;isUndo=true;break;}
          }
          if(changedChg)break;
        }

        S.db.dailyChanges=newChgs;
        localStorage.setItem(DB_KEY, JSON.stringify(S.db));
        render();
        // 실제 변경된 항목이 있고 아직 안 보여준 것만 배너 표시
        if(changedChg){
          const bannerKey=changedChg.id+':undone:'+(isUndo?'1':'0');
          if(!_shownBannerIds.has(bannerKey)){
            _shownBannerIds.add(bannerKey);
            showChangeBannerWithDetail(changedChg, isUndo);
          }
        }
      });

      // students 실시간 리스닝 (신규 학생 등록 등 감지)
      let stuListenerReady=false;
      const stuRef=_fbDb.ref('shuttle_v4/students');
      stuRef.on('value', snap=>{
        if(!stuListenerReady){stuListenerReady=true;return;}
        if(Date.now() < _fbIgnoreUntil) return;
        const newStus=snap.val();
        if(!newStus) return;
        const prevJson=JSON.stringify(S.db.students||[]);
        const newJson=JSON.stringify(newStus);
        if(prevJson===newJson) return;
        S.db.students=newStus;
        localStorage.setItem(DB_KEY, JSON.stringify(S.db));
        render();
        showChangeBanner();
      });
    }).catch(e=>{
      console.warn('Firebase 로드 실패, localStorage 사용:', e);
      const saved = localStorage.getItem(DB_KEY);
      if(saved){try{S.db=JSON.parse(saved);migrateDB();}catch(e2){S.db=JSON.parse(JSON.stringify(PRESET_DB));migrateDB();}}
      else{S.db=JSON.parse(JSON.stringify(PRESET_DB));migrateDB();}
      render();
    });
    return;
  }
  const saved=localStorage.getItem(DB_KEY);
  if(saved){try{S.db=JSON.parse(saved);migrateDB();return}catch(e){}}
  S.db=JSON.parse(JSON.stringify(PRESET_DB));
  migrateDB();
  save();
}
function fuzzyMapLookup(map, stopName){
  if(!stopName)return '';
  if(map[stopName])return map[stopName];
  var norm=function(s){return s.replace(/[\s\-\(\)（）\[\]·•]/g,'').toLowerCase();};
  var nKey=norm(stopName);
  var keys=Object.keys(map);
  for(var i=0;i<keys.length;i++){if(norm(keys[i])===nKey)return map[keys[i]];}
  var kw=stopName.trim().toLowerCase();
  var best='';var bestScore=0;
  for(var j=0;j<keys.length;j++){
    var k=keys[j].trim().toLowerCase();
    var minLen=Math.min(kw.length,k.length,12);
    if(kw.slice(0,minLen)===k.slice(0,minLen)&&minLen>bestScore){bestScore=minLen;best=map[keys[j]];}
  }
  return bestScore>=8?best:'';
}
function applyAutoTime(uniqId, stopName){
  var map=window['_stm_'+uniqId]||{};
  // 1. 정확한 매칭
  var t=map[stopName];
  // 2. 정규화 매칭: 공백·괄호·특수문자 제거 후 비교
  if(!t&&stopName){
    var norm=function(s){return s.replace(/[\s\-\(\)（）\[\]·•]/g,'').toLowerCase();};
    var nKey=norm(stopName);
    Object.entries(map).forEach(function(e){
      if(!t&&norm(e[0])===nKey)t=e[1];
    });
  }
  // 3. 앞 8글자 이상 일치
  if(!t&&stopName){
    var kw=stopName.trim().toLowerCase();
    var best=null;var bestScore=0;
    Object.entries(map).forEach(function(e){
      var k=e[0].trim().toLowerCase();
      var minLen=Math.min(kw.length,k.length,12);
      if(kw.slice(0,minLen)===k.slice(0,minLen)){
        if(minLen>bestScore){bestScore=minLen;best=e[1];}
      }
    });
    if(bestScore>=8)t=best;
  }
  if(t){
    var inp=document.querySelector('[data-timeinput="'+uniqId+'"]');
    if(inp)inp.value=t;
  }
  return t||null;
}
function fmtTimeStr(v){
  if(!v)return '';
  v=String(v).trim();
  if(/^\d{2}:\d{2}$/.test(v))return v;
  const d=v.replace(/[^0-9]/g,'');
  if(!d)return '';
  if(d.length>=4)return d.slice(0,2)+':'+d.slice(2,4);
  if(d.length===3)return '0'+d[0]+':'+d.slice(1);
  return v;
}
function migrateDB(){
  if(!S.db.settings)S.db.settings={adminPw:'1234'};
  if(!S.db.teachers)S.db.teachers=[];
  if(!S.db.routeTimes)S.db.routeTimes={};
  if(!S.db.routeLabels)S.db.routeLabels={};
  if(!S.db.hiddenRoutes)S.db.hiddenRoutes=[];
  if(!S.db.customRoutes)S.db.customRoutes=[];
  if(!S.db.classes)S.db.classes={altiora:[],petamus:[],pangram:[]};
  if(!S.db.routeStops)S.db.routeStops={};
  if(!S.db.routeOrder)S.db.routeOrder={};

  // ─── 팬그램 노선 통합 마이그레이션 ───
  // _pg_mwf_am → _pg_am (월수금 프리셋)
  // _pg_tt_am  → _pg_am (화목 프리셋)
  // _pg_mwf_pm → _pg_pm (월수금 프리셋)
  // _pg_tt_pm  → _pg_pm (화목 프리셋)
  const routeMergeMap = {
    'r2_pg_mwf_am':'r2_pg_am', 'r2_pg_tt_am':'r2_pg_am',
    'r2_pg_mwf_pm':'r2_pg_pm', 'r2_pg_tt_pm':'r2_pg_pm',
    'r3_pg_mwf_am':'r3_pg_am', 'r3_pg_tt_am':'r3_pg_am',
    'r3_pg_mwf_pm':'r3_pg_pm', 'r3_pg_tt_pm':'r3_pg_pm',
    'r5_pg_mwf_am':'r5_pg_am', 'r5_pg_tt_am':'r5_pg_am',
    'r5_pg_mwf_pm':'r5_pg_pm', 'r5_pg_tt_pm':'r5_pg_pm',
    'r7_pg_mwf_am':'r7_pg_am', 'r7_pg_tt_am':'r7_pg_am',
    'r7_pg_mwf_pm':'r7_pg_pm', 'r7_pg_tt_pm':'r7_pg_pm',
    'r8_pg_mwf_am':'r8_pg_am', 'r8_pg_tt_am':'r8_pg_am',
    'r8_pg_mwf_pm':'r8_pg_pm', 'r8_pg_tt_pm':'r8_pg_pm',
  };
  // 구 노선 ID → 해당 학생이 타던 요일
  const oldDaysMap = {
    r2_pg_mwf_am:MWF, r2_pg_tt_am:TT, r2_pg_mwf_pm:MWF, r2_pg_tt_pm:TT,
    r3_pg_mwf_am:MWF, r3_pg_tt_am:TT, r3_pg_mwf_pm:MWF, r3_pg_tt_pm:TT,
    r5_pg_mwf_am:MWF, r5_pg_tt_am:TT, r5_pg_mwf_pm:MWF, r5_pg_tt_pm:TT,
    r7_pg_mwf_am:MWF, r7_pg_tt_am:TT, r7_pg_mwf_pm:MWF, r7_pg_tt_pm:TT,
    r8_pg_mwf_am:MWF, r8_pg_tt_am:TT, r8_pg_mwf_pm:MWF, r8_pg_tt_pm:TT,
  };

  S.db.students.forEach(s=>{
    if(!s.daySchedules)return;
    for(const key of Object.keys(s.daySchedules)){
      const dv=s.daySchedules[key];
      if(!dv)continue;
      for(const dir of ['morning','afternoon']){
        const sc=dv[dir];
        if(!sc||!sc.routeId)continue;
        const newRid=routeMergeMap[sc.routeId];
        if(!newRid)continue;
        const activeDays=oldDaysMap[sc.routeId]||MWF;
        // 노선 ID 업데이트
        sc.routeId=newRid;
        // default 배정이면 비활성 요일에 __absent__ 설정
        if(key==='default'){
          const inactiveDays=DAYS.filter(d=>!activeDays.includes(d));
          for(const dk of inactiveDays){
            if(!s.daySchedules[dk])s.daySchedules[dk]={morning:null,afternoon:null};
            if(!s.daySchedules[dk][dir]){
              s.daySchedules[dk][dir]={routeId:'__absent__',stop:'',pickupTime:''};
            }
          }
        }
      }
    }
    // 구형 schedules에도 변환
    if(s.schedules){
      for(const oldRid of Object.keys(routeMergeMap)){
        if(s.schedules[oldRid]){
          const newRid=routeMergeMap[oldRid];
          if(!s.schedules[newRid])s.schedules[newRid]=s.schedules[oldRid];
          delete s.schedules[oldRid];
        }
      }
    }
  });

  // 구 노선 routeStops도 통합
  for(const [oldRid,newRid] of Object.entries(routeMergeMap)){
    if(S.db.routeStops[oldRid]){
      if(!S.db.routeStops[newRid])S.db.routeStops[newRid]=[];
      for(const item of S.db.routeStops[oldRid]){
        const sn=typeof item==='object'?item.stop:item;
        if(!S.db.routeStops[newRid].some(x=>(typeof x==='object'?x.stop:x)===sn)){
          S.db.routeStops[newRid].push(item);
        }
      }
      delete S.db.routeStops[oldRid];
    }
  }

  S.db.students.forEach(s=>{
    if(s.active===undefined)s.active=true;
    // 기존 schedules → daySchedules(default) 마이그레이션
    if(!s.daySchedules&&s.schedules&&Object.keys(s.schedules).length){
      s.daySchedules={default:{morning:null,afternoon:null}};
      for(const [rid,sc] of Object.entries(s.schedules)){
        const r=getRoute(rid); if(!r)continue;
        const dir=r.dir==='morning'?'morning':'afternoon';
        if(!s.daySchedules.default[dir]){
          s.daySchedules.default[dir]={routeId:rid,stop:sc.stop||'',pickupTime:sc.pickupTime||'',notes:sc.notes||''};
        }
      }
      save();
    }
    if(!s.daySchedules)s.daySchedules={default:{morning:null,afternoon:null}};
    if(!s.daySchedules.default)s.daySchedules.default={morning:null,afternoon:null};
  });
  // routeStops가 비어있으면 기존 학생 데이터에서 정류장 자동 추출
  // routeStops 구조 마이그레이션: 문자열 배열 → 객체 배열 {stop, time}
  if(S.db.routeStops){
    for(const rid of Object.keys(S.db.routeStops)){
      const arr=S.db.routeStops[rid];
      if(arr.length>0&&typeof arr[0]==='string'){
        S.db.routeStops[rid]=arr.map(s=>({stop:s,time:''}));
      }
    }
  }
  if(Object.keys(S.db.routeStops).length===0){
    migrateStopsFromStudents();
  }

  // ─── 반 이름 정규화: 반 목록 기준으로 학생 반 통일 ───
  // 예) 학생 cls='6B(화목)' → 반 목록에 'PK6B(화목)'이 있으면 → 'PK6B(화목)'으로 변환
  {
    const allClasses=[
      ...(S.db.classes?.altiora||[]),
      ...(S.db.classes?.petamus||[]),
      ...(S.db.classes?.pangram||[]),
    ];
    if(allClasses.length){
      S.db.students.forEach(s=>{
        if(!s.cls)return;
        // 이미 정확히 일치하면 패스
        if(allClasses.some(c=>c===s.cls))return;
        // 반 목록 중 현재 cls를 포함하거나, cls가 반 목록을 포함하는 것 찾기
        const match=allClasses.find(c=>
          c.toLowerCase()===s.cls.toLowerCase()||   // 대소문자만 다른 경우
          c.replace(/^PK/i,'')===s.cls||            // PK 제거하면 일치
          c===('PK'+s.cls)||                        // PK 붙이면 일치
          c.trim()===s.cls.trim()
        );
        if(match&&match!==s.cls){
          s.cls=match;
        }
      });
      save();
    }
  }

  // ─── routeStops 시간값 24시간제 정규화 ───
  if(S.db.routeStops){
    for(const rid of Object.keys(S.db.routeStops)){
      S.db.routeStops[rid]=S.db.routeStops[rid].map(item=>{
        if(typeof item==='string')return {stop:item,time:''};
        const t=fmtTimeStr(item.time||'');
        return t===item.time?item:{...item,time:t};
      });
    }
  }
}
// 기존 학생 정류장 데이터 → routeStops로 자동 추출 (시간 포함)
function migrateStopsFromStudents(){
  const rs=S.db.routeStops;
  S.db.students.forEach(s=>{
    const allSched=[];
    if(s.daySchedules){
      for(const dv of Object.values(s.daySchedules)){
        if(dv?.morning)allSched.push(dv.morning);
        if(dv?.afternoon)allSched.push(dv.afternoon);
      }
    }
    if(s.schedules){
      for(const sc of Object.values(s.schedules)) allSched.push(sc);
    }
    for(const sc of allSched){
      if(!sc?.routeId||!sc?.stop)continue;
      if(!rs[sc.routeId])rs[sc.routeId]=[];
      const existing=rs[sc.routeId].find(x=>x.stop===sc.stop);
      if(!existing){
        rs[sc.routeId].push({stop:sc.stop, time:''});
      }
    }
  });
  save();
}

// ══════════════════════════════════════════════════════
// BUSINESS LOGIC
// ══════════════════════════════════════════════════════
function getDayChanges(date){return S.db.dailyChanges[date]||[]}
function setDayChanges(date,arr){S.db.dailyChanges[date]=arr;save()}

function getActiveChg(date,studentId,routeId){
  const chgs=getDayChanges(date).filter(c=>c.studentId===studentId&&!c.undone);
  // 정확한 routeId 매칭 우선, 없으면 'all' 케이스 확인
  return chgs.find(c=>c.routeId===routeId) || chgs.find(c=>c.routeId==='all');
}

function isPeriodAbsent(student,date,routeId){
  return Object.entries(S.db.dailyChanges||{}).some(([d,arr])=>
    arr.some(c=>
      c.studentId===student.id&&c.type==='period_absent'&&!c.undone&&
      (c.routeId===routeId||c.routeId==='all')&&
      c.endDate>=date&&c.startDate<=date
    )
  );
}

function getRouteStudents(routeId,date){
  const route=getRoute(routeId); if(!route)return[];
  const dk=getDK(date);
  if(!routeActiveOnDay(route,dk))return[];
  const dir=route.dir==='morning'?'morning':'afternoon';
  const result=[];
  const addedIds=new Set(); // 중복 방지

  for(const st of S.db.students){
    if(!isActiveOnDate(st, date))continue;
    const daySc=st.daySchedules?.[dk]?.[dir];
    const defSc=st.daySchedules?.default?.[dir];
    let sched=null;
    let forceIndividual=false;

    // 요일 예외가 __individual__ → 기본 노선에 individual 상태로 표시
    if(daySc?.routeId==='__individual__'){
      if(defSc?.routeId===routeId){
        sched=defSc;
        forceIndividual=true;
      } else continue;
    }
    // 요일 예외가 __absent__ → 완전 제외 (기간결석 무관)
    else if(daySc?.routeId==='__absent__')continue;
    // 기본값이 개별/미등원이면 제외
    else if(!daySc&&(defSc?.routeId==='__individual__'||defSc?.routeId==='__absent__'))continue;
    else {
      if(daySc?.routeId===routeId)sched=daySc;
      else if(!daySc&&defSc?.routeId===routeId)sched=defSc;
      // 구형 schedules 폴백
      if(!sched&&!st.daySchedules&&st.schedules?.[routeId])sched=st.schedules[routeId];
    }

    // period_absent(routeId='all') 체크 - sched 없어도 해당 노선 학생이면 표시
    let isPA=false;
    if(!sched){
      // sched가 없어도 period_absent(all)이 적용되고 이 학생의 실제 노선이 routeId인 경우 포함
      const actualRid=daySc?.routeId||defSc?.routeId||'';
      if(actualRid!==routeId)continue;
    }
    let paChg=null;
    for(const [_d,arr] of Object.entries(S.db.dailyChanges)){
      for(const c of arr){
        if(c.studentId===st.id&&c.type==='period_absent'&&!c.undone){
          if(c.routeId===routeId||c.routeId==='all'){
            if(c.startDate<=date&&c.endDate>=date){
              // 수업요일 필터: cls에서 요일 파싱 가능하면 해당 요일에만 적용
              const classDays=getStudentClassDays(st);
              if(classDays&&!classDays.includes(dk))break; // 수업 없는 요일엔 미적용
              isPA=true;paChg={...c,_fromDate:_d};break;
            }
          }
        }
      }
      if(isPA)break;
    }
    // sched가 없는데 isPA도 아니면 제외
    if(!sched&&!isPA)continue;
    // sched 없으면 실제 노선 데이터로 대체
    if(!sched)sched=daySc||defSc||{stop:'',pickupTime:'',notes:''};
    const chg=isPA&&paChg?paChg:getActiveChg(date,st.id,routeId);
    let state='normal';
    let displaySched={...sched};
    if(forceIndividual){state='individual';}
    else if(isPA){state='period_absent';}
    else {
      // period_individual: 기간 내 개별등하원
      let isPeriodIndiv=false;
      for(const [d,arr] of Object.entries(S.db.dailyChanges)){
        for(const c of arr){
          if(c.studentId===st.id&&c.type==='period_individual'&&!c.undone){
            if(c.startDate<=date&&c.endDate>=date){
              // dir 체크: both면 무조건, morning/afternoon이면 현재 노선 방향과 비교
              const cDir=c.dir||'both';
              if(cDir==='both'||(cDir==='morning'&&dir==='morning')||(cDir==='afternoon'&&dir==='afternoon')){
                isPeriodIndiv=true;break;
              }
            }
          }
        }
        if(isPeriodIndiv)break;
      }
      if(isPeriodIndiv){state='individual';}
      else if(chg){
        if(chg.type==='absent')state='absent';
        else if(chg.type==='individual'){
          // dir 체크
          const cDir=chg.dir||'both';
          if(cDir==='both'||(cDir==='morning'&&dir==='morning')||(cDir==='afternoon'&&dir==='afternoon'))
            state='individual';
        }
        else if(chg.type==='bus_change'){state='tout';}
        else if(chg.type==='stop_change'){state='stopchg';displaySched={...sched,stop:chg.toStop||sched.stop,pickupTime:chg.toTime||sched.pickupTime};}
      }
    }
    result.push({...st,sched:displaySched,chg,state,isPA,isFixedOverride:forceIndividual});
    addedIds.add(st.id);
  }

  // 2패스: 다른 노선에서 이 노선으로 호차변경된 전입 학생 추가
  const todayChgs=getDayChanges(date);
  for(const chg of todayChgs){
    if(chg.undone||chg.type!=='bus_change'||chg.toRouteId!==routeId)continue;
    if(addedIds.has(chg.studentId))continue;
    const st=getStudent(chg.studentId);
    if(!st||!isActiveOnDate(st, date))continue;
    // 이동한 정류장과 같은 정류장의 기존 학생 시간을 찾아 사용
    const toStop=chg.toStop||'';
    let pickupTime=chg.toTime||'';
    if(!pickupTime&&toStop){
      const sameStopSt=result.find(r=>r.sched?.stop===toStop&&r.sched?.pickupTime);
      if(sameStopSt)pickupTime=sameStopSt.sched.pickupTime;
    }
    result.push({
      ...st,
      sched:{stop:toStop,pickupTime},
      chg,state:'tin',isPA:false
    });
  }

  // 3패스: period_absent(routeId='all') 학생 중 위 1패스에서 누락된 경우 보완
  for(const [_d,arr] of Object.entries(S.db.dailyChanges||{})){
    for(const c of arr){
      if(c.undone||c.type!=='period_absent'||c.routeId!=='all')continue;
      if(c.startDate>date||c.endDate<date)continue;
      const st=getStudent(c.studentId);
      if(!st||!isActiveOnDate(st,date))continue;
      if(addedIds.has(st.id))continue;
      // 해당 요일에 __absent__ 설정이면 완전 제외
      const daySc3=st.daySchedules?.[dk]?.[dir];
      if(daySc3?.routeId==='__absent__')continue;
      // 수업요일 필터
      const classDays3=getStudentClassDays(st);
      if(classDays3&&!classDays3.includes(dk))continue;
      // 이 학생이 이 routeId를 어딘가에 가지고 있는지 확인
      let foundSched=null;
      if(st.daySchedules){
        for(const key of Object.keys(st.daySchedules)){
          const dv=st.daySchedules[key];
          if(dv?.[dir]?.routeId===routeId){foundSched=dv[dir];break;}
        }
      }
      if(!foundSched&&st.schedules?.[routeId])foundSched=st.schedules[routeId];
      if(!foundSched)continue;
      result.push({...st,sched:{...foundSched},chg:null,state:'period_absent',isPA:true,isFixedOverride:false});
      addedIds.add(st.id);
    }
  }


  return result;
}

function getStopsForRoute(routeId){
  const route=getRoute(routeId);
  const dir=route?.dir==='morning'?'morning':'afternoon';
  const stops=new Set();
  for(const s of S.db.students){
    if(s.daySchedules){
      for(const dk of DAYS){
        const ds=s.daySchedules[dk]?.[dir];
        if(ds?.routeId===routeId&&ds.stop)stops.add(ds.stop);
      }
    }
    const sc=s.schedules?.[routeId];
    if(sc?.stop)stops.add(sc.stop);
  }
  return [...stops];
}

// 전체 정류장 통합 목록 (선택 노선 정류장 먼저, 나머지 가나다순)
function getAllStops(priorityRouteId){
  const priorityStops=priorityRouteId?new Set(getStopsForRoute(priorityRouteId)):new Set();
  const allStops=new Set();
  for(const s of S.db.students){
    // 집 주소
    if(s.addr)allStops.add(s.addr);
    // daySchedules
    if(s.daySchedules){
      for(const dk of ['default',...DAYS]){
        const ds=s.daySchedules[dk];
        if(ds?.morning?.stop)allStops.add(ds.morning.stop);
        if(ds?.afternoon?.stop)allStops.add(ds.afternoon.stop);
      }
    }
    // 기존 schedules
    for(const sc of Object.values(s.schedules||{})){
      if(sc?.stop)allStops.add(sc.stop);
    }
  }
  // 우선: 선택 노선 정류장 / 나머지: 가나다순
  const priority=[...priorityStops].sort();
  const rest=[...allStops].filter(s=>!priorityStops.has(s)).sort();
  return [...priority,...rest];
}


function validateTransfer(toRouteId,currentStop){
  const stops=getStopsForRoute(toRouteId);
  if(!stops.length)return{ok:false,reason:'해당 노선에 등록된 정류장 없음',stops};
  const kws=currentStop.replace(/[()[\]/,.·]/g,' ').split(/\s+/).filter(w=>w.length>1);
  for(const s of stops){
    const sk=s.replace(/[()[\]/,.·]/g,' ').split(/\s+/).filter(w=>w.length>1);
    if(kws.some(kw=>sk.some(sw=>sw.includes(kw)||kw.includes(sw))))
      return{ok:true,match:s,stops};
  }
  return{ok:false,reason:`이 정류장은 해당 노선에 없습니다`,stops};
}

function countTodayChanges(date){
  const dk=getDK(date);
  // 결석(absent)은 같은 학생의 등원+하원이 각각 등록돼도 1건으로 카운트
  const directAll=getDayChanges(date).filter(c=>!c.undone);
  const absentSeen=new Set();
  const direct=directAll.filter(c=>{
    if(c.type==='absent'){
      if(absentSeen.has(c.studentId))return false;
      absentSeen.add(c.studentId);
      return true;
    }
    return true;
  }).length;
  const periodCount=Object.entries(S.db.dailyChanges||{}).reduce((cnt,[d,arr])=>{
    if(d===date)return cnt;
    return cnt+arr.filter(c=>{
      if(c.undone)return false;
      if(!(c.type==='period_absent'||c.type==='period_individual'))return false;
      if(!(c.startDate<=date&&c.endDate>=date))return false;
      // 수업요일 필터
      const st=getStudent(c.studentId);
      const classDays=getStudentClassDays(st);
      if(classDays&&!classDays.includes(dk))return false;
      return true;
    }).length;
  },0);
  return direct+periodCount;
}

function render(){
  // 모달 스크롤 위치 보존
  const modalEl=document.querySelector('.modal');
  const overlayEl=document.querySelector('.overlay');
  const modalScroll=modalEl?modalEl.scrollTop:0;
  const overlayScroll=overlayEl?overlayEl.scrollTop:0;
  try {
    document.getElementById('app').innerHTML=buildApp();
  } catch(e) {
    console.error('render 에러:', e);
    document.getElementById('app').innerHTML=`
      <div style="padding:30px;text-align:center;color:#dc2626">
        <div style="font-size:24px;margin-bottom:12px">⚠️</div>
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">화면 오류 발생</div>
        <div style="font-size:11px;color:#6b7280;margin-bottom:16px;word-break:break-all">${e.message}</div>
        <button onclick="location.reload()" style="border:none;background:var(--pr);color:#fff;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit">새로고침</button>
      </div>`;
    return;
  }
  // 모달/오버레이 스크롤 복원
  if(overlayScroll>0){const ov=document.querySelector('.overlay');if(ov)ov.scrollTop=overlayScroll;}
  else if(modalScroll>0){const nm=document.querySelector('.modal');if(nm)nm.scrollTop=modalScroll;}
  bindEvents();
  if(S.todaySearch) filterTodayDOM(S.todaySearch);
  filterStudentDOM(S.studentSearch||'');
  // 출결현황 hover 바인딩
  if(S.tab==='attendance'){
    setTimeout(()=>{
      document.querySelectorAll('[onclick*="att_modal"]').forEach(el=>{
        el.addEventListener('mouseenter',function(){const t=this.querySelector('.att-hover-tip');if(t)t.style.display='block';});
        el.addEventListener('mouseleave',function(){const t=this.querySelector('.att-hover-tip');if(t)t.style.display='none';});
      });
    },50);
  }
  if(S.modal?.type==='adminLogin'){
    setTimeout(()=>{const i=document.getElementById('admin_pw_inp');if(i)i.focus();},30);
  }
  if(S._focusId){
    const t=S._focusId, p=S._focusPos||0;
    S._focusId=null; S._focusPos=null;
    const inp=document.getElementById(t);
    if(inp){inp.focus();try{inp.setSelectionRange(p,p);}catch(e){}}
  }
}

  const selectorHtml=`
<div class="card" style="margin-bottom:13px">
  <div class="card-body" style="padding:12px 15px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:11px;font-weight:900;color:#6b7280">👤 교사 선택</div>

        style="border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">✕ 닫기</button>`:''}

        const hasToday=todayRoutes.length>0;
        return `<button onclick="S.selectedTeacher='${t.id}';render()"

  // 선택된 교사의 오늘 운행 노선

      const sts=getRouteStudents(r.id,date);
      const active=sts.filter(s=>s.state==='normal'||s.state==='tin'||s.state==='stopchg');
      const absent=sts.filter(s=>s.state==='absent'||s.state==='period_absent'||s.state==='individual');
      lines.push(`[${r.busId}호차] ${getRouteLabel(r.id)} (${getRouteTime(r.id)})`);
      lines.push(`총 ${sts.length}명 (결석 ${absent.length}명)`);
      // 정류장별
      const byStop={};
      sts.forEach(s=>{
        const k=(s.sched?.pickupTime||'')+' '+( s.sched?.stop||'');
        if(!byStop[k])byStop[k]={time:s.sched?.pickupTime||'',stop:s.sched?.stop||'',kids:[]};
        byStop[k].kids.push(s);
      });
      Object.values(byStop).forEach(grp=>{
        lines.push(`  ⏰${grp.time} ${grp.stop}`);
        grp.kids.forEach(s=>{
          const tag=s.state==='absent'||s.state==='period_absent'?'[결석]':s.state==='individual'?'[개별]':'';
          lines.push(`    ${tag} ${s.name}${s.cls?' ('+s.cls+')':''}`);
        });
      });
      if(i<myRoutes.length-1)lines.push('');
    });
    return lines.join('\n');
  }

  const noRoutes=myRoutes.length===0;

  const routeCards=myRoutes.map(r=>{
    if(!r)return '';
    const sts=getRouteStudents(r.id,date)||[];
    const normal=sts.filter(s=>s.state==='normal');
    // 같은 학생이 등원/하원 노선에 각각 나타날 수 있으므로 학생id 기준 중복 제거

    // 정류장별 그룹

    sts.forEach(s=>{

      const stateCol={absent:'#dc2626',individual:'#9ca3af',tout:'#6b7280',tin:'#1d4ed8',stopchg:'#d97706',period_absent:'#7c3aed'};

          ${(isAbsent||isIndividual)&&s.chg?.notes?(()=>{const m=s.chg.notes;const ms=m.length>15?m.slice(0,15)+'…':m;return `<span title="${esc(m)}" style="font-size:10px;color:#9ca3af;margin-left:auto;flex-shrink:0;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ms)}</span>`;})():(!(isAbsent||isIndividual)&&s.phone?`<a href="tel:${s.phone}" onclick="event.stopPropagation()" style="font-size:10px;color:var(--pr);margin-left:auto">${esc(s.phone)}</a>`:'')}

          ${isAbsent&&s.state==='absent'?`<span style="font-size:9px;font-weight:800;color:#dc2626;background:#fee2e2;padding:1px 6px;border-radius:6px">결석</span>`:''}
          ${isFixedInd?`<span style="font-size:9px;font-weight:800;color:#3730a3;background:#e0e7ff;padding:1px 6px;border-radius:6px">개별</span>`:''}

          ${isTout?`<span style="font-size:9px;font-weight:800;color:#6b7280;background:#f3f4f6;padding:1px 6px;border-radius:6px">호차이동</span>`:''}
        </div>`;
      }).join('')}

  </div>
`:''}
</div>`;
  }).join('');

  return datebar+selectorHtml+`

  <div class="btn-row">

function buildTodayCls(date,dk){
  const sfil=S.schoolFilter;
  const selCls=S._todayCls||'';
  const dir=S._todayDir||'morning';

  // 반 목록 수집
  const schools=sfil==='all'?['altiora','petamus','pangram']:[sfil];
  const clsList=[];
  schools.forEach(sk=>(S.db.classes?.[sk]||[]).filter(Boolean).forEach(c=>{
    if(!clsList.find(x=>x.cls===c))clsList.push({cls:c,school:sk});
  }));

  const clsSelectHtml=`<select style="width:100%;border:2px solid var(--pr);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;font-weight:700;color:var(--pr);outline:none;background:#f0f4ff;margin-bottom:12px"
    onchange="S._todayCls=this.value;S._todayDir='morning';render()">
    <option value="">── 반을 선택하세요</option>
    ${clsList.map(({cls,school})=>`<option value="${esc(cls)}" ${selCls===cls?'selected':''}>${esc(cls)} (${SCHOOL_KO[school]||school})</option>`).join('')}
  </select>`;

  if(!selCls) return `<div class="card"><div class="card-body">${clsSelectHtml}<div style="text-align:center;padding:20px;color:#d1d5db;font-size:12px">반을 선택하면 오늘 탑승 현황을 확인할 수 있습니다</div></div></div>`;

  // 해당 반 학생 목록 — 오늘 수업 없는 학생(__absent__ 고정) 및 탑승 미설정 학생 제외
  const students=S.db.students.filter(s=>{
    if(!s.active||s.cls!==selCls||!isActiveOnDate(s,date))return false;
    const ds=s.daySchedules;
    if(!ds)return false;
    const daySc=ds[dk]||{};
    const defSc=ds.default||{};
    const mRid=daySc.morning?.routeId||(daySc.morning===undefined?defSc.morning?.routeId:'');
    const aRid=daySc.afternoon?.routeId||(daySc.afternoon===undefined?defSc.afternoon?.routeId:'');
    // 등원·하원 모두 __absent__이면 오늘 등교 안 함
    if(mRid==='__absent__'&&aRid==='__absent__')return false;
    // 등원·하원 모두 미설정(null/빈값)이면 탑승 미설정
    if(!mRid&&!aRid)return false;
    return true;
  });

  // 각 학생의 등원/하원 상태 계산
  function getStuState(st,direction){
    const dk2=getDK(date);
    const daySc=st.daySchedules?.[dk2]?.[direction];
    const defSc=st.daySchedules?.default?.[direction];
    let rid=daySc?.routeId||(daySc===undefined?defSc?.routeId:null)||'';
    if(!rid)return null; // 노선 없음
    if(rid==='__absent__')return{state:'absent',rid:'',stop:'',time:'',route:null,chg:null};
    if(rid==='__individual__'){
      // 개별등하원이어도 당일 결석 등록(routeId='all')이 있으면 결석으로
      const chgs=getDayChanges(date).filter(c=>c.studentId===st.id&&!c.undone);
      const absentChg=chgs.find(c=>c.type==='absent');
      const periodAbsent=(()=>{for(const[,arr]of Object.entries(S.db.dailyChanges||{})){for(const c of arr){if(c.studentId===st.id&&c.type==='period_absent'&&!c.undone&&c.startDate<=date&&c.endDate>=date)return c;}}return null;})();
      if(periodAbsent)return{state:'period_absent',rid:'',stop:'',time:'',route:null,chg:periodAbsent};
      if(absentChg)return{state:'absent',rid:'',stop:'',time:'',route:null,chg:absentChg};
      return{state:'individual',rid:'',stop:'',time:'',route:null,chg:null};
    }

    // 실제 노선
    const sc=daySc?.routeId?daySc:(defSc?.routeId===rid?defSc:null);
    const route=getRoute(rid);

    // 당일 변경 체크
    const chg=getActiveChg(date,st.id,rid);
    let state='normal';
    if(chg){
      if(chg.type==='absent')state='absent';
      else if(chg.type==='individual')state='individual';
      else if(chg.type==='bus_change')state='tout';
      else if(chg.type==='stop_change')state='stopchg';
    }
    // period_absent
    for(const [,arr] of Object.entries(S.db.dailyChanges||{})){
      for(const c of arr){
        if(c.studentId===st.id&&c.type==='period_absent'&&!c.undone&&(c.routeId===rid||c.routeId==='all')&&c.startDate<=date&&c.endDate>=date){state='period_absent';break;}
      }
    }
    return{state,rid,stop:sc?.stop||'',time:sc?.pickupTime||'',route};
  }

  // 등원/하원 카운트
  function countDir(direction){
    let board=0,absent=0,indiv=0;
    students.forEach(st=>{
      const s=getStuState(st,direction);
      if(!s)return;
      if(s.state==='normal'||s.state==='stopchg'||s.state==='tin')board++;
      else if(s.state==='absent'||s.state==='period_absent')absent++;
      else if(s.state==='individual'||s.state==='tout')indiv++;
    });
    return{board,absent,indiv};

  const mCnt=countDir('morning');

      🌅 등원
      <span style="font-size:10px;font-weight:700;background:${dir==='morning'?'rgba(255,255,255,.25)':'#e5e7eb'};color:${dir==='morning'?'#fff':'#6b7280'};padding:1px 7px;border-radius:10px">${mCnt.board}명</span>
    </div>
    <div onclick="S._todayDir='afternoon';render()" style="flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:900;cursor:pointer;background:${dir==='afternoon'?'var(--pr)':'#f9fafb'};color:${dir==='afternoon'?'#fff':'#9ca3af'};display:flex;align-items:center;justify-content:center;gap:6px">
      🌇 하원
      <span style="font-size:10px;font-weight:700;background:${dir==='afternoon'?'rgba(255,255,255,.25)':'#e5e7eb'};color:${dir==='afternoon'?'#fff':'#6b7280'};padding:1px 7px;border-radius:10px">${aCnt.board}명</span>
    </div>
  </div>`;

  // 학생 목록 분류
  const alertStudents=[], normalStudents=[];
  students.forEach(st=>{
    const s=getStuState(st,dir);
    if(!s){normalStudents.push({st,s:null});return;}
    if(s.state==='normal'||s.state==='stopchg')normalStudents.push({st,s});
    else alertStudents.push({st,s});

  // 이상 학생 HTML
  const alertHtml=alertStudents.length>0?`
  <div style="background:#fff8f8;border:1.5px solid #fecaca;border-radius:10px;padding:11px 13px;margin-bottom:10px">
    <div style="font-size:11px;font-weight:900;color:#dc2626;margin-bottom:8px">⚠️ 오늘 변경/결석 ${alertStudents.length}명</div>
    ${alertStudents.map(({st,s})=>{

      const nameStyle=isAbsent?'text-decoration:line-through double #dc2626;color:#9ca3af':isIndiv?'text-decoration:line-through;color:#9ca3af':'color:#111';
      const badge=isAbsent?`<span style="font-size:9px;font-weight:800;background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:7px;flex-shrink:0">결석</span>`:

      const detail=isAbsent?`${dir==='morning'?'등원':'하원'} 결석`:(s.state==='tout'?'호차 이동':'개별'+(dir==='morning'?'등원':'하원'));
      const chgMemo=s.chg?.notes||'';
      const memoShort=chgMemo.length>15?chgMemo.slice(0,15)+'…':chgMemo;
      return `<div onclick="openStudentDetail('${st.id}','${date}')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:#fff;border:1.5px solid ${isAbsent?'#fecaca':'#e9d5ff'};margin-bottom:6px;cursor:pointer" onmouseenter="this.style.opacity='.8'" onmouseleave="this.style.opacity='1'">
        <span style="font-size:13px;font-weight:900;width:82px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${nameStyle}">${esc(st.name)}</span>
        <span style="flex:1;font-size:10px;color:#6b7280">${detail}</span>
        ${chgMemo?`<span title="${esc(chgMemo)}" style="font-size:10px;color:#9ca3af;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${esc(memoShort)}</span>`:''}
        ${badge}
      </div>`;
    }).join('')}

  // 정상 탑승 HTML
  const normalHtml=normalStudents.length>0?`
  <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:11px 13px">
    <div style="font-size:11px;font-weight:900;color:#16a34a;margin-bottom:8px">✅ 정상 탑승 ${normalStudents.filter(x=>x.s).length}명</div>

function buildAttendance(date,dk,wd){
  const sfil=S.schoolFilter;
  if(!wd) return '';

  // 전체 반 목록 수집
  const schools=sfil==='all'?['altiora','petamus','pangram']:[sfil];
  const clsList=[];
  schools.forEach(sk=>(S.db.classes?.[sk]||[]).filter(Boolean).forEach(c=>{
    if(!clsList.find(x=>x.cls===c))clsList.push({cls:c,school:sk});
  }));

  // 오늘 변동(당일 변경 등록) 목록
  const todayChgs=getDayChanges(date).filter(c=>!c.undone);

  // 각 반의 출결 집계
  function calcCls(cls){
    const stus=S.db.students.filter(s=>{
      if(!s.active||s.cls!==cls||!isActiveOnDate(s,date))return false;
      const ds=s.daySchedules;
      if(!ds)return false;
      const daySc=ds[dk]||{};
      const defSc=ds.default||{};
      const mRid=daySc.morning?.routeId||(daySc.morning===undefined?defSc.morning?.routeId:'');
      const aRid=daySc.afternoon?.routeId||(daySc.afternoon===undefined?defSc.afternoon?.routeId:'');
      // 오늘현황 반별현황과 동일 기준
      if(mRid==='__absent__'&&aRid==='__absent__')return false;
      if(!mRid&&!aRid)return false;
      return true;
    });
    const total=stus.length;
    let absent=0,indivM=0,indivA=0,attend=0;
    const absentNames=[],indivMNames=[],indivANames=[],attendNames=[];

    stus.forEach(st=>{
      // 등원 상태
      const mRid=(st.daySchedules?.[dk]?.morning?.routeId)||(st.daySchedules?.[dk]?.morning===undefined?st.daySchedules?.default?.morning?.routeId:null)||'';
      const aRid=(st.daySchedules?.[dk]?.afternoon?.routeId)||(st.daySchedules?.[dk]?.afternoon===undefined?st.daySchedules?.default?.afternoon?.routeId:null)||'';

      // 당일 변경 체크
      const chgs=todayChgs.filter(c=>c.studentId===st.id);
      const absentChg=chgs.find(c=>c.type==='absent'||c.type==='period_absent');
      const indivChg=chgs.find(c=>c.type==='individual');

      // 결석
      let isAbsent=false;
      if(absentChg){isAbsent=true;}
      else{
        // period_absent 체크
        for(const [,arr] of Object.entries(S.db.dailyChanges||{})){
          for(const c of arr){
            if(c.studentId===st.id&&(c.type==='period_absent')&&!c.undone&&c.startDate<=date&&c.endDate>=date){isAbsent=true;break;}
          }
          if(isAbsent)break;
        }
      }
      if(mRid==='__absent__'&&aRid==='__absent__')isAbsent=true;

      if(isAbsent){absent++;absentNames.push(st.name);return;}

      // 개별등원
      const isMIndiv=mRid==='__individual__'||(indivChg&&(indivChg.dir==='morning'||indivChg.dir==='both'||!indivChg.dir));
      // 개별하원
      const isAIndiv=aRid==='__individual__'||(indivChg&&(indivChg.dir==='afternoon'||indivChg.dir==='both'||!indivChg.dir));

      if(isMIndiv){indivM++;indivMNames.push(st.name);}
      if(isAIndiv){indivA++;indivANames.push(st.name);}

      attend++;
      attendNames.push(st.name);
    });

    // 오늘 변동 (당일 등록된 것만, 중복 제거)
    const changes=[];
    const seenChg=new Set();
    todayChgs.forEach(c=>{
      const st=stus.find(s=>s.id===c.studentId);
      if(!st)return;
      let type='';
      if(c.type==='absent'||c.type==='period_absent')type='결석';
      else if(c.type==='individual')type='개별';
      else if(c.type==='bus_change')type='호차이동';
      else if(c.type==='stop_change')type='정류장변경';
      else return;
      const key=st.id+'_'+type;
      if(seenChg.has(key))return;
      seenChg.add(key);
      const cls2=type==='결석'?'tag-absent':type==='개별'?'tag-indiv':'tag-change';
      const memo=c.notes||'';
      changes.push({name:st.name,type,cls:cls2,memo});
    });

    return{total,attend,absent,indivM,indivA,absentNames,indivMNames,indivANames,attendNames,changes};
  }

  // 전체 합계
  let totTotal=0,totAttend=0,totAbsent=0,totChanges=0;
  const rows=clsList.map(({cls,school})=>{
    const r=calcCls(cls);
    if(!r||r.total===0)return null;
    totTotal+=r.total;totAttend+=r.attend;totAbsent+=r.absent;totChanges+=r.changes.length;
    return{cls,school,r};
  }).filter(Boolean);

  // 숫자+hover 렌더 함수 (data attribute 방식으로 인용부호 충돌 방지)
  function numCell(count,names,type,colorStyle,emoji){
    if(!count)return '<td style="text-align:center;color:#d1d5db;font-size:12px">0</td>';
    const safeNames=names.map(n=>esc(n));
    const hoverItems=safeNames.map(n=>'<div style="padding:1px 0;font-size:11px">'+emoji+' '+n+'</div>').join('');
    const dataNames=encodeURIComponent(JSON.stringify(safeNames));
    return '<td style="text-align:center">'
      +'<div style="position:relative;display:inline-block;cursor:pointer" '
      +'data-atttype="'+type+'" data-attnames="'+dataNames+'" data-attemoji="'+emoji+'" '
      +'onmouseenter="attTipShow(this)" '
      +'onmouseleave="this.querySelector(\'.att-hover-tip\').style.display=\'none\'" '
      +'onclick="attShowModal(this)">'
      +'<span style="display:inline-block;min-width:28px;padding:2px 8px;border-radius:6px;font-weight:900;font-size:12px;'+colorStyle+'">'+count+'</span>'
      +'<div class="att-hover-tip" style="display:none;position:absolute;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;border-radius:10px;padding:10px 14px;font-size:11px;white-space:nowrap;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:120px;text-align:left;pointer-events:none">'
      +'<div style="font-weight:900;margin-bottom:6px;color:#9ca3af;font-size:10px">'+type+'</div>'
      +hoverItems
      +'<div class="att-tip-arrow" style="position:absolute;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1f2937;top:100%"></div>'
      +'</div></div></td>';
  }

  return `
<div class="sf-bar">
  ${[['all','전체'],['altiora','알티오라'],['petamus','페타무스'],['pangram','팬그램']].map(([k,l])=>
    `<button class="sf-btn${sfil===k?' on':''}" data-k="${k}" onclick="setSchool('${k}')">${l}</button>`
  ).join('')}
</div>

<!-- 전체 요약 -->
<div style="display:flex;gap:8px;padding:12px 12px 0">
  ${[
    ['전체 정원',totTotal,'#1A3169'],
    ['출석',totAttend,'#16a34a'],
    ['결석',totAbsent,'#dc2626'],
    ['오늘 변동',totChanges,'#d97706'],
  ].map(([l,v,c])=>`
  <div style="flex:1;background:#fff;border-radius:9px;padding:10px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)">
    <div style="font-size:20px;font-weight:900;color:${c}">${v}</div>
    <div style="font-size:9px;color:#9ca3af;margin-top:2px">${l}</div>
  </div>`).join('')}
</div>
