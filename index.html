function showToast(msg,type){
  const isErr=msg.startsWith('❌')||msg.startsWith('⛔');
  const isWarn=msg.startsWith('⚠️')||msg.startsWith('🔐')||msg.startsWith('↩');
  const isInfo=type==='info'||msg.startsWith('🔔');
  const bg=isErr?'#dc2626':isWarn?'#d97706':isInfo?'#2563eb':'#10b981';
  const duration=isInfo?4000:2500;
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(0);background:#10b981;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:opacity .3s,transform .3s;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.style.background=bg;
  t.textContent=msg;
  t.style.opacity='1';
  t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{
    t.style.opacity='0';
    t.style.transform='translateX(-50%) translateY(10px)';
  },duration);
}

function restoreSnapshot(date){
  if(!confirm(`${date} 스냅샷으로 복구하시겠습니까?\n현재 데이터가 해당 날짜 데이터로 교체됩니다.`))return;
  const pw=prompt('관리자 비밀번호를 입력하세요:');
  if(pw===null)return;
  if(pw!==S.db.settings?.adminPw){showToast('❌ 비밀번호가 틀렸습니다');return;}
  try{
    const data=localStorage.getItem('shuttle_snapshot_'+date);
    if(!data){showToast('❌ 스냅샷 데이터가 없습니다');return;}
    S.db=JSON.parse(data);
    save();
    showToast('✅ '+date+' 스냅샷으로 복구 완료');
    render();
  }catch(e){showToast('❌ 복구 실패: '+e.message);}
}

function autoSnapshot(){
  try{
    const now=new Date();
    const key='shuttle_snapshot_'+now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    // 오늘 스냅샷이 이미 있으면 저장 안 함
    if(!localStorage.getItem(key)){
      localStorage.setItem(key, JSON.stringify(S.db));
      // 7일 이전 스냅샷 자동 삭제
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith('shuttle_snapshot_')){
          const d=new Date(k.replace('shuttle_snapshot_',''));
          if((now-d)>7*24*60*60*1000){localStorage.removeItem(k);i--;}
        }
      }
    }
  }catch(e){console.warn('스냅샷 저장 실패:',e);}
}

function backupData(){

}

function updateStudentPickupTimeFromDetail(sid,rid,newTime){
  const s=getStudent(sid);
  if(!s)return;
  // daySchedules 기준으로 pickupTime 업데이트
  if(s.daySchedules){
    const def=s.daySchedules.default;
    if(def?.morning?.routeId===rid)def.morning.pickupTime=newTime;
    if(def?.afternoon?.routeId===rid)def.afternoon.pickupTime=newTime;
    for(const dk of DAYS){
      const ov=s.daySchedules[dk];
      if(ov?.morning?.routeId===rid)ov.morning.pickupTime=newTime;
      if(ov?.afternoon?.routeId===rid)ov.afternoon.pickupTime=newTime;
    }
  } else if(s.schedules?.[rid]){
    s.schedules[rid].pickupTime=newTime;
  }
  save();
  showToast(`✅ ${s.name} · ${getRouteLabel(rid)} 탑승시간 → ${newTime}`);
  render();
}
function updateStudentPickupTime(sid,rid,newTime){
  const s=getStudent(sid);
  if(!s)return;
  if(s.daySchedules){
    const def=s.daySchedules.default;
    if(def?.morning?.routeId===rid)def.morning.pickupTime=newTime;
    if(def?.afternoon?.routeId===rid)def.afternoon.pickupTime=newTime;
    for(const dk of DAYS){
      const ov=s.daySchedules[dk];
      if(ov?.morning?.routeId===rid)ov.morning.pickupTime=newTime;
      if(ov?.afternoon?.routeId===rid)ov.afternoon.pickupTime=newTime;
    }

function updateBusChangeDOM(){
  const kw=(S.modal.data.toStop||'').trim().toLowerCase();
  const date=S.modal.data.date||S.date;
  const dk=getDK(date);
  const selRid=S.modal.data.selRid||'';
  const selRoute=getRoute(selRid);
  const allTodayRoutes=INIT_BUSES.flatMap(b=>getBusRoutes(b.id).filter(r=>routeActiveOnDay(r,dk)));
  let targetRoutes=allTodayRoutes.filter(r=>r.id!==selRid&&(selRoute?r.dir===selRoute.dir:true));
  function getStopsOf(rid){
    const rs=S.db.routeStops?.[rid];
    if(rs&&rs.length)return rs.map(x=>typeof x==='object'?x.stop:x).filter(Boolean);
    const set=new Set();
    S.db.students.forEach(s=>{
      if(s.daySchedules){for(const dv of Object.values(s.daySchedules)){
        if(dv?.morning?.routeId===rid&&dv.morning.stop)set.add(dv.morning.stop);
        if(dv?.afternoon?.routeId===rid&&dv.afternoon.stop)set.add(dv.afternoon.stop);
      }}
      if(s.schedules?.[rid]?.stop)set.add(s.schedules[rid].stop);
    });
    return [...set];
  }
  const hintEl=document.getElementById('stop_route_hints');
  if(hintEl){
    if(kw.length>=2){
      const matched=[];
      for(const r of allTodayRoutes){
        const stops=getStopsOf(r.id);
        const hit=stops.find(s=>s.toLowerCase().includes(kw));
        if(hit)matched.push({r,stop:hit});
      }
      if(matched.length){
        hintEl.innerHTML='<div style="font-size:10px;color:#6b7280;margin-bottom:4px">📍 이 정류장이 포함된 노선:</div>'+
          matched.map(({r,stop})=>
            `<div style="display:inline-flex;align-items:center;gap:5px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 10px;margin:2px 2px 2px 0;font-size:11px;cursor:pointer"
              onclick="(function(){const si=document.getElementById('m_tostop');if(si)si.value='${esc(stop).replace(/'/g,"\\'")}';S.modal.data.toStop='${esc(stop).replace(/'/g,"\\'")}';S.modal.data.toRouteId='${r.id}';const sr=document.getElementById('m_trt');if(sr)sr.value='${r.id}';updateBusChangeDOM()})()">
              <span style="font-weight:900;color:#1d4ed8">${r.busId}호</span>
              <span style="color:#374151">${getRouteLabel(r.id)}</span>
              <span style="color:#6b7280">· ${esc(stop)}</span>
            </div>`
          ).join('');
      } else {
        hintEl.innerHTML=`<div style="font-size:10px;color:#f59e0b;padding:4px 0">⚠️ 일치하는 정류장 없음 — 아래에서 노선 직접 선택 후 저장하세요</div>`;
      }
    } else {
      hintEl.innerHTML='<div style="font-size:10px;color:#9ca3af">정류장 앞글자 2자 이상 입력하면 가능한 노선이 표시됩니다</div>';
    }
  }
  const sel=document.getElementById('m_trt');
  if(sel){
    let filtered=targetRoutes;
    if(kw.length>=2){
      const matchRoutes=targetRoutes.filter(r=>getStopsOf(r.id).some(s=>s.toLowerCase().includes(kw)));
      if(matchRoutes.length)filtered=matchRoutes;
    }
    const prev=S.modal.data.toRouteId||'';
    sel.innerHTML='<option value="">-- 노선 선택 --</option>'+
      filtered.map(r=>`<option value="${r.id}" ${r.id===prev?'selected':''}>[${r.busId}호] ${getRouteLabel(r.id)} ${getRouteTime(r.id)}</option>`).join('');
  }
}

function attTipShow(el){
  const tip=el.querySelector('.att-hover-tip');
  const arrow=el.querySelector('.att-tip-arrow');
  if(!tip)return;
  // 일단 투명하게 보여서 높이 측정
  tip.style.visibility='hidden';
  tip.style.display='block';
  const tipH=tip.offsetHeight;
  tip.style.visibility='';
  const rect=el.getBoundingClientRect();
  const spaceAbove=rect.top;
  const spaceBelow=window.innerHeight-rect.bottom;
  if(spaceAbove>=tipH+20&&spaceAbove>=spaceBelow){
    // 위로
    tip.style.bottom='calc(100% + 8px)';
    tip.style.top='';
    arrow.style.top='100%';
    arrow.style.bottom='';
    arrow.style.borderTopColor='#1f2937';
    arrow.style.borderBottomColor='transparent';
  } else {
    // 아래로
    tip.style.top='calc(100% + 8px)';
    tip.style.bottom='';
    arrow.style.bottom='100%';
    arrow.style.top='';
    arrow.style.borderBottomColor='#1f2937';
    arrow.style.borderTopColor='transparent';
  }
}

function saveChange(){
  const d=S.modal.data;
  const sid=el('m_st')?.value||d.selSid;
  const rid=el('m_rt')?.value||d.selRid;
  if(!sid){alert('학생을 선택하세요');return;}
  const ctype=d.ct||'absent';
  const st=getStudent(sid); if(!st)return;

  // 결석: 노선 선택 없어도 해당 학생 오늘 등원+하원 모두 결석 처리
  if(ctype==='absent'){
    const dk=getDK(S.date);
    const ds=st.daySchedules||{};
    const dayEx=ds[dk]||{};
    const defSc=ds.default||{};
    const morningRid=(dayEx.morning?.routeId||defSc.morning?.routeId||'');
    const afternoonRid=(dayEx.afternoon?.routeId||defSc.afternoon?.routeId||'');
    // 실제 노선(개별/미등원 포함) - 개별등하원 학생도 결석 가능
    const realRids=[...new Set([morningRid,afternoonRid].filter(r=>r&&r!=='__absent__'))];
    const absentRids=realRids.filter(r=>!r.startsWith('__'));
    // 개별등하원 학생처럼 실제 노선이 없으면 'all'로 저장
    const saveRids=absentRids.length>0?absentRids:['all'];
    if(realRids.length===0){alert('해당 학생의 오늘 탑승 노선이 없습니다');return;}
    const typeKO='결석';
    if(!confirm(`[${st.name}] 오늘 결석 처리하시겠습니까?\n등원+하원 모두 결석 처리됩니다.`))return;
    const notes=el('m_notes')?.value||'';
    const inputter=el('m_inputter')?.value||localStorage.getItem('shuttle_inputter')||'';
    const arr=getDayChanges(S.date);
    let filtered=arr.filter(c=>!(c.studentId===sid&&saveRids.includes(c.routeId)&&!c.undone));
    saveRids.forEach(r=>{
      filtered.push({id:uid(),studentId:sid,routeId:r,type:'absent',notes,inputter,timestamp:Date.now(),undone:false});
    });
    setDayChanges(S.date,filtered);
    S.lastChange={id:'multi',date:S.date,desc:`${st.name} 결석`};
    closeModal();
    showToast(`✅ ${st.name} 결석 등록 (등원+하원)`);
    render();
    return;
  }

  // 개별등원/하원/등하원 처리
  if(ctype==='individual_both'||ctype==='individual_morning'||ctype==='individual_afternoon'){
    const dk=getDK(S.date);
    const ds=st.daySchedules||{};
    const dayEx=ds[dk]||{};
    const defSc=ds.default||{};
    const notes=el('m_notes')?.value||'';

    if(ctype==='individual_both'){
      // 등원+하원 모두 개별 - 노선 선택 불필요
      const morningRid=(dayEx.morning?.routeId||defSc.morning?.routeId||'');
      const afternoonRid=(dayEx.afternoon?.routeId||defSc.afternoon?.routeId||'');
      const rids=[...new Set([morningRid,afternoonRid].filter(r=>r&&!r.startsWith('__')))];
      if(!confirm(`[${st.name}] 오늘 개별 등하원 처리하시겠습니까?`))return;
      const arr=getDayChanges(S.date);
      let filtered=arr.filter(c=>!(c.studentId===sid&&rids.includes(c.routeId)&&!c.undone));
      rids.forEach(r=>filtered.push({id:uid(),studentId:sid,routeId:r,type:'individual',dir:'both',notes,timestamp:Date.now(),undone:false}));
      setDayChanges(S.date,filtered);
      S.lastChange={id:'multi',date:S.date,desc:`${st.name} 개별 등하원`};
      closeModal();showToast(`✅ ${st.name} 개별 등하원 등록`);render();return;
    }

    // 개별등원 or 개별하원 - 학생의 해당 방향 노선 자동 찾기
    const dir=ctype==='individual_morning'?'morning':'afternoon';
    const autoRid=(dayEx[dir]?.routeId||defSc[dir]?.routeId||'');
    const realRid=autoRid&&!autoRid.startsWith('__')?autoRid:'';
    if(!realRid){alert(`${st.name}의 ${ctype==='individual_morning'?'등원':'하원'} 노선이 설정되어 있지 않습니다`);return;}
    if(!confirm(`[${st.name}] 오늘 개별 ${ctype==='individual_morning'?'등원':'하원'} 처리하시겠습니까?`))return;
    const arr=getDayChanges(S.date);
    let filtered=arr.filter(c=>!(c.studentId===sid&&c.routeId===realRid&&!c.undone));
    filtered.push({id:uid(),studentId:sid,routeId:realRid,type:'individual',dir,notes,timestamp:Date.now(),undone:false});
    setDayChanges(S.date,filtered);
    S.lastChange={id:filtered[filtered.length-1].id,date:S.date,desc:`${st.name} 개별 ${ctype==='individual_morning'?'등원':'하원'}`};
    closeModal();showToast(`✅ ${st.name} 개별 ${ctype==='individual_morning'?'등원':'하원'} 등록`);render();return;
  }

  if(!rid && ctype!=='period_absent'){alert('노선을 선택하세요');return;}
  const route=getRoute(rid);
  const typeKO={individual:'개별등하원',individual_both:'개별 등하원',individual_morning:'개별 등원',individual_afternoon:'개별 하원',period_absent:'결석기간설정',bus_change:'호차변경',stop_change:'정류장변경'};
  let msg=`[${st.name}] ${route?.label||rid}\n변경유형: ${typeKO[ctype]||ctype}`;
  if(ctype==='period_absent'){
    const sd=el('m_sd')?.value,ed=el('m_ed')?.value;
    if(!sd||!ed){alert('결석 기간을 설정하세요');return;}
    if(sd>ed){alert('시작일이 종료일보다 늦을 수 없습니다');return;}
    msg+=`\n기간: ${sd} ~ ${ed}`;
  }
  if(ctype==='bus_change'&&!d.toRouteId){alert('이동할 노선을 선택하세요');return;}
  if(!confirm(`다음 변경사항을 저장하시겠습니까?\n\n${msg}`))return;
  const chg={id:uid(),studentId:sid,routeId:ctype==='period_absent'?'all':rid,type:ctype,notes:el('m_notes')?.value||'',inputter:el('m_inputter')?.value||localStorage.getItem('shuttle_inputter')||'',timestamp:Date.now(),undone:false};
  if(ctype==='period_absent'){chg.startDate=el('m_sd')?.value;chg.endDate=el('m_ed')?.value;}
  if(ctype==='bus_change'){
    chg.toRouteId=d.toRouteId;
    chg.toStop=d.toStop||(el('m_tostop_sel')?.value||el('m_tostop')?.value||'');
    chg.toTime=el('m_totime')?.value||d.toTime||'';
    if(!chg.toRouteId){alert('이동할 노선을 선택하세요');return;}
    if(!chg.toStop){alert('이동할 정류장을 선택하세요');return;}
  }
  if(ctype==='stop_change'){
    // 드롭다운(m_tostop_sel) 또는 직접입력(m_tostop) 중 값 있는 것 사용
    // S.modal.data.toStop에 이미 저장되어 있음
    chg.toStop=d.toStop||(el('m_tostop_sel')?.value||el('m_tostop')?.value||'');
    chg.toTime=el('m_totime')?.value||d.toTime||'';
    if(!chg.toStop){alert('변경할 정류장을 선택하세요');return;}
  }
  const arr=getDayChanges(S.date);
  let filtered;
  if(d._editingId){
    // 수정 모드: 기존 항목을 새 항목으로 교체 (ID 유지 위해 같은 위치에)
    filtered=arr.map(c=>c.id===d._editingId?chg:c);
    // 기존 항목이 없으면 추가
    if(!arr.find(c=>c.id===d._editingId))filtered.push(chg);
  } else {
    // 신규 등록: 같은 학생+노선의 기존 활성 변경 제거 후 추가
    filtered=arr.filter(c=>!(c.studentId===sid&&c.routeId===rid&&!c.undone));
    filtered.push(chg);
  }
  setDayChanges(S.date,filtered);
  S.lastChange={id:chg.id,date:S.date,desc:`${st.name} · ${typeKO[ctype]||ctype}${ctype==='bus_change'?` → ${getRoute(d.toRouteId)?.busId||'?'}호차`:''}${ctype==='absent'?'':''}`};
  closeModal();
  showToast(`✅ ${st.name} ${typeKO[ctype]||ctype} 등록 완료`);
  render();
}

  if(!chg)return;
  const st=getStudent(chg.studentId);
  if(!st)return;

  const dir=route.dir==='morning'?'morning':'afternoon';
  const typeKO={bus_change:'호차변경',stop_change:'정류장변경'};
  const dayLabel=DAY_KO[dk];

  let confirmMsg='';
  let newSched=null;

  if(chg.type==='bus_change'){
    const toRoute=getRoute(chg.toRouteId);
    if(!toRoute){alert('이동 노선 정보를 찾을 수 없습니다');return;}
    confirmMsg=`[${st.name}] ${dayLabel}요일 ${dir==='morning'?'등원':'하원'}을\n${toRoute.busId}호 ${toRoute.label} · ${chg.toStop||''}\n으로 고정배정 저장하시겠습니까?`;
    newSched={routeId:chg.toRouteId,stop:chg.toStop||'',pickupTime:chg.toTime||'',notes:''};
  } else if(chg.type==='stop_change'){
    confirmMsg=`[${st.name}] ${dayLabel}요일 정류장을\n"${chg.toStop||''}"으로 고정배정 저장하시겠습니까?`;
    const origSched=st.daySchedules?.default?.[dir]||st.daySchedules?.[dk]?.[dir]||{};
    newSched={...origSched,stop:chg.toStop||origSched.stop||'',pickupTime:chg.toTime||origSched.pickupTime||''};
    if(chg.type==='bus_change')newSched.routeId=chg.toRouteId;
  }

  if(!confirm(confirmMsg))return;
  if(!st.daySchedules)st.daySchedules={default:{morning:null,afternoon:null}};
  if(!st.daySchedules[dk])st.daySchedules[dk]={};
  st.daySchedules[dk][dir]=newSched;
  save();
  showToast(`📌 ${st.name} ${dayLabel}요일 고정배정 저장 완료`);
  render();
}

function applyDayPresetDays(sid,activeDays,label){
  const ms=S.modal?.data?.student;
  const target=ms&&ms.id===sid?ms:getStudent(sid);
  if(!target)return;
  if(!target.daySchedules)target.daySchedules={default:{morning:null,afternoon:null}};
  const dayNames=activeDays.map(d=>DAY_KO[d]).join('·');
  if(!confirm(`"${label||dayNames}" 프리셋을 적용하시겠습니까?\n\n✅ ${dayNames} → 기본배정 사용\n❌ 나머지 요일 → 미등원\n\n기존 요일별 예외 설정이 초기화됩니다.`))return;
  for(const dk of DAYS){
    if(activeDays.includes(dk)){
      delete target.daySchedules[dk]; // 기본값 사용
    } else {
      target.daySchedules[dk]={
        morning:{routeId:'__absent__',stop:'',pickupTime:''},
        afternoon:{routeId:'__absent__',stop:'',pickupTime:''}
      };
    }
  }
  render();
  showToast(`✅ ${label||dayNames} 적용 — 저장 버튼으로 확정하세요`);
}

function updateDefSched(sid,dir,field,val){
  const ms=S.modal?.data?.student;
  const target=ms&&ms.id===sid?ms:getStudent(sid);
  if(!target)return;
  if(!target.daySchedules)target.daySchedules={default:{morning:null,afternoon:null}};
  if(!target.daySchedules.default)target.daySchedules.default={morning:null,afternoon:null};

  if(field==='routeId'){
    // render 전에 현재 화면의 모든 stop/time 값을 target에 저장
    ['morning','afternoon'].forEach(d=>{
      const pfx=d==='morning'?'m':'a';
      const timeEl=document.querySelector('[data-timeinput="def_'+pfx+'"]');
      const stopSel=document.querySelector('[data-stopselectid="def_'+pfx+'"]');
      const stopInp=document.querySelector('[data-stopinputid="def_'+pfx+'"]');
      if(!target.daySchedules.default[d])return;
      if(timeEl&&timeEl.value) target.daySchedules.default[d].pickupTime=timeEl.value;
      if(stopSel&&stopSel.value) target.daySchedules.default[d].stop=stopSel.value;
      if(stopInp&&stopInp.value) target.daySchedules.default[d].stop=stopInp.value;
    });
    if(!val){
      target.daySchedules.default[dir]=null;
    } else {
      // 같은 노선이면 stop/time 유지, 다른 노선이면 초기화
      const prev=target.daySchedules.default[dir];
      target.daySchedules.default[dir]={
        routeId:val,
        stop: prev?.routeId===val ? (prev?.stop||'') : '',
        pickupTime: prev?.routeId===val ? (prev?.pickupTime||'') : '',
        notes: prev?.notes||''
      };
    }
  } else {
    if(!target.daySchedules.default[dir]){
      target.daySchedules.default[dir]={routeId:'',stop:'',pickupTime:'',notes:''};
    }
    target.daySchedules.default[dir][field]=val;
  }
  // modal 복사본만 업데이트, DB는 저장 버튼 클릭 시에만 반영
  if(field==='routeId')render();
}
function updateOvSched(sid,dk,dir,field,val){
  const ms=S.modal?.data?.student;
  const target=ms&&ms.id===sid?ms:getStudent(sid);
  if(!target)return;
  if(!target.daySchedules)target.daySchedules={default:{morning:null,afternoon:null}};
  if(!target.daySchedules[dk])target.daySchedules[dk]={};
  if(field==='routeId'){

    else{
      if(!target.daySchedules[dk][dir])target.daySchedules[dk][dir]={routeId:'',stop:'',pickupTime:'',notes:''};
      target.daySchedules[dk][dir].routeId=val;
    }
  } else {
    if(!target.daySchedules[dk][dir]){
      target.daySchedules[dk][dir]={routeId:'',stop:'',pickupTime:'',notes:''};
    }
    target.daySchedules[dk][dir][field]=val;
  }
  // modal 복사본만 업데이트, DB는 저장 버튼 클릭 시에만 반영
  if(field==='routeId')render();
}

function saveAndWait(){
  S.db._savedAt = Date.now();
  localStorage.setItem(DB_KEY, JSON.stringify(S.db));
  if(USE_FIREBASE && _fbRef){
    _fbIgnoreUntil = Date.now() + 12000;
    console.log('[saveAndWait] Firebase .set() 호출');
    return _fbRef.set(S.db)
      .then(()=>{
        _fbIgnoreUntil = Date.now() + 2000;
        console.log('[saveAndWait] Firebase .set() 완료');
      })
      .catch(e=>{
        console.error('[saveAndWait] Firebase 저장 실패:', e);
        showToast('❌ 서버 저장 실패 — 재시도하거나 관리자에게 문의하세요');
        throw e;
      });
  }
  console.warn('[saveAndWait] Firebase 미사용 또는 _fbRef 없음');
  return Promise.resolve();
}

function deleteRoute(rid){
  const isCustom=!!(S.db.customRoutes||[]).find(x=>x.id===rid);
  const label=getRouteLabel(rid);
  // 이 노선 쓰는 학생 수 확인
  let cnt=0;
  S.db.students.forEach(s=>{
    if(!s.daySchedules)return;
    for(const dv of Object.values(s.daySchedules)){
      if(dv?.morning?.routeId===rid||dv?.afternoon?.routeId===rid){cnt++;break;}
    }
    if(s.schedules?.[rid])cnt++;
  });
  const warn=cnt>0?`\n\n⚠️ 현재 ${cnt}명의 학생이 이 노선을 사용 중입니다.\n삭제하면 해당 학생들의 탑승 설정이 초기화됩니다.`:'';
  if(!confirm(`"${label}" 노선을 삭제하시겠습니까?${warn}`))return;
  markDirty();
  if(isCustom){
    S.db.customRoutes=(S.db.customRoutes||[]).filter(r=>r.id!==rid);
  } else {
    // 기본 노선은 hiddenRoutes에 추가 (완전 삭제)
    if(!S.db.hiddenRoutes)S.db.hiddenRoutes=[];
    if(!S.db.hiddenRoutes.includes(rid))S.db.hiddenRoutes.push(rid);
    // 관련 오버라이드 데이터도 정리
    delete (S.db.routeLabels||{})[rid];
    delete (S.db.routeTimes||{})[rid];
    delete (S.db.routeDays||{})[rid];
    delete (S.db.routeSchool||{})[rid];
    delete (S.db.routeDir||{})[rid];
  }
  // 이 노선 배정된 학생 탑승설정 초기화
  if(cnt>0){
    S.db.students.forEach(s=>{
      if(s.daySchedules){
        for(const key of Object.keys(s.daySchedules)){
          const dv=s.daySchedules[key];
          if(dv?.morning?.routeId===rid)s.daySchedules[key].morning=null;
          if(dv?.afternoon?.routeId===rid)s.daySchedules[key].afternoon=null;
        }
      }
      if(s.schedules?.[rid])delete s.schedules[rid];
    });
  }
  save();
  showToast(`🗑️ "${label}" 노선 삭제됨`);
  render();
}

function saveTeacher(tid,isNew){

  showToast(isNew?`✅ ${name} 교사 등록 완료`:`✅ ${name} 교사 정보 수정 완료`);

let _teacherDrag={fromIdx:null};
function teacherDragStart(e,idx){
  _teacherDrag={fromIdx:idx};
  e.target.closest('[draggable]').style.opacity='0.4';
  e.dataTransfer.effectAllowed='move';
}
function teacherDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='#e0f2fe';
}
function teacherDrop(e,toIdx){
  e.preventDefault();
  e.currentTarget.style.background='';
  if(_teacherDrag.fromIdx===null||_teacherDrag.fromIdx===toIdx)return;
  const arr=S.db.teachers||[];
  const [moved]=arr.splice(_teacherDrag.fromIdx,1);
  arr.splice(toIdx,0,moved);
  save();
  showToast('✅ 교사 순서 변경됨');

function tcOrderMove(rid, dir){
  const list=document.getElementById('tc_order_list');
  if(!list)return;
  const items=[...list.querySelectorAll('[data-rid]')];
  const idx=items.findIndex(x=>x.dataset.rid===rid);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=items.length)return;
  const tcItem=items[idx];
  if(dir===-1) list.insertBefore(tcItem,items[newIdx]);
  else list.insertBefore(items[newIdx],tcItem);
}

function refreshTeacherOrderList(){
  const list=document.getElementById('tc_order_list');
  if(!list)return;
  const checked=new Set([...document.querySelectorAll("input[name='tc_route']:checked")].map(x=>x.value));
  const allRoutes=INIT_BUSES.flatMap(b=>getBusRoutes(b.id));
  // 기존 순서에서 체크 해제된 것 제거
  [...list.querySelectorAll('[data-rid]')].forEach(item=>{
    if(!checked.has(item.dataset.rid))item.remove();
  });
  // 새로 체크된 것 추가
  const existing=new Set([...list.querySelectorAll('[data-rid]')].map(x=>x.dataset.rid));
  checked.forEach(rid=>{
    if(existing.has(rid))return;
    const r=allRoutes.find(x=>x.id===rid);if(!r)return;
    const col=BUS_COLORS[r.busId]||'#555';
    const div=document.createElement('div');
    div.id=`tc_ord_${rid}`;div.dataset.rid=rid;
    div.style.cssText='display:flex;align-items:center;gap:6px;padding:5px 9px;border:1.5px solid #e5e7eb;border-radius:7px;background:#fff';
    div.innerHTML=`<span style="background:${col};color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:5px">${r.busId}호</span><span style="flex:1;font-size:11px;font-weight:700;color:#374151">${getRouteLabel(rid)}</span><button onclick="tcOrderMove('${rid}',-1)" style="border:none;background:#f3f4f6;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:13px">▲</button><button onclick="tcOrderMove('${rid}',1)" style="border:none;background:#f3f4f6;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:13px">▼</button>`;
    list.appendChild(div);
  });
}

function exportRouteExcel(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const today=todayStr();

  // ── 공통 헬퍼 ──
  const routeLabel=rid=>getRouteLabel(rid);
  const schoolKO={altiora:'알티오라',petamus:'페타무스',pangram:'팬그램'};
  const dirKO={morning:'등원',afternoon:'하원'};
  const daysStr=r=>(r.days||[]).length===5?'월~금':(r.days||[]).map(d=>DAY_KO[d]).join('·');
  const routeTime=rid=>(S.db.routeTimes?.[rid])||(getRoute(rid)?.time)||'';

  // 학생의 기본배정 정보 가져오기
  const getStudentDef=(s,dir)=>{
    if(s.daySchedules?.default?.[dir])return s.daySchedules.default[dir];
    // 하위호환 schedules
    if(s.schedules){
      for(const[rid,sc]of Object.entries(s.schedules)){
        const r=getRoute(rid);if(r&&r.dir===dir)return{routeId:rid,...sc};
      }
    }
    return null;
  };

  // ════════════════════════════════════
  // 시트1: 📋 전체요약
  // ════════════════════════════════════
  const summaryRows=[
    ['호차','노선ID','노선명','방향','운행요일','시간','학생수(기본배정)']
  ];
  for(const b of S.db.buses||[]){
    const routes=getBusRoutes(b.id);
    for(const r of routes){
      const label=routeLabel(r.id);
      const time=routeTime(r.id);
      const dir=dirKO[r.dir]||r.dir;
      const days=daysStr(r);
      // 기본배정 학생 수 계산
      const cnt=S.db.students.filter(s=>{
        if(!s.active)return false;
        const def=getStudentDef(s,r.dir);
        if(def?.routeId===r.id)return true;
        if(s.schedules?.[r.id])return true;
        return false;
      }).length;
      summaryRows.push([b.name,r.id,label,dir,days,time,cnt]);
    }
    if(routes.length>0)summaryRows.push(['','','','','','','']); // 호차 구분 빈줄
  }
  const wsSummary=XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary['!cols']=[{wch:8},{wch:12},{wch:22},{wch:6},{wch:8},{wch:8},{wch:12}];
  XLSX.utils.book_append_sheet(wb,wsSummary,'전체요약');

  // ════════════════════════════════════
  // 시트2~N: 호차별 상세
  // ════════════════════════════════════
  for(const b of S.db.buses||[]){
    const routes=getBusRoutes(b.id);
    if(routes.length===0)continue;
    const rows=[
      [`${b.name} 노선도 (기사: ${b.driver||''} / ${b.driverPhone||''} / ${b.plate||''})`],
      []
    ];
    for(const r of routes){
      const label=routeLabel(r.id);
      const time=routeTime(r.id);
      const dir=dirKO[r.dir]||r.dir;
      const days=daysStr(r);
      // 노선 헤더
      rows.push([`[${dir}] ${label}`,`${time}`,`운행: ${days}`, '', '', '', '']);
      rows.push(['순번','정류장','이름','학교','반','연락처','비고']);
      // 학생 목록 (정류장별 그룹)
      const students=S.db.students.filter(s=>{
        if(!s.active)return false;
        const def=getStudentDef(s,r.dir);
        if(def?.routeId===r.id)return true;
        if(s.schedules?.[r.id])return true;
        return false;
      });
      // 정류장 기준 정렬
      students.sort((a,b)=>{
        const sa=getStudentDef(a,r.dir)||a.schedules?.[r.id];
        const sb2=getStudentDef(b,r.dir)||b.schedules?.[r.id];
        return (sa?.pickupTime||'99:99').localeCompare(sb2?.pickupTime||'99:99')||
               (sa?.stop||'').localeCompare(sb2?.stop||'');
      });
      if(students.length===0){
        rows.push(['','(배정된 학생 없음)','','','','','']);
      } else {
        let seq=1;
        for(const s of students){
          const sc=getStudentDef(s,r.dir)||s.schedules?.[r.id]||{};
          rows.push([seq++,sc.stop||'',s.name,schoolKO[s.school]||s.school||'',s.cls||'',s.phone||'',s.memo||'']);
        }
      }
      rows.push([]); // 노선 사이 빈줄
    }
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:5},{wch:30},{wch:14},{wch:8},{wch:14},{wch:16},{wch:20}];
    // 첫 행 병합 (호차명)
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}}];
    XLSX.utils.book_append_sheet(wb,ws,b.name);
  }

  // ════════════════════════════════════
  // 마지막 시트: 전체 학생 배치표
  // ════════════════════════════════════
  const allRows=[
    ['이름','학교','반','연락처','등원호차','등원노선','등원정류장','등원시간','하원호차','하원노선','하원정류장','하원시간','비고']
  ];
  const activeStudents=[...S.db.students].filter(s=>s.active);
  activeStudents.sort((a,b)=>(a.school||'').localeCompare(b.school||'')||(a.cls||'').localeCompare(b.cls||'')||(a.name||'').localeCompare(b.name||''));
  for(const s of activeStudents){
    const am=getStudentDef(s,'morning');
    const pm=getStudentDef(s,'afternoon');
    const amRoute=am?getRoute(am.routeId):null;
    const pmRoute=pm?getRoute(pm.routeId):null;
    const amBus=amRoute?getBus(amRoute.busId):null;
    const pmBus=pmRoute?getBus(pmRoute.busId):null;
    const notes=s.memo||'';
    allRows.push([
      s.name,
      schoolKO[s.school]||s.school||'',
      s.cls||'',
      s.phone||'',
      amBus?.name||'',
      am?routeLabel(am.routeId):'',
      am?.stop||'',
      am?.pickupTime||'',
      pmBus?.name||'',
      pm?routeLabel(pm.routeId):'',
      pm?.stop||'',
      pm?.pickupTime||'',
      notes
    ]);
  }
  const wsAll=XLSX.utils.aoa_to_sheet(allRows);
  wsAll['!cols']=[{wch:14},{wch:8},{wch:14},{wch:16},{wch:7},{wch:18},{wch:28},{wch:7},{wch:7},{wch:18},{wch:28},{wch:7},{wch:20}];
  XLSX.utils.book_append_sheet(wb,wsAll,'전체학생배치');

  XLSX.writeFile(wb,`셔틀노선도_${today}.xlsx`);
  showToast('✅ 엑셀 다운로드 완료');
}

function executeCarryover(){
  const pw=el('carryover_pw')?.value||'';
  if(!pw){alert('비밀번호를 입력하세요');return;}
  if(pw!==S.db.settings?.adminPw){
    el('carryover_pw').style.borderColor='#dc2626';
    el('carryover_pw').value='';
    el('carryover_pw').placeholder='❌ 비밀번호 불일치 — 다시 입력';
    return;
  }
  const keepStudents=el('co_students')?.checked;
  const resetSched=el('co_reset_sched')?.checked;
  const keepBuses=el('co_buses')?.checked;
  const keepTeachers=el('co_teachers')?.checked;
  const keepClasses=el('co_classes')?.checked;
  const keepRoutes=el('co_routes')?.checked;
  const nextYear=new Date().getFullYear()+1;

  // 이월 실행
  const newDb={
    buses: keepBuses?JSON.parse(JSON.stringify(S.db.buses||[])):[],
    teachers: keepTeachers?JSON.parse(JSON.stringify(S.db.teachers||[])):[] ,
    classes: keepClasses?JSON.parse(JSON.stringify(S.db.classes||{altiora:[],petamus:[],pangram:[]})): {altiora:[],petamus:[],pangram:[]},
    routeLabels: keepRoutes?JSON.parse(JSON.stringify(S.db.routeLabels||{})):{},
    routeTimes: keepRoutes?JSON.parse(JSON.stringify(S.db.routeTimes||{})):{},
    routeDays: keepRoutes?JSON.parse(JSON.stringify(S.db.routeDays||{})):{},
    routeSchool: keepRoutes?JSON.parse(JSON.stringify(S.db.routeSchool||{})):{},
    routeDir: keepRoutes?JSON.parse(JSON.stringify(S.db.routeDir||{})):{},
    routeStops: keepRoutes?JSON.parse(JSON.stringify(S.db.routeStops||{})):{},
    routeMemo: keepRoutes?JSON.parse(JSON.stringify(S.db.routeMemo||{})):{},
    hiddenRoutes: keepRoutes?(S.db.hiddenRoutes||[]):[],
    customRoutes: keepRoutes?JSON.parse(JSON.stringify(S.db.customRoutes||[])):[] ,
    dailyChanges: {},  // 항상 초기화
    settings: JSON.parse(JSON.stringify(S.db.settings||{adminPw:'1234'})),
    students: [],
  };

  if(keepStudents){
    newDb.students=S.db.students
      .filter(s=>s.active)
      .map(s=>({
        ...JSON.parse(JSON.stringify(s)),
        // 탑승배정 초기화 여부
        schedules: resetSched?{}:s.schedules,
        daySchedules: resetSched?{default:{morning:null,afternoon:null}}:s.daySchedules,
      }));
  }

  S.db=newDb;
  save();
  closeModal();
  const stuMsg=keepStudents?`학생 ${newDb.students.length}명 이월`:'학생 초기화';
  showToast(`✅ ${nextYear}학년도 이월 완료 — ${stuMsg}`);
  render();
}

// ─── EXCEL IMPORT ───
function handleFileDrop(e){e.preventDefault();el('uz').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processXlFile(f);}
function handleXlFile(input){const f=input.files[0];if(f)processXlFile(f);}

function processXlFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let parsed=[];

      // ── 새 양식: '학생등록' 시트 (이름·학교구분·주소·전화번호) ──
      if(wb.SheetNames.includes('학생등록')){
        const ws=wb.Sheets['학생등록'];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        for(const row of rows){
          const name=row[0]?String(row[0]).trim():'';
          const school=row[1]?String(row[1]).trim():'';
          const addr=row[2]?String(row[2]).trim():'';
          const phone=row[3]?String(row[3]).trim():'';
          const cls=row[4]?String(row[4]).trim():'';
          if(!name||name.startsWith('※')||name==='이름')continue;
          const validSchools=['altiora','petamus','pangram'];
          parsed.push({
            id:uid(),name,
            school:validSchools.includes(school)?school:'altiora',
            addr,phone,cls,addrDetail:'',active:true,schedules:{}
          });
        }
      } else {
        // ── 기존 양식: 호차별 시트 ──
        const targetSheets=['2호차','3호차','5호차','7호차','8호차'];
        for(const sn of targetSheets){
          if(!wb.SheetNames.includes(sn)){console.warn('시트 없음:',sn);continue;}
          const ws=wb.Sheets[sn];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
          parseSheetStudents(rows,sn[0],parsed);
        }
        // Deduplicate
        const unique={};
        parsed.forEach(p=>{if(!unique[p.name])unique[p.name]={...p};
          else Object.assign(unique[p.name].schedules||{},p.schedules||{});});
        parsed=Object.values(unique);
      }

      const newCount=parsed.filter(p=>!S.db.students.some(s=>s.name===p.name)).length;
      const updateCount=parsed.length-newCount;
      S.modal.data.preview={count:parsed.length,newCount,updateCount,students:parsed};
      render();
    }catch(err){S.modal.data.error='파싱 실패: '+err.message;render();}
  };
  reader.readAsArrayBuffer(file);
}

function parseSheetStudents(rows,busId,out){
  let currentRouteId=null;
  const busRoutes=getBusRoutes(busId);
  function detectRoute(headerText){
    const ht=(headerText||'').toLowerCase();
    if(ht.includes('알티오라')&&ht.includes('등원'))return busRoutes.find(r=>r.school==='altiora'&&r.dir==='morning')?.id;
    if(ht.includes('알티오라')&&ht.includes('4:20'))return busRoutes.find(r=>r.school==='altiora'&&r.dir==='afternoon'&&r.time==='16:20')?.id;
    if(ht.includes('알티오라')&&ht.includes('3:10'))return busRoutes.find(r=>r.school==='altiora'&&r.dir==='afternoon'&&r.time==='15:10')?.id;
    if(ht.includes('패타무스')||ht.includes('페타무스'))return busRoutes.find(r=>r.school==='petamus')?.id;
    if((ht.includes('팬그램')||ht.includes('pangram'))&&ht.includes('등원')){
      // Check for 화목
      if(ht.includes('화목'))return busRoutes.find(r=>r.school==='pangram'&&r.dir==='morning'&&r.days.includes('tue'))?.id;
      return busRoutes.find(r=>r.school==='pangram'&&r.dir==='morning'&&r.days.includes('mon'))?.id;
    }
    if((ht.includes('팬그램')||ht.includes('pangram'))&&ht.includes('하원')){
      if(ht.includes('화목'))return busRoutes.find(r=>r.school==='pangram'&&r.dir==='afternoon'&&r.days.includes('tue'))?.id;
      return busRoutes.find(r=>r.school==='pangram'&&r.dir==='afternoon'&&r.days.includes('mon'))?.id;
    }
    return null;
  }
  // Detect 화목반 section
  let isTT=false;
  for(const row of rows){
    const vals=row.filter(v=>v!=null);
    if(vals.length===0)continue;
    const rowStr=vals.map(v=>String(v)).join(' ');
    // Check if route header
    const rid=detectRoute(rowStr);
    if(rid){currentRouteId=rid;isTT=false;continue;}
    // Check 화목반 subsection
    if(rowStr.includes('화목반')||rowStr.replace(/\s/g,'').toLowerCase()==='화목'){
      // Switch to 화목 route
      if(currentRouteId){
        const r=getRoute(currentRouteId);
        if(r){
          const ttRid=busRoutes.find(rr=>rr.school===r.school&&rr.dir===r.dir&&rr.days.includes('tue')&&!rr.days.includes('mon'))?.id;
          if(ttRid){currentRouteId=ttRid;isTT=true;}
        }
      }
      continue;
    }
    if(!currentRouteId)continue;
    // Try to extract student row: name in col2, phone in col3, time in col4, stop in col6
    let name=null,phone=null,stop=null,pickupTime='';
    if(row[2]&&typeof row[2]==='string'&&row[2].trim().length>1&&row[2].trim()!=='이름'){
      name=row[2].trim();
      if(row[3]&&String(row[3]).match(/010[-\d]+/))phone=String(row[3]).trim();
      // Time: col4 might be datetime or string
      if(row[4]!=null){
        if(typeof row[4]==='number'&&row[4]<1)pickupTime=excelTimeToHHMM(row[4]);
        else if(typeof row[4]==='string'&&row[4].includes(':'))pickupTime=row[4].replace(';',':');
        else if(row[4]&&typeof row[4]==='object'&&row[4].getHours){pickupTime=padTime(row[4].getHours())+':'+padTime(row[4].getMinutes());}
      }
      if(row[6]&&typeof row[6]==='string'&&row[6].length>1)stop=row[6].split('/')[0].trim();
    }
    if(name&&stop&&name!=='번호'&&!name.match(/^\d+$/)){
      let existing=out.find(o=>o.name===name);
      if(!existing){existing={id:uid(),name,phone:phone||'',cls:row[5]?String(row[5]).trim():'',school:guessSchool(currentRouteId),active:true,schedules:{}};out.push(existing);}
      if(!existing.schedules)existing.schedules={};
      existing.schedules[currentRouteId]={stop,pickupTime,notes:''};
    }
  }
}
function excelTimeToHHMM(frac){const t=Math.round(frac*1440);return padTime(Math.floor(t/60))+':'+padTime(t%60);}
function padTime(n){return String(n).padStart(2,'0');}
function guessSchool(rid){if(!rid)return 'altiora';const r=getRoute(rid);return r?.school||'altiora';}

function applyExcelImport(){
  const students=S.modal.data.preview?.students;if(!students)return;
  let newC=0,upC=0;
  for(const ps of students){
    const ex=S.db.students.find(s=>s.name===ps.name);
    if(ex){Object.assign(ex.schedules||{},ps.schedules||{});upC++;}
    else{S.db.students.push({...ps});newC++;}
  }
  save();showToast(`✅ 적용 완료 — 신규 ${newC}명 / 업데이트 ${upC}명`);closeModal();
}

// ─── 카카오 주소 검색 (body overlay 임베드) ───
function openAddrOverlay(){
  if(typeof daum==='undefined'||typeof daum.Postcode==='undefined'){
    alert('주소 검색 서비스를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');return;
  }
  // 이미 열려있으면 닫기
  const exist=document.getElementById('addr-overlay');
  if(exist){exist.remove();return;}

  // body에 dimmed overlay 생성
  const ov=document.createElement('div');
  ov.id='addr-overlay';
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center';

  // 검색창 박스
  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:14px;overflow:hidden;width:min(420px,94vw);height:490px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3)';

  // 상단 헤더
  const hdr=document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e5e7eb;font-size:13px;font-weight:700;color:#374151';
  hdr.innerHTML='<span>🏠 주소 검색</span>';
  const xBtn=document.createElement('button');
  xBtn.textContent='✕';
  xBtn.style.cssText='border:none;background:none;font-size:16px;cursor:pointer;color:#9ca3af;padding:0 4px';
  xBtn.onclick=()=>ov.remove();
  hdr.appendChild(xBtn);
  box.appendChild(hdr);

  // 카카오 embed 대상 (실제 크기 확보)
  const target=document.createElement('div');
  target.style.cssText='width:100%;height:440px';
  box.appendChild(target);

  ov.appendChild(box);
  // 배경 클릭 시 닫기
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);

  // body에 붙었으니 크기 확보됨 → embed 호출
  new daum.Postcode({
    oncomplete:function(data){
      const addr=data.roadAddress||data.jibunAddress;
      // 1. 전역변수 저장
      window._addrSelected=addr;
      // 2. modal data 저장
      if(S.modal&&S.modal.data&&S.modal.data.student) S.modal.data.student.addr=addr;
      // 3. es_addr input에 직접 주입 (modal 안에 있으므로 overlay와 무관하게 접근 가능)
      const inp=document.getElementById('es_addr');
      if(inp) inp.value=addr;
      // 4. overlay 닫기
      ov.remove();
      // 5. 상세주소 포커스
      const d=document.getElementById('es_addr_detail');
      if(d) d.focus();
    },
    width:'100%',
    height:'440px'
  }).embed(target);
}


function filterTodayDOM(q){
  const kw=(q||'').trim().toLowerCase();

  if(kw){
    // 접힌 노선이 있으면 모두 펼쳐서 재렌더 (DOM에 .sti가 없으면 검색 불가)
    const hasCollapsed=Object.values(S.routeCollapsed||{}).some(v=>v);
    if(hasCollapsed){
      Object.keys(S.routeCollapsed).forEach(k=>S.routeCollapsed[k]=false);
      render();
      // render 후 다시 필터링
      setTimeout(()=>_applyTodayFilter(kw),50);
      return;
    }
  }
  _applyTodayFilter(kw);
}

function filterTodayStopDOM(val){
  const kw=(val||'').trim().toLowerCase();
  // 정류장 기반 필터 - stop-grp의 stop-name으로 매칭
  document.querySelectorAll('.sti').forEach(el=>{el.style.display='';});
  document.querySelectorAll('.stop-grp').forEach(grp=>{
    if(!kw){grp.style.display='';return;}
    const stopName=(grp.querySelector('.stop-name')?.textContent||'').toLowerCase();
    grp.style.display=stopName.includes(kw)?'':'none';
  });
  document.querySelectorAll('.bc').forEach(card=>{
    if(!kw){card.style.display='';return;}
    const hasMatch=[...card.querySelectorAll('.stop-grp')].some(g=>g.style.display!=='none');
    card.style.display=hasMatch?'':'none';
  });
  const clr=document.getElementById('today-stop-srch');
  if(clr)clr.nextElementSibling.style.display=kw?'':'none';
}

function _applyTodayFilter(kw){
  // .sti show/hide
  document.querySelectorAll('.sti').forEach(el=>{
    const nm=(el.dataset.name||'').toLowerCase();
    el.style.display=(!kw||nm.includes(kw))?'':'none';
  });
  // 정류장 그룹
  document.querySelectorAll('.stop-grp').forEach(grp=>{
    const visible=[...grp.querySelectorAll('.sti')].some(e=>e.style.display!=='none');
    grp.style.display=visible?'':'none';
  });
  // 버스 카드 전체 - 검색어 있으면 해당 학생 없는 카드 숨김
  document.querySelectorAll('.bc').forEach(card=>{
    if(!kw){card.style.display='';return;}
    const hasMatch=[...card.querySelectorAll('.sti')].some(e=>e.style.display!=='none');
    card.style.display=hasMatch?'':'none';
  });
}
function clearStudentSearch(){
  S.studentSearch='';
  render();
}
function filterStudentDOM(q){
  const kw=(q||'').trim().toLowerCase();
  const rows=document.querySelectorAll('#student-tbody tr');
  // 먼저 전체 복원
  rows.forEach(tr=>tr.style.display='');
  // 키워드 있으면 필터링
  if(kw){
    rows.forEach(tr=>{
      if(!tr.dataset.name)return;
      const nm=(tr.dataset.name||'').toLowerCase();
      const cls=(tr.dataset.cls||'').toLowerCase();
      const ph=(tr.dataset.phone||'').toLowerCase();
      if(!nm.includes(kw)&&!cls.includes(kw)&&!ph.includes(kw))tr.style.display='none';
    });
  }
}


function bindEvents(){
  document.onkeydown=function(e){if(e.key==='Escape'&&S.modal)closeModal();}
  const srch=document.getElementById('student-srch');
  if(srch){
    srch.addEventListener('input',function(){
      S.studentSearch=this.value;
      filterStudentDOM(this.value);
    });
  }
  // 정류장 카드 클릭 (이벤트 위임)
  document.getElementById('app').addEventListener('click',function(e){
    const card=e.target.closest('.stop-card-clickable');
    if(card){
      const sn=card.getAttribute('data-stopname');
      if(sn)showStopDetailPopup(sn);
    }
  });
  // 헤더 필터 드롭다운 외부 클릭 시 닫기
  document.addEventListener('click',function(e){
    ['cls_flt','sch_flt'].forEach(id=>{
      const el_=document.getElementById(id);
      if(el_&&el_.style.display==='block'&&!el_.contains(e.target)&&!e.target.closest('th')){
        el_.style.display='none';
      }
    });
  },{capture:true});
}
